<div class="page">
  <div class="page-header">
    <h1>实体数据检索</h1>
    <div class="subtitle">按 Schema 维度顺序浏览知识图谱中的所有实体数据</div>

  <!-- 顶部统计概览 -->

<script src="./_shared/js/app.js?v=20260701"></script>
<script>
/* ===== Schema 维度顺序（严格按要求从上到下） ===== */
var SCHEMA_ORDER = [
  'Disease',
  'Specialty', 'DiseaseCategory', 'DiseaseSubcategory',
  'Etiology', 'Epidemiology', 'Pathophysiology', 'Symptom', 'Sign',
  'RiskFactor', 'Complication', 'Exam', 'ExamIndicator', 'LabTest',
  'DiagnosisCriteria', 'RiskStratification', 'Medication', 'Procedure',
  'TreatmentPlan', 'Prognosis', 'FollowUp', 'DifferentialDiagnosis',
  'Evidence', 'Guideline'
];

/* 中文名称映射 */
var SCHEMA_NAMES = {
  'Disease': '疾病',
  'Specialty': '学科',
  'DiseaseCategory': '疾病大类',
  'DiseaseSubcategory': '疾病亚类',
  'Etiology': '病因',
  'Epidemiology': '流行病学',
  'Pathophysiology': '病理生理',
  'Symptom': '症状',
  'Sign': '体征',
  'RiskFactor': '危险因素',
  'Complication': '并发症',
  'Exam': '检查',
  'ExamIndicator': '检查指标',
  'LabTest': '检验',
  'DiagnosisCriteria': '诊断标准',
  'RiskStratification': '风险分层',
  'Medication': '药物',
  'Procedure': '手术',
  'TreatmentPlan': '治疗方案',
  'Prognosis': '预后',
  'FollowUp': '随访',
  'DifferentialDiagnosis': '鉴别诊断',
  'Evidence': '证据',
  'Guideline': '指南'
};

/* 全局数据引用 */
var allEntities = {};
var filteredEntities = {};
var KG_DATA_GLOBAL = null;

/* 初始化页面 */
loadData(function(d) {
  renderNav('instances');
  initPage(d);
});

function initPage(d) {
  KG_DATA_GLOBAL = d;
  var diseases = d.diseases || {};
  var stats = d.stats || {};

  /* 初始化各维度容器 */
  SCHEMA_ORDER.forEach(function(dim) {
    allEntities[dim] = [];
  });

  /* ====== Disease 维度：从 diseases 中提取 ====== */
  Object.keys(diseases).forEach(function(diseaseCode) {
    var disease = diseases[diseaseCode];
    var info = disease.info;
    allEntities['Disease'].push({
      name: info.name,
      dimension: 'Disease',
      dimensionName: SCHEMA_NAMES['Disease'],
      disease: info.name,
      diseaseCode: diseaseCode,
      code: info.code || diseaseCode
    });
  });

  /* ====== 其他维度：从每个疾病的 dimensions 中提取 ====== */
  Object.keys(diseases).forEach(function(diseaseCode) {
    var disease = diseases[diseaseCode];
    var diseaseName = disease.info.name;
    var dims = disease.dimensions || {};

    Object.keys(dims).forEach(function(dimKey) {
      if (dimKey === 'Disease' || SCHEMA_ORDER.indexOf(dimKey) === -1) return;

      var entities = dims[dimKey] || [];
      entities.forEach(function(entity) {
        /* 通过 code 去重 */
        var exists = allEntities[dimKey].some(function(e) {
          return e.code === entity.code;
        });
        if (!exists) {
          allEntities[dimKey].push({
            name: entity.name,
            dimension: dimKey,
            dimensionName: SCHEMA_NAMES[dimKey] || dimKey,
            disease: diseaseName,
            diseaseCode: diseaseCode,
            code: entity.code || 'N/A'
          });
        }
      });
    });
  });

  /* 初始化过滤数据 */
  filteredEntities = {};
  SCHEMA_ORDER.forEach(function(dim) {
    filteredEntities[dim] = allEntities[dim].slice();
  });

  /* 更新顶部统计概览 */
  updateStatsOverview(stats);

  /* 填充筛选下拉框 */
  populateFilters();

  /* 渲染所有维度 */
  renderAllDimensions();

  /* 更新底部统计 */
  updateTotalStats();

  /* 绑定筛选事件 */
  setupFilters();
}

/* ====== 更新顶部统计概览 ====== */
function updateStatsOverview(stats) {
  if (stats.total_nodes !== undefined) {
    document.getElementById('total-nodes').textContent = stats.total_nodes.toLocaleString();
  }
  if (stats.total_relationships !== undefined) {
    document.getElementById('total-relations').textContent = stats.total_relationships.toLocaleString();
  }
  if (stats.disease_count !== undefined) {
    document.getElementById('total-diseases').textContent = stats.disease_count;
  }

  /* 计算实体总数（从 entity_types 或从各维度计算） */
  var totalEntities = 0;
  var dimensionCount = 0;
  SCHEMA_ORDER.forEach(function(dim) {
    var count = allEntities[dim] ? allEntities[dim].length : 0;
    if (count > 0) dimensionCount++;
    totalEntities += count;
  });
  document.getElementById('total-entities').textContent = totalEntities.toLocaleString();
  document.getElementById('total-dimensions').textContent = dimensionCount;
}

/* ====== 填充筛选下拉框 ====== */
function populateFilters() {
  var dimSelect = document.getElementById('dimension-filter');
  SCHEMA_ORDER.forEach(function(key) {
    if (allEntities[key] && allEntities[key].length > 0) {
      var option = document.createElement('option');
      option.value = key;
      option.textContent = SCHEMA_NAMES[key] + ' (' + allEntities[key].length + ')';
      dimSelect.appendChild(option);
    }
  });

  var diseaseSelect = document.getElementById('disease-filter');
  var diseases = KG_DATA_GLOBAL.diseases;
  Object.keys(diseases).sort().forEach(function(code) {
    var option = document.createElement('option');
    option.value = code;
    option.textContent = diseases[code].info.name;
    diseaseSelect.appendChild(option);
  });
}

/* ====== 绑定筛选事件 ====== */
function setupFilters() {
  document.getElementById('search-input').addEventListener('input', applyFilters);
  document.getElementById('dimension-filter').addEventListener('change', applyFilters);
  document.getElementById('disease-filter').addEventListener('change', applyFilters);

  document.getElementById('expand-all-btn').addEventListener('click', function() {
    toggleAllSections(false);
  });
  document.getElementById('collapse-all-btn').addEventListener('click', function() {
    toggleAllSections(true);
  });
}

/* ====== 全部展开/折叠 ====== */
function toggleAllSections(collapse) {
  var sections = document.querySelectorAll('.dimension-section');
  for (var i = 0; i < sections.length; i++) {
    var header = sections[i].querySelector('.dimension-header');
    var tableWrap = sections[i].querySelector('.dimension-table-wrap');
    if (collapse) {
      header.classList.add('collapsed');
      tableWrap.classList.add('collapsed');
    } else {
      header.classList.remove('collapsed');
      tableWrap.classList.remove('collapsed');
    }
  }
}

/* ====== 实时搜索 + 筛选 ====== */
function applyFilters() {
  var searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
  var dimValue = document.getElementById('dimension-filter').value;
  var diseaseValue = document.getElementById('disease-filter').value;

  SCHEMA_ORDER.forEach(function(dim) {
    filteredEntities[dim] = allEntities[dim].filter(function(entity) {
      /* 搜索过滤：匹配名称或编码 */
      if (searchTerm) {
        var nameMatch = entity.name.toLowerCase().indexOf(searchTerm) !== -1;
        var codeMatch = entity.code.toLowerCase().indexOf(searchTerm) !== -1;
        if (!nameMatch && !codeMatch) return false;
      }
      /* 维度过滤 */
      if (dimValue && entity.dimension !== dimValue) return false;
      /* 疾病过滤 */
      if (diseaseValue && entity.diseaseCode !== diseaseValue) return false;
      return true;
    });
  });

  renderAllDimensions();
  updateTotalStats();
}

/* ====== 渲染所有维度 sections ====== */
function renderAllDimensions() {
  var container = document.getElementById('dimension-container');
  container.innerHTML = '';

  SCHEMA_ORDER.forEach(function(dim) {
    var entities = filteredEntities[dim] || [];
    var section = document.createElement('div');
    section.className = 'dimension-section';
    section.id = 'section-' + dim;

    if (dim === 'Disease') {
      section.classList.add('disease-section');
    }

    /* 维度头部 */
    var header = document.createElement('div');
    header.className = 'dimension-header';
    header.innerHTML =
      '<div class="dimension-title">' +
        '<h3>' + escapeHtml(SCHEMA_NAMES[dim]) + '</h3>' +
        '<span class="dimension-count">' + entities.length + ' 个实体</span>' +
      '</div>' +
      '<div class="dimension-toggle">&#9660;</div>';

    /* 点击展开/折叠 */
    header.addEventListener('click', function() {
      var tw = section.querySelector('.dimension-table-wrap');
      header.classList.toggle('collapsed');
      tw.classList.toggle('collapsed');
    });

    section.appendChild(header);

    /* 表格容器 */
    var tableWrap = document.createElement('div');
    tableWrap.className = 'dimension-table-wrap';

    if (entities.length === 0) {
      tableWrap.innerHTML = '<div class="empty-state">该维度下暂无实体数据</div>';
    } else {
      var table = document.createElement('table');
      table.className = 'compact-table';

      /* 表头 */
      var thead = document.createElement('thead');
      thead.innerHTML =
        '<tr>' +
          '<th style="width:40%">实体名称</th>' +
          '<th style="width:35%">所属疾病</th>' +
          '<th style="width:25%">实体编码</th>' +
        '</tr>';
      table.appendChild(thead);

      /* 表体 */
      var tbody = document.createElement('tbody');
      entities.forEach(function(entity) {
        var tr = document.createElement('tr');
        (function(diseaseCode, dimension, code) {
          tr.addEventListener('click', function() {
            showEntityModal(diseaseCode, dimension, code);
          });
        })(entity.diseaseCode, entity.dimension, entity.code);

        var displayName = escapeHtml(entity.name);
        var displayCode = escapeHtml(entity.code);
        var displayDisease = escapeHtml(entity.disease);

        /* 搜索高亮 */
        var searchTerm = document.getElementById('search-input').value.trim();
        if (searchTerm) {
          displayName = highlightText(entity.name, searchTerm);
          displayCode = highlightText(entity.code, searchTerm);
        }

        tr.innerHTML =
          '<td><span class="entity-name">' + displayName + '</span></td>' +
          '<td><span class="disease-name">' + displayDisease + '</span></td>' +
          '<td><span class="entity-code">' + displayCode + '</span></td>';

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      tableWrap.appendChild(table);
    }

    section.appendChild(tableWrap);
    container.appendChild(section);
  });
}

/* ====== 搜索高亮 ====== */
function highlightText(text, term) {
  if (!term) return escapeHtml(text);
  var escaped = escapeHtml(text);
  var regex = new RegExp('(' + escapeRegex(term) + ')', 'gi');
  return escaped.replace(regex, '<span class="search-highlight">$1</span>');
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

/* ====== 更新底部统计 ====== */
function updateTotalStats() {
  var totalEntities = 0;
  var totalDimensions = 0;

  SCHEMA_ORDER.forEach(function(dim) {
    var count = (filteredEntities[dim] || []).length;
    if (count > 0) totalDimensions++;
    totalEntities += count;
  });

  /* 显示统计数据 */
  var statsEl = document.getElementById('total-stats');
  var html = '';
  html += '<div class="stat-item">共 <strong>' + totalEntities + '</strong> 个实体</div>';
  html += '<div class="stat-item">分布于 <strong>' + totalDimensions + '</strong> 个维度</div>';
  if (KG_DATA_GLOBAL && KG_DATA_GLOBAL.stats) {
    html += '<div class="stat-item">总节点 <strong>' + KG_DATA_GLOBAL.stats.total_nodes.toLocaleString() + '</strong></div>';
    html += '<div class="stat-item">总关系 <strong>' + KG_DATA_GLOBAL.stats.total_relationships.toLocaleString() + '</strong></div>';
  }
  statsEl.innerHTML = html;
}

/* ====== HTML 转义 ====== */
function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
