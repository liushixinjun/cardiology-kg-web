<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专科知识图谱 · 心血管内科 - 疾病图谱浏览</title>
<link rel="stylesheet" href="./_shared/css/style.css">
<style>
.db{display:flex;height:calc(100vh - 48px)}
.sb{width:300px;min-width:300px;background:var(--bg2);border-right:1px solid var(--rule);display:flex;flex-direction:column;overflow:hidden}
.sb-search{padding:12px;border-bottom:1px solid var(--rule)}
.sb-search input{width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--rule);border-radius:6px;color:var(--ink);font-size:12px;outline:none}
.sb-search input:focus{border-color:var(--accent)}
.sb-tree{flex:1;overflow-y:auto;padding:4px 0}
.sb-tree::-webkit-scrollbar{width:4px}.sb-tree::-webkit-scrollbar-thumb{background:var(--rule);border-radius:2px}
.grp{margin-bottom:1px}
.grp-hd{display:flex;align-items:center;padding:9px 14px;cursor:pointer;user-select:none;transition:background .12s;font-size:11px;font-weight:700;color:var(--muted);gap:6px;letter-spacing:.02em}
.grp-hd:hover{background:var(--bg3);color:var(--ink)}
.grp-hd .arr{font-size:7px;transition:transform .2s;flex-shrink:0;display:inline-block}
.grp-hd.open .arr{transform:rotate(90deg)}
.grp-hd .ic{font-size:13px;flex-shrink:0}
.grp-hd .ct{margin-left:auto;font-size:9px;font-weight:400;color:var(--muted);background:var(--bg3);padding:1px 7px;border-radius:10px}
.grp-items{display:none}.grp.open>.grp-items{display:block}
.di{display:flex;align-items:center;padding:8px 14px 8px 32px;font-size:12px;cursor:pointer;border-left:3px solid transparent;transition:all .1s;gap:8px}
.di:hover{background:rgba(79,140,255,.06)}
.di.active{background:rgba(79,140,255,.1);border-left-color:var(--accent);color:var(--accent)}
.di .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.di .cv{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700;flex-shrink:0;line-height:1}
.mn{flex:1;overflow-y:auto;padding:28px 32px}.mn::-webkit-scrollbar{width:5px}.mn::-webkit-scrollbar-thumb{background:var(--rule);border-radius:3px}
.emp{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:8px}
.emp .big{font-size:48px;opacity:.3}
.dh{margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--rule)}
.dh h2{font-size:24px;font-weight:800;margin-bottom:6px}
.dh .mt{font-size:12px;color:var(--muted);line-height:1.6}
.dh .cd{font-family:monospace;color:var(--accent);font-size:11px}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px;margin-bottom:20px}
.dc{background:var(--bg2);border:1px solid var(--rule);border-radius:10px;padding:16px;transition:all .2s}
.dc:hover{border-color:rgba(79,140,255,.4)}
.dc-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dc-ti{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.dc-cn{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700}
.ok{background:rgba(81,207,102,.12);color:var(--green)}.zz{background:rgba(255,107,107,.12);color:var(--accent2)}
.dc-tg{display:flex;flex-wrap:wrap;gap:6px}
.et{font-size:11px;padding:4px 10px;background:var(--bg3);border-radius:6px;color:var(--ink);border:1px solid var(--rule);cursor:pointer;transition:all .15s;line-height:1.3}
.et:hover{border-color:var(--accent);background:rgba(79,140,255,.08);transform:translateY(-1px);box-shadow:0 3px 10px rgba(79,140,255,.12)}
.rb{margin-top:20px;background:var(--bg2);border:1px solid var(--rule);border-radius:10px;padding:16px}
.rb h3{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--accent)}
.rl{display:flex;flex-wrap:wrap;gap:6px}
.rlt{font-size:10px;padding:4px 10px;background:var(--bg3);border-radius:6px;border:1px solid var(--rule)}.rlt b{color:var(--accent)}
.ep{display:none;position:fixed;right:0;top:48px;width:440px;height:calc(100vh - 48px);background:var(--bg2);border-left:1px solid var(--rule);z-index:200;overflow-y:auto;padding:24px;box-shadow:-6px 0 30px rgba(0,0,0,.4)}
.ep.show{display:block}
.ep::-webkit-scrollbar{width:4px}.ep::-webkit-scrollbar-thumb{background:var(--rule);border-radius:2px}
.ep-cl{position:absolute;top:14px;right:18px;font-size:20px;color:var(--muted);cursor:pointer;background:none;border:none;line-height:1}.ep-cl:hover{color:var(--ink)}
.ep h3{font-size:18px;font-weight:700;color:var(--accent);margin-bottom:4px;padding-right:32px}
.ep .ep-cd{font-family:monospace;font-size:11px;color:var(--muted);margin-bottom:16px}
.er{display:flex;padding:10px 0;border-bottom:1px solid var(--rule)}.er:last-child{border-bottom:none}
.el{width:100px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;flex-shrink:0;padding-top:1px}
.ev{font-size:13px;color:var(--ink);word-break:break-all;line-height:1.6}
.es{margin-top:16px}.es h4{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px}
.ei{font-size:12px;padding:5px 0;color:var(--ink);border-bottom:1px solid var(--rule);line-height:1.4}.ei:last-child{border-bottom:none}
@media(max-width:768px){.sb{width:220px;min-width:220px}.ep{width:100%}.dg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="nav"></div>
<div class="db">
  <div class="sb">
    <div class="sb-search"><input type="text" id="search" placeholder="搜索疾病名称..."></div>
    <div class="sb-tree" id="tree"></div>
  </div>
  <div class="mn" id="main"><div class="emp"><div class="big">🫀</div><div>从左侧选择一种疾病查看详情</div></div></div>
</div>
<div class="ep" id="ep"><button class="ep-cl" onclick="closeEp()">✕</button><div id="epc"></div></div>
<script src="./_shared/js/echarts.min.js"></script>
<script src="./_shared/js/app.js"></script>
<script>
var _cc=null,_gc=null;

loadData(function(){
  renderNav('disease');
  buildTree();
});

function buildTree(){
  var ds=KG_DATA.diseases,gs={};
  Object.keys(ds).forEach(function(c){
    var i=ds[c].info,g=parseParentCode(i.parent).group;
    if(!gs[g])gs[g]=[];
    gs[g].push({c:c,n:i.name,v:getCoverage(c)});
  });
  var html='';
  Object.keys(gs).sort().forEach(function(g){
    var it=gs[g],ic=GROUP_ICONS[g]||'📁';
    html+='<div class="grp open">';
    html+='<div class="grp-hd open" onclick="toggleGrp(this)">';
    html+='<span class="arr">▶</span><span class="ic">'+ic+'</span><span>'+g+'</span>';
    html+='<span class="ct">'+it.length+'</span></div><div class="grp-items">';
    it.sort(function(a,b){return a.n.localeCompare(b.n)}).forEach(function(d){
      var cc=covClass(d.v);
      html+='<div class="di" data-code="'+d.c+'">';
      html+='<span class="nm">'+d.n+'</span><span class="cv '+cc+'">'+Math.round(d.v)+'%</span></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('tree').innerHTML=html;
  document.getElementById('tree').addEventListener('click',function(e){
    var di=e.target.closest('.di');
    if(di)selectDisease(di.dataset.code);
  });
}

function toggleGrp(el){el.parentElement.classList.toggle('open');el.classList.toggle('open')}

document.getElementById('search').addEventListener('input',function(e){
  var kw=e.target.value.toLowerCase();
  document.querySelectorAll('.grp').forEach(function(g){
    var vis=false;
    g.querySelectorAll('.di').forEach(function(d){
      var show=!kw||d.querySelector('.nm').textContent.toLowerCase().indexOf(kw)!==-1||d.dataset.code.toLowerCase().indexOf(kw)!==-1;
      d.style.display=show?'flex':'none';if(show)vis=true;
    });
    g.style.display=vis?'block':'none';
    if(kw&&vis){g.classList.add('open');g.querySelector('.grp-hd').classList.add('open')}
  });
});

function selectDisease(code){
  _cc=code;
  document.querySelectorAll('.di').forEach(function(el){el.classList.toggle('active',el.dataset.code===code)});
  var di=document.querySelector('.di[data-code="'+code+'"]');
  if(di){var grp=di.closest('.grp');if(grp&&!grp.classList.contains('open')){grp.classList.add('open');grp.querySelector('.grp-hd').classList.add('open')}}
  renderDetail(code);
}

function renderDetail(code){
  var d=KG_DATA.diseases[code];if(!d)return;
  var info=d.info,dims=d.dimensions,cv=getCoverage(code),h='';
  h+='<div class="dh"><h2>'+info.name+'</h2>';
  h+='<div class="mt"><span class="cd">'+info.code+'</span>';
  if(info.name_en)h+=' · '+info.name_en;
  h+=' · 覆盖率 <b style="color:var(--accent)">'+Math.round(cv)+'%</b>';
  h+=' · 证据 <b style="color:var(--accent)">'+(d.evidence_count||0)+'</b> 条';
  h+=' · 关系 <b style="color:var(--accent)">'+(d.relations_summary?d.relations_summary.length:0)+'</b> 条</div>';
  if(info.desc)h+='<div class="mt" style="margin-top:8px">'+info.desc+'</div></div>';
  h+='<div class="dg">';
  DIM_KEYS.forEach(function(k){
    var it=dims[k]||[],cnt=it.length,cls=cnt>0?'ok':'zz';
    h+='<div class="dc"><div class="dc-hd"><span class="dc-ti">'+DIM_NAMES[k]+'</span><span class="dc-cn '+cls+'">'+cnt+'</span></div><div class="dc-tg">';
    if(cnt===0)h+='<span style="color:var(--muted);font-size:11px">暂无数据</span>';
    else it.forEach(function(e){h+='<span class="et" data-d="'+code+'" data-dk="'+k+'" data-ec="'+(e.code||'')+'">'+e.name+'</span>'});
    h+='</div></div>';
  });h+='</div>';
  if(d.relations_summary&&d.relations_summary.length>0){
    var rg={};d.relations_summary.forEach(function(r){if(!rg[r.rel])rg[r.rel]=0;rg[r.rel]++});
    h+='<div class="rb"><h3>📊 关系统计 ('+d.relations_summary.length+' 条)</h3><div class="rl">';
    Object.keys(rg).sort(function(a,b){return rg[b]-rg[a]}).forEach(function(r){h+='<span class="rlt">'+r+' <b>'+rg[r]+'</b></span>'});
    h+='</div></div>';
  }
  h+='<div style="margin-top:20px"><div id="mg" style="width:100%;height:450px;background:var(--bg2);border:1px solid var(--rule);border-radius:10px"></div></div>';
  document.getElementById('main').innerHTML=h;
  document.getElementById('main').scrollTop=0;
  document.querySelectorAll('.et[data-d]').forEach(function(el){
    el.addEventListener('click',function(){showEp(el.dataset.d,el.dataset.dk,el.dataset.ec)});
  });
  setTimeout(function(){renderGraph(code)},150);
}

function showEp(dc,dk,ec){
  var d=KG_DATA.diseases[dc],it=d.dimensions[dk]||[],en=null;
  for(var i=0;i<it.length;i++){if(it[i].code===ec){en=it[i];break}}
  if(!en)return;
  var h='<h3>'+en.name+'</h3><div class="ep-cd">'+(en.code||'N/A')+' · '+DIM_NAMES[dk]+' · '+d.info.name+'</div>';
  [['疾病',d.info.name+' ('+d.info.code+')'],['维度',DIM_NAMES[dk]+' ('+dk+')'],['实体名称',en.name],['实体编码',en.code||'无'],['同维度总数',it.length+' 个'+DIM_NAMES[dk]],['疾病证据数',(d.evidence_count||0)+' 条'],['疾病关系数',(d.relations_summary?d.relations_summary.length:0)+' 条']].forEach(function(r){h+='<div class="er"><div class="el">'+r[0]+'</div><div class="ev">'+r[1]+'</div></div>'});
  h+='<div class="es"><h4>📋 同维度其他'+DIM_NAMES[dk]+'</h4>';
  it.forEach(function(e){if(e.code!==ec)h+='<div class="ei">'+e.name+(e.code?' <span style="color:var(--muted);font-size:10px">('+e.code+')</span>':'')+'</div>'});
  h+='</div>';
  if(d.relations_summary){
    var rs=d.relations_summary.filter(function(r){return r.name===en.name});
    if(rs.length>0){h+='<div class="es"><h4>🔗 关联关系 ('+rs.length+')</h4>';rs.forEach(function(r){h+='<div class="ei">→ <b>'+r.rel+'</b> → '+r.name+' <span style="color:var(--muted);font-size:10px">['+r.labels.join(', ')+']</span></div>'});h+='</div>'}
  }
  document.getElementById('epc').innerHTML=h;document.getElementById('ep').classList.add('show');
}
function closeEp(){document.getElementById('ep').classList.remove('show')}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeEp()});

function renderGraph(code){
  var c=document.getElementById('mg');if(!c)return;
  if(_gc)_gc.dispose();
  _gc=echarts.init(c,null,{renderer:'svg'});
  var d=KG_DATA.diseases[code],info=d.info,ns=[],ls=[];
  ns.push({name:info.name,symbolSize:60,category:0,itemStyle:{color:'#4f8cff',shadowBlur:25,shadowColor:'rgba(79,140,255,0.7)'},label:{fontSize:14,fontWeight:'bold',color:'#fff'}});
  var cs=['#51cf66','#ff6b6b','#ffd43b','#ff922b','#cc5de8','#22b8cf','#748ffc','#f06595','#94d82d','#fab005','#15aabf','#e599f7','#66d9e8','#fcc419','#a9e34b','#da77f2','#63e6be'];
  DIM_KEYS.forEach(function(k,idx){
    var it=d.dimensions[k]||[];
    if(it.length>0){
      var dn=DIM_NAMES[k];
      ns.push({name:dn+' ('+it.length+')',symbolSize:Math.min(16+it.length*2,45),category:idx+1,itemStyle:{color:cs[idx],shadowBlur:10,shadowColor:cs[idx]+'66'},label:{fontSize:11,fontWeight:'bold',color:'#fff'}});
      ls.push({source:info.name,target:dn+' ('+it.length+')',lineStyle:{width:3,color:cs[idx],opacity:0.7}});
      it.slice(0,10).forEach(function(e){
        ns.push({name:e.name,symbolSize:12,category:idx+1,itemStyle:{color:cs[idx]+'bb'}});
        ls.push({source:dn+' ('+it.length+')',target:e.name,lineStyle:{width:1.5,color:cs[idx]+'66',opacity:0.5}});
      });
    }
  });
  _gc.setOption({tooltip:{formatter:function(p){return p.dataType==='node'?p.name:p.data.source+' → '+p.data.target}},animationDuration:600,series:[{type:'graph',layout:'force',data:ns,links:ls,roam:true,label:{show:true,fontSize:9,color:'#e8eaf0'},lineStyle:{curveness:0.15,opacity:0.6},emphasis:{focus:'adjacency',lineStyle:{width:5}},force:{repulsion:160,gravity:0.06,edgeLength:[50,200],friction:0.6}}]});
  window.addEventListener('resize',function(){if(_gc)_gc.resize()});
}
</script>
</body>
</html>
