<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专科知识图谱 · 心血管内科 - 图谱关系可视化</title>
<link rel="stylesheet" href="./_shared/css/style.css">
<style>
/* Graph specific styles */
.graph-controls { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; background: var(--bg2); border: 1px solid var(--rule); border-radius: 10px; padding: 16px; }
.control-group { display: flex; align-items: center; gap: 8px; }
.control-label { font-size: 12px; font-weight: 600; color: var(--muted); white-space: nowrap; }
.control-select { background: var(--bg3); border: 1px solid var(--rule); border-radius: 6px; padding: 8px 12px; color: var(--ink); font-size: 13px; outline: none; min-width: 200px; }
.control-select:focus { border-color: var(--accent); }
.control-btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-outline { background: transparent; border: 1px solid var(--rule); color: var(--muted); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.graph-container { background: var(--bg2); border: 1px solid var(--rule); border-radius: 10px; padding: 20px; min-height: 700px; }
.graph-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--ink); }
.graph-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
#graph-chart { width: 100%; height: 600px; }
.graph-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--rule); }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.legend-color { width: 12px; height: 12px; border-radius: 3px; }
.no-selection { display: flex; align-items: center; justify-content: center; height: 600px; color: var(--muted); font-size: 14px; }
@media (max-width: 768px) { .graph-controls { flex-direction: column; align-items: flex-start; } }
</style>
</head>
<body>
<div class="nav"></div>
<div class="modal-overlay" id="entity-modal">
  <div class="modal" id="modal-content"></div>
</div>
<div class="page">
  <div class="page-header">
    <h1>图谱预览</h1>
    <div class="subtitle">可视化疾病知识图谱关系</div>
  </div>
  
  <div class="graph-controls">
    <div class="control-group">
      <span class="control-label">选择疾病：</span>
      <select class="control-select" id="disease-select" onchange="onDiseaseSelect()">
        <option value="">请选择疾病</option>
      </select>
    </div>
    <div class="control-group">
      <button class="control-btn btn-primary" onclick="renderGraph()">生成图谱</button>
      <button class="control-btn btn-outline" onclick="resetGraph()">重置视图</button>
    </div>
  </div>
  
  <div class="graph-container">
    <div class="graph-title" id="graph-title">疾病知识图谱</div>
    <div class="graph-info" id="graph-info">请选择疾病后点击"生成图谱"</div>
    <div id="graph-chart">
      <div class="no-selection" id="no-graph">← 请先选择一种疾病</div>
    </div>
  </div>
</div>

<script src="./_shared/js/app.js"></script>
<script src="./_shared/js/echarts.min.js"></script>
<script>
var graphChart = null;
var selectedDisease = null;

// Color palette for dimensions
var DIM_COLORS = ['#51cf66', '#ff6b6b', '#ffd43b', '#ff922b', '#cc5de8', '#22b8cf', '#748ffc', '#f06595', '#94d82d', '#fab005', '#15aabf', '#e599f7', '#66d9e8', '#fcc419', '#a9e34b', '#da77f2', '#63e6be'];

// Initialize page
loadData(function(d) {
  renderNav('graph');
  populateDiseaseSelect(d);
});

function populateDiseaseSelect(d) {
  var select = document.getElementById('disease-select');
  var html = '<option value="">请选择疾病</option>';
  
  // Group diseases by category
  var groups = {};
  Object.keys(d.diseases).forEach(function(code) {
    var disease = d.diseases[code];
    var parent = disease.info.parent;
    var groupName = parseParentCode(parent).group;
    
    if (!groups[groupName]) groups[groupName] = [];
    groups[groupName].push({ code: code, name: disease.info.name });
  });
  
  // Sort groups and diseases
  Object.keys(groups).sort().forEach(function(groupName) {
    html += '<optgroup label="' + groupName + '">';
    groups[groupName].sort(function(a, b) { return a.name.localeCompare(b.name); });
    groups[groupName].forEach(function(disease) {
      html += '<option value="' + disease.code + '">' + disease.name + '</option>';
    });
    html += '</optgroup>';
  });
  
  select.innerHTML = html;
}

function onDiseaseSelect() {
  selectedDisease = document.getElementById('disease-select').value;
  if (selectedDisease) {
    renderGraph();
  }
}

function renderGraph() {
  if (!selectedDisease) {
    alert('请先选择一种疾病');
    return;
  }
  
  var data = KG_DATA.diseases[selectedDisease];
  if (!data) {
    alert('未找到疾病数据');
    return;
  }
  
  // Hide no-selection message
  document.getElementById('no-graph').style.display = 'none';
  
  // Update info
  var coverage = getCoverage(selectedDisease);
  document.getElementById('graph-title').textContent = data.info.name + ' 知识图谱';
  document.getElementById('graph-info').textContent = '覆盖率: ' + Math.round(coverage) + '% | 证据数: ' + (data.evidence_count || 0) + ' | 关系数: ' + (data.relations_summary ? data.relations_summary.length : 0);
  
  // Initialize chart
  var container = document.getElementById('graph-chart');
  if (graphChart) graphChart.dispose();
  graphChart = echarts.init(container, null, { renderer: 'svg' });
  
  // Build nodes and links
  var nodes = [];
  var links = [];
  var categories = [];
  
  // Center node (disease)
  nodes.push({
    name: data.info.name,
    symbolSize: 60,
    category: 0,
    itemStyle: {
      color: '#4f8cff',
      shadowBlur: 20,
      shadowColor: 'rgba(79, 140, 255, 0.5)'
    },
    label: {
      fontSize: 14,
      fontWeight: 'bold',
      color: '#fff'
    }
  });
  categories.push({ name: data.info.name });
  
  // Dimension nodes and entity nodes
  DIM_KEYS.forEach(function(dimKey, idx) {
    var items = data.dimensions[dimKey] || [];
    if (items.length > 0) {
      var dimNodeName = DIM_NAMES[dimKey] + ' (' + items.length + ')';
      
      // Dimension node
      nodes.push({
        name: dimNodeName,
        symbolSize: 30,
        category: idx + 1,
        itemStyle: {
          color: DIM_COLORS[idx],
          shadowBlur: 10,
          shadowColor: DIM_COLORS[idx] + '66'
        },
        label: {
          fontSize: 11,
          fontWeight: 'bold',
          color: '#fff'
        }
      });
      
      // Link from disease to dimension
      links.push({
        source: data.info.name,
        target: dimNodeName,
        lineStyle: {
          width: 3,
          color: DIM_COLORS[idx],
          opacity: 0.7
        }
      });
      
      // Entity nodes (limit to 10 for performance)
      items.slice(0, 10).forEach(function(item) {
        nodes.push({
          name: item.name,
          symbolSize: 12,
          category: idx + 1,
          itemStyle: {
            color: DIM_COLORS[idx] + 'aa'
          }
        });
        
        // Link from dimension to entity
        links.push({
          source: dimNodeName,
          target: item.name,
          lineStyle: {
            width: 1.5,
            color: DIM_COLORS[idx] + '55',
            opacity: 0.5
          }
        });
      });
      
      categories.push({ name: DIM_NAMES[dimKey] });
    }
  });
  
  // Set chart options
  graphChart.setOption({
    tooltip: {
      formatter: function(params) {
        if (params.dataType === 'node') {
          return '<b>' + params.name + '</b>';
        } else {
          return params.data.source + ' → ' + params.data.target;
        }
      }
    },
    animationDuration: 800,
    series: [{
      type: 'graph',
      layout: 'force',
      data: nodes,
      links: links,
      categories: categories,
      roam: true,
      label: {
        show: true,
        fontSize: 10,
        color: '#e8eaf0'
      },
      lineStyle: {
        curveness: 0.15,
        opacity: 0.6
      },
      edgeLabel: {
        show: false
      },
      emphasis: {
        focus: 'adjacency',
        lineStyle: {
          width: 5
        }
      },
      force: {
        repulsion: 150,
        gravity: 0.08,
        edgeLength: [60, 180],
        friction: 0.6
      }
    }]
  });
  
  // Resize handler
  window.addEventListener('resize', function() {
    if (graphChart) graphChart.resize();
  });
  
  // Build legend
  buildLegend(categories, DIM_COLORS);
}

function buildLegend(categories, colors) {
  var legendContainer = document.querySelector('.graph-container');
  var existingLegend = legendContainer.querySelector('.graph-legend');
  if (existingLegend) existingLegend.remove();
  
  var legend = document.createElement('div');
  legend.className = 'graph-legend';
  
  categories.forEach(function(cat, idx) {
    var item = document.createElement('div');
    item.className = 'legend-item';
    
    var colorBox = document.createElement('div');
    colorBox.className = 'legend-color';
    colorBox.style.backgroundColor = idx === 0 ? '#4f8cff' : colors[idx - 1];
    
    var label = document.createElement('span');
    label.textContent = cat.name;
    
    item.appendChild(colorBox);
    item.appendChild(label);
    legend.appendChild(item);
  });
  
  legendContainer.appendChild(legend);
}

function resetGraph() {
  if (graphChart) {
    graphChart.dispatchAction({
      type: 'restore'
    });
  }
}
</script>
</body>
</html>
