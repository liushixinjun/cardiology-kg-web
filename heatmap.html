<link rel="stylesheet" href="./_shared/css/style.css">
<style>
.hm-container{background:var(--bg2);border:1px solid var(--rule);border-radius:12px;padding:24px;margin-bottom:24px}
.hm-title-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.hm-title{font-size:18px;font-weight:700;color:var(--ink)}
.hm-help-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--rule);background:var(--bg3);color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.hm-help-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,140,255,.08)}
.hm-subtitle{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.7}
.hm-help-panel{display:none;background:var(--bg3);border:1px solid var(--rule);border-radius:10px;padding:16px;margin-bottom:18px;animation:hmFadeIn .2s ease}
.hm-help-panel.show{display:block}
@keyframes hmFadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.hm-help-panel h3{font-size:14px;font-weight:800;color:var(--ink);margin-bottom:10px}
.hm-help-panel ul{list-style:none;padding:0;margin:0}
.hm-help-panel li{font-size:13px;color:var(--muted);line-height:1.7;padding:4px 0;display:flex;align-items:flex-start;gap:8px}
.hm-help-panel li::before{content:'●';color:var(--accent);font-size:8px;margin-top:6px;flex-shrink:0}
#heatmap-chart{width:100%;height:1100px}
.hm-legend{display:flex;align-items:center;justify-content:center;margin-top:16px;gap:16px}

</style>
</head>
<body>
<div class="nav"></div>
<div class="page">
  <div class="page-header">
    <h1>📊 数据覆盖分析</h1>
    <div class="subtitle">77种专病 × 17个知识维度的数据覆盖热力图</div>
  </div>

  <div class="hm-container">
    <div class="hm-title-row">
      <div class="hm-title">疾病维度覆盖热力图</div>
      <button class="hm-help-btn" onclick="toggleHelp()" title="使用帮助">?</button>
    </div>
    <div class="hm-subtitle">颜色表示每个专病在各知识维度上的实体数量：颜色越深表示该维度沉淀越多，空白表示暂无数据。用于快速定位哪些疾病的哪些维度需要优先补齐。</div>
    <div class="hm-help-panel" id="hm-help">
      <h3>如何使用</h3>
      <ul>
        <li>横轴是17个知识维度（症状、体征、检查、检验、药物、治疗方案等），纵轴是77种专病</li>
        <li>颜色越深说明该疾病在该维度已有较多实体数据，空白或深色说明数据缺失或为零</li>
        <li>鼠标悬浮到任意格子上，会弹出该疾病在该维度的具体实体数量</li>
        <li>点击任意格子可跳转到该疾病的详情页，查看具体实体内容</li>
      </ul>
    </div>
    <div id="heatmap-chart"></div>
    <div class="hm-legend">
      <div class="hm-legend-item"><div class="hm-legend-color" style="background:#1a1d27"></div><span>无数据</span></div>
      <div class="hm-legend-item"><div class="hm-legend-color" style="background:#4f8cff"></div><span>少量实体</span></div>
      <div class="hm-legend-item"><div class="hm-legend-color" style="background:#22b8cf"></div><span>中等实体</span></div>
      <div class="hm-legend-item"><div class="hm-legend-color" style="background:#51cf66"></div><span>充足实体</span></div>
    </div>
  </div>
</div>
<script src="./_shared/js/app.js"></script>
<script src="./_shared/js/echarts.min.js"></script>
<script>
loadData(function(d){
  renderNav('heatmap');
  var codes = Object.keys(d.diseases);
  var loaded = 0;
  var total = codes.length;
  codes.forEach(function(code) {
    loadDiseaseData(code, function() {
      loaded++;
      if (loaded === total) {
        renderHeatmap(d);
      }
    });
  });
});
function toggleHelp(){var p=document.getElementById('hm-help');if(p){p.classList.toggle('show');}}
function renderHeatmap(d){
  var container=document.getElementById('heatmap-chart');
  var chart=echarts.init(container,null,{renderer:'canvas'});
  var diseases=Object.keys(d.diseases);
  var dimensions=DIM_KEYS;
  var data=[],maxCount=0;
  diseases.forEach(function(dc,di){
    var disease=d.diseases[dc];
    dimensions.forEach(function(dk,ki){
      var it=disease.dimensions[dk]||[];
      var cnt=it.length;
      if(cnt>maxCount)maxCount=cnt;
      data.push([ki,di,cnt]);
    });
  });
  var xLabels=dimensions.map(function(k){return DIM_NAMES[k]});
  var yLabels=diseases.map(function(c){return d.diseases[c].info.name});
  chart.setOption({
    tooltip:{
      position:'top',
      formatter:function(p){
        var di=p.data[0],ci=p.data[1],cnt=p.data[2];
        var names=['症状','体征','检查','检验','药物','手术','危险因素','并发症','鉴别诊断','风险分层','预后','随访','治疗方案','诊断标准','病因','流行病学','病理生理'];
        var dimName=names[di]||xLabels[di];
        var diseaseName=yLabels[ci];
        return '<div style="font-weight:700;margin-bottom:4px">'+diseaseName+'</div><div>'+dimName+': <span style="color:#4f8cff;font-weight:700">'+cnt+'</span> 个实体</div>';
      }
    },
    grid:{top:100,bottom:120,left:210,right:40},
    xAxis:{
      type:'category',
      data:xLabels,
      position:'top',
      axisLabel:{rotate:45,fontSize:13,fontWeight:'bold',color:'#e8eaf0',interval:0},
      splitLine:{show:true,lineStyle:{color:'#2e3348'}},
      axisTick:{show:false},
      axisLine:{show:false}
    },
    yAxis:{
      type:'category',
      data:yLabels,
      axisLabel:{fontSize:11,color:'#e8eaf0'},
      splitLine:{show:true,lineStyle:{color:'#2e3348'}},
      axisTick:{show:false},
      axisLine:{show:false}
    },
    visualMap:{
      min:0,
      max:Math.max(maxCount,1),
      calculable:true,
      orient:'horizontal',
      left:'center',
      bottom:10,
      inRange:{color:['#1a1d27','#4f8cff','#22b8cf','#51cf66']},
      textStyle:{color:'#8b90a0'}
    },
    series:[{
      name:'实体数量',
      type:'heatmap',
      data:data,
      label:{show:false},
      emphasis:{itemStyle:{shadowBlur:10,shadowColor:'rgba(0,0,0,0.5)'}},
      itemStyle:{borderColor:'#1a1d27',borderWidth:2,borderRadius:3}
    }]
  });
  chart.on('click',function(params){
    if(params.componentType==='series'){
      var ci=params.data[1];
      var dc=diseases[ci];
      window.location.href='explore.html#'+dc;
    }
  });
  window.addEventListener('resize',function(){chart.resize()});
}
</script>
</body>
</html>
