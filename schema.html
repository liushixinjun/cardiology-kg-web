<link rel="stylesheet" href="./_shared/css/style.css">
<style>
.s-schema-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.s-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--bg2);border:1px solid var(--rule);border-radius:10px;overflow:hidden}
.s-tab{flex:1;padding:12px 16px;text-align:center;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;border-bottom:2px solid transparent}
.s-tab:hover{color:var(--ink);background:var(--bg3)}
.s-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg3)}
.s-search{display:flex;gap:12px;margin-bottom:20px}
.s-search input{flex:1;padding:10px 14px;border:1px solid var(--rule);border-radius:8px;background:var(--bg2);color:var(--ink);font-size:13px;outline:none;transition:border-color .2s}
.s-search input:focus{border-color:var(--accent)}
.s-search input::placeholder{color:var(--muted)}
.s-panel{display:none}
.s-panel.active{display:block}
.s-entity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.s-entity-card{background:var(--bg2);border:1px solid var(--rule);border-radius:10px;padding:16px;transition:border-color .2s,transform .15s}
.s-entity-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.s-entity-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.s-entity-cn{font-size:15px;font-weight:700;color:var(--ink)}
.s-entity-code{font-size:11px;padding:2px 8px;background:rgba(79,140,255,.08);border-radius:4px;color:var(--accent);font-family:'SF Mono','Cascadia Code','Consolas',monospace}
.s-entity-count{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:6px}
.s-entity-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.s-entity-props{display:flex;flex-wrap:wrap;gap:4px}
.s-prop-tag{font-size:10px;padding:2px 6px;background:var(--bg3);border-radius:4px;color:var(--muted);font-family:'SF Mono','Cascadia Code','Consolas',monospace}
.s-rel-table{width:100%;border-collapse:collapse;font-size:12px}
.s-rel-table th{background:var(--bg3);padding:10px 14px;text-align:left;font-weight:700;color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:.04em;position:sticky;top:0;z-index:1}
.s-rel-table td{padding:10px 14px;border-bottom:1px solid var(--rule);vertical-align:top}
.s-rel-table tr:hover td{background:var(--bg3)}
.s-rel-name{font-weight:600;color:var(--ink);white-space:nowrap}
.s-rel-mapping{font-family:'SF Mono','Cascadia Code','Consolas',monospace;color:#cc5de8;font-size:11px;white-space:nowrap}
.s-rel-desc{color:var(--muted);font-size:12px;line-height:1.5;max-width:400px}
.s-rel-cnt{text-align:right;font-weight:700;color:var(--accent);white-space:nowrap}
.s-cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.s-cat-card{background:var(--bg2);border:1px solid var(--rule);border-radius:10px;padding:16px;transition:border-color .2s}
.s-cat-card:hover{border-color:var(--accent)}
.s-cat-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.s-cat-badge{font-size:11px;color:var(--accent);background:rgba(79,140,255,.1);padding:2px 10px;border-radius:10px;font-weight:600}
.s-cat-list{list-style:none;padding:0;margin:0}
.s-cat-list li{padding:5px 0;border-bottom:1px solid var(--rule);font-size:12px;color:var(--muted);display:flex;align-items:center}
.s-cat-list li::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--accent);margin-right:8px;flex-shrink:0}
.s-cat-list li:last-child{border-bottom:none}
.s-cat-list li:hover{color:var(--ink)}
.s-empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
@media(max-width:768px){.s-schema-stats{grid-template-columns:repeat(2,1fr)}.s-entity-grid{grid-template-columns:1fr}.s-cat-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="nav"></div>
<div class="page">
  <div class="page-header">
    <h1>📐 图谱数据字典</h1>
    <div class="subtitle">专科知识图谱 · 心血管内科 — 数据结构定义、实体类型、关系类型与疾病分类浏览</div>
  </div>

  <div class="s-schema-stats" id="stats-row"></div>

  <div class="s-tabs">
    <div class="s-tab active" onclick="switchTab('entity')">实体类型</div>
    <div class="s-tab" onclick="switchTab('relation')">关系类型</div>
    <div class="s-tab" onclick="switchTab('category')">疾病分类</div>
  </div>

  <div class="s-search" id="search-bar">
    <input type="text" id="search-input" placeholder="搜索实体类型名称、英文代码、属性名..." oninput="filterContent()">
  </div>

  <div class="s-panel active" id="panel-entity"></div>
  <div class="s-panel" id="panel-relation"></div>
  <div class="s-panel" id="panel-category"></div>
</div>

<script src="./_shared/js/app.js"></script>
<script>
var ALL_DATA=null;
var ENTITY_DEFS=[
  {code:'Disease',cn:'疾病',desc:'心血管内科的各种疾病实体，作为图谱核心节点',props:['name','icd_code','category','severity','onset','schema_version']},
  {code:'Specialty',cn:'专科',desc:'医学专科分类领域，如心血管内科',props:['name','code','description','level']},
  {code:'DiseaseCategory',cn:'疾病大类',desc:'疾病的一级分类，如冠心病、心力衰竭等',props:['name','code','description','order']},
  {code:'DiseaseSubcategory',cn:'疾病亚类',desc:'疾病大类下的二级细分分类',props:['name','code','description','parent_category']},
  {code:'Etiology',cn:'病因',desc:'导致疾病发生的原因和危险因素',props:['name','type','mechanism','evidence_level']},
  {code:'Epidemiology',cn:'流行病学',desc:'疾病在人群中的分布特征：发病率、患病率、死亡率等',props:['name','incidence','prevalence','mortality','risk_groups']},
  {code:'Pathophysiology',cn:'病理生理',desc:'疾病发生发展的病理生理机制',props:['name','mechanism','stages','key_factors']},
  {code:'Symptom',cn:'症状',desc:'患者主观感受到的异常，如胸痛、呼吸困难',props:['name','severity','onset','duration','location']},
  {code:'Sign',cn:'体征',desc:'医生通过体格检查发现的客观表现',props:['name','severity','location','method','frequency']},
  {code:'RiskFactor',cn:'危险因素',desc:'增加疾病发生风险的因素，如高血压、糖尿病',props:['name','type','odds_ratio','modifiable','prevalence']},
  {code:'Complication',cn:'并发症',desc:'疾病发展过程中出现的并发状况',props:['name','severity','incidence','onset_time','prognosis']},
  {code:'Exam',cn:'检查',desc:'用于诊断疾病的辅助检查项目，如心电图、超声心动图',props:['name','type','sensitivity','specificity','cost']},
  {code:'ExamIndicator',cn:'检查指标',desc:'检查项目中的具体量化指标',props:['name','unit','normal_range','clinical_significance']},
  {code:'LabTest',cn:'检验',desc:'实验室检查项目，如血常规、心肌酶谱',props:['name','type','specimen','turnaround_time','cost']},
  {code:'DiagnosisCriteria',cn:'诊断标准',desc:'疾病诊断的金标准或共识标准',props:['name','source','sensitivity','specificity','criteria_list']},
  {code:'RiskStratification',cn:'风险分层',desc:'根据危险因素对疾病严重程度进行分层',props:['name','criteria','risk_level','mortality_rate','treatment_implication']},
  {code:'Medication',cn:'药物',desc:'用于治疗疾病的药物',props:['name','category','mechanism','dosage','side_effects']},
  {code:'Procedure',cn:'手术/操作',desc:'用于治疗疾病的手术或介入操作',props:['name','type','indication','contraindication','complication_rate']},
  {code:'TreatmentPlan',cn:'治疗方案',desc:'针对疾病的标准治疗方案',props:['name','type','components','duration','efficacy']},
  {code:'Prognosis',cn:'预后',desc:'疾病的预期发展过程和结局',props:['name','survival_rate','recurrence_rate','quality_of_life','factors']},
  {code:'FollowUp',cn:'随访',desc:'疾病治疗后的随访计划和监测指标',props:['name','interval','duration','monitoring_items','goals']},
  {code:'DifferentialDiagnosis',cn:'鉴别诊断',desc:'需要与当前疾病进行鉴别诊断的其他疾病',props:['name','similarity','distinguishing_features','key_differences']},
  {code:'Evidence',cn:'证据',desc:'支持疾病知识的证据来源，如教材章节、指南条目',props:['name','type','source','level','year']},
  {code:'Guideline',cn:'指南',desc:'临床实践指南，如ACC/AHA、ESC等权威指南',props:['name','organization','year','version','recommendation_level']},
  {code:'ThresholdRule',cn:'阈值规则',desc:'检验检查的临界值判定规则',props:['name','parameter','operator','value','clinical_significance']}
];
var REL_DEFS={
  'supported_by_evidence':{mapping:'Evidence → Entity',desc:'证据支持关系'},
  'guideline_has_evidence':{mapping:'Guideline → Evidence',desc:'指南包含证据'},
  'has_symptom':{mapping:'Disease → Symptom',desc:'疾病具有症状'},
  'based_on_guideline':{mapping:'Entity → Guideline',desc:'基于指南'},
  'has_sign':{mapping:'Disease → Sign',desc:'疾病具有体征'},
  'requires_exam':{mapping:'Disease → Exam',desc:'疾病需要检查'},
  'may_cause_complication':{mapping:'Disease → Complication',desc:'疾病可能导致并发症'},
  'has_risk_factor':{mapping:'Disease → RiskFactor',desc:'疾病具有危险因素'},
  'treated_by_medication':{mapping:'Disease → Medication',desc:'疾病通过药物治疗'},
  'has_treatment_plan':{mapping:'Disease → TreatmentPlan',desc:'疾病具有治疗方案'},
  'has_threshold_rule':{mapping:'Exam/LabTest → ThresholdRule',desc:'检查具有阈值规则'},
  'requires_lab_test':{mapping:'Disease → LabTest',desc:'疾病需要检验'},
  'treated_by_procedure':{mapping:'Disease → Procedure',desc:'疾病通过手术治疗'},
  'has_etiology':{mapping:'Disease → Etiology',desc:'疾病具有病因'},
  'differentiates_from':{mapping:'Disease → Disease',desc:'鉴别诊断关系'},
  'has_prognosis':{mapping:'Disease → Prognosis',desc:'疾病具有预后'},
  'belongs_to_category':{mapping:'Disease → DiseaseCategory',desc:'疾病属于分类'},
  'belongs_to_subcategory':{mapping:'Disease → DiseaseSubcategory',desc:'疾病属于亚类'},
  'has_disease':{mapping:'DiseaseCategory → Disease',desc:'分类包含疾病'},
  'has_pathophysiology':{mapping:'Disease → Pathophysiology',desc:'疾病具有病理生理'},
  'has_diagnostic_criteria':{mapping:'Disease → DiagnosisCriteria',desc:'疾病具有诊断标准'},
  'has_follow_up':{mapping:'Disease → FollowUp',desc:'疾病具有随访'},
  'has_risk_stratification':{mapping:'Disease → RiskStratification',desc:'疾病具有风险分层'},
  'has_epidemiology':{mapping:'Disease → Epidemiology',desc:'疾病具有流行病学'},
  'has_subcategory':{mapping:'DiseaseCategory → DiseaseSubcategory',desc:'分类具有亚类'},
  'has_category':{mapping:'Specialty → DiseaseCategory',desc:'专科具有分类'},
  'exam_has_indicator':{mapping:'Exam → ExamIndicator',desc:'检查具有指标'},
  'lab_test_has_indicator':{mapping:'LabTest → ExamIndicator',desc:'检验具有指标'}
};

loadData(function(d){
  ALL_DATA=d;
  renderNav('schema');
  renderStats(d);
  renderEntityPanel(d);
  renderRelationPanel(d);
  renderCategoryPanel(d);
});

function renderStats(d){
  var et=d.stats.entity_types,rt=d.stats.rel_types;
  var eTypes=Object.keys(et).length,rTypes=Object.keys(rt).length;
  var html='<div class="stat-card"><div class="stat-num">'+d.stats.disease_count+'</div><div class="stat-label">疾病种类</div></div>';
  html+='<div class="stat-card"><div class="stat-num">'+d.stats.total_nodes.toLocaleString()+'</div><div class="stat-label">实体节点</div></div>';
  html+='<div class="stat-card"><div class="stat-num">'+eTypes+'</div><div class="stat-label">实体类型</div></div>';
  html+='<div class="stat-card"><div class="stat-num">'+rTypes+'</div><div class="stat-label">关系类型</div></div>';
  document.getElementById('stats-row').innerHTML=html;
}

function switchTab(tab){
  document.querySelectorAll('.s-tab').forEach(function(t,i){
    var tabs=['entity','relation','category'];
    t.classList.toggle('active',tabs[i]===tab);
  });
  document.querySelectorAll('.s-panel').forEach(function(p){p.classList.remove('active')});
  document.getElementById('panel-'+tab).classList.add('active');
  document.getElementById('search-input').value='';
  filterContent();
}

function filterContent(){
  var q=document.getElementById('search-input').value.toLowerCase().trim();
  var active=document.querySelector('.s-tab.active');
  if(!active)return;
  var tabText=active.textContent;
  if(tabText==='实体类型')filterEntity(q);
  else if(tabText==='关系类型')filterRelation(q);
  else if(tabText==='疾病分类')filterCategory(q);
}

function renderEntityPanel(d){
  var container=document.getElementById('panel-entity');
  var et=d.stats.entity_types;
  var html='<div class="s-entity-grid">';
  ENTITY_DEFS.forEach(function(def){
    var count=et[def.code]||0;
    html+='<div class="s-entity-card" data-search="'+(def.cn+def.code+def.props.join(' ')).toLowerCase()+'">';
    html+='<div class="s-entity-head"><span class="s-entity-cn">'+def.cn+'</span><span class="s-entity-code">'+def.code+'</span></div>';
    html+='<div class="s-entity-count">'+count.toLocaleString()+'</div>';
    html+='<div class="s-entity-desc">'+def.desc+'</div>';
    html+='<div class="s-entity-props">';
    def.props.forEach(function(p){html+='<span class="s-prop-tag">'+p+'</span>'});
    html+='</div></div>';
  });
  html+='</div>';
  container.innerHTML=html;
}

function filterEntity(q){
  document.querySelectorAll('#panel-entity .s-entity-card').forEach(function(card){
    var s=card.getAttribute('data-search')||'';
    card.style.display=(!q||s.indexOf(q)!==-1)?'':'none';
  });
}

function renderRelationPanel(d){
  var container=document.getElementById('panel-relation');
  var rt=d.stats.rel_types;
  var sorted=Object.keys(rt).sort(function(a,b){return rt[b]-rt[a]});
  var html='<div style="overflow-x:auto"><table class="s-rel-table"><thead><tr><th style="width:40px">#</th><th>关系名称</th><th style="text-align:right">数量</th><th>方向映射</th><th>说明</th></tr></thead><tbody>';
  sorted.forEach(function(rel,i){
    var cnt=rt[rel];
    var def=REL_DEFS[rel]||{mapping:'-',desc:'-'};
    html+='<tr data-search="'+(rel+def.mapping+def.desc).toLowerCase()+'">';
    html+='<td style="color:var(--muted);font-weight:700">'+(i+1)+'</td>';
    html+='<td class="s-rel-name">'+rel+'</td>';
    html+='<td class="s-rel-cnt">'+cnt.toLocaleString()+'</td>';
    html+='<td class="s-rel-mapping">'+def.mapping+'</td>';
    html+='<td class="s-rel-desc">'+def.desc+'</td>';
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  container.innerHTML=html;
}

function filterRelation(q){
  document.querySelectorAll('#panel-relation .s-rel-table tbody tr').forEach(function(tr){
    var s=tr.getAttribute('data-search')||'';
    tr.style.display=(!q||s.indexOf(q)!==-1)?'':'none';
  });
}

function renderCategoryPanel(d){
  var container=document.getElementById('panel-category');
  var diseases=d.diseases||{};
  var groups={};
  Object.keys(diseases).forEach(function(code){
    var info=diseases[code].info;
    var g=parseParentCode(info.parent).group;
    if(!groups[g])groups[g]=[];
    groups[g].push(info.name||code);
  });
  var html='<div class="s-cat-grid">';
  Object.keys(groups).sort().forEach(function(name){
    var list=groups[name];
    html+='<div class="s-cat-card" data-search="'+name.toLowerCase()+'">';
    html+='<div class="s-cat-title"><span>'+name+'</span><span class="s-cat-badge">'+list.length+' 种疾病</span></div>';
    html+='<ul class="s-cat-list">';
    list.sort().forEach(function(n){html+='<li>'+n+'</li>'});
    html+='</ul></div>';
  });
  html+='</div>';
  container.innerHTML=html;
}

function filterCategory(q){
  document.querySelectorAll('#panel-category .s-cat-card').forEach(function(card){
    var s=card.getAttribute('data-search')||'';
    card.style.display=(!q||s.indexOf(q)!==-1)?'':'none';
  });
}
</script>
</body>
</html>
