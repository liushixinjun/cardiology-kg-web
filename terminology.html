<script>
/* ================================================================
   Medical Terminology Knowledge Base — 心血管医学术语知识库
   ================================================================ */

var DIM_DESC = {
  Symptom: '症状（Symptom）是患者主观感受到的不适或异常感觉，如胸痛、呼吸困难、心悸等。症状是临床诊断的第一线索，也是患者就诊的主要原因。',
  Sign: '体征（Sign）是医生通过视诊、触诊、叩诊、听诊等方法在患者身上发现的客观异常表现，如心脏杂音、颈静脉怒张、水肿等。',
  Exam: '检查（Exam）指借助仪器设备进行的辅助检查项目，包括心电图、超声心动图、冠脉CTA、冠脉造影等，是明确诊断的重要依据。',
  LabTest: '检验（LabTest）指通过实验室分析血液、尿液等标本获得的生化指标和数据，如肌钙蛋白、BNP、血脂等，对疾病诊断和监测至关重要。',
  Medication: '药物（Medication）是心血管疾病治疗的核心手段，涵盖抗血小板药、他汀类、ACEI/ARB、β受体阻滞剂、抗凝药等多类药物。',
  Procedure: '手术/操作（Procedure）指通过外科手术或介入操作对疾病进行治疗，如PCI、CABG、起搏器植入、射频消融等有创操作。',
  RiskFactor: '危险因素（RiskFactor）指增加疾病发生风险的因素，如高血压、糖尿病、吸烟、高脂血症等，是预防和早期干预的关键。',
  Complication: '并发症（Complication）指在疾病发展过程中出现的其他疾病或症状，如心力衰竭、心律失常、心源性休克等。',
  Etiology: '病因（Etiology）指导致疾病发生的根本原因，如冠状动脉粥样硬化、心肌缺血、遗传因素等，是理解疾病本质的基础。',
  DiagnosisCriteria: '诊断标准（DiagnosisCriteria）指对疾病进行诊断时需要满足的条件和规范，如急性心肌梗死的诊断标准、心力衰竭的分级标准等。',
  TreatmentPlan: '治疗方案（TreatmentPlan）指针对特定疾病制定的系统治疗策略，包括药物治疗方案、手术方案、综合管理计划等。',
  DifferentialDiagnosis: '鉴别诊断（DifferentialDiagnosis）指需要与当前疾病区分的其他相似疾病，帮助临床医生缩小诊断范围、避免误诊。',
  RiskStratification: '风险分层（RiskStratification）指根据患者特征和检查结果将其分为不同风险等级，以指导个体化治疗决策。',
  Prognosis: '预后（Prognosis）指疾病的发展趋势和最终结局，包括生存率、复发率、生活质量等，帮助患者和医生做出合理的治疗选择。',
  FollowUp: '随访（FollowUp）指对出院患者进行定期复查和追踪管理，监测疾病进展和治疗效果，及时调整治疗方案。',
  Epidemiology: '流行病学（Epidemiology）指疾病在人群中的分布规律和影响因素，包括发病率、患病率、危险因素分布等，为公共卫生决策提供依据。',
  Pathophysiology: '病理生理（Pathophysiology）指疾病发生发展的内在机制和过程，如心肌重构、血流动力学改变等，是理解疾病的基础。'
};

var DIM_ICONS = {Symptom:'🩺',Sign:'👁️',Exam:'🔬',LabTest:'🧪',Medication:'💊',Procedure:'🔧',RiskFactor:'⚠️',Complication:'🔗',Etiology:'❓',DiagnosisCriteria:'📋',TreatmentPlan:'💊',DifferentialDiagnosis:'🔄',RiskStratification:'📊',Prognosis:'📈',FollowUp:'📅',Epidemiology:'🌍',Pathophysiology:'🧬'};

var allTerms = {};     // key: dimKey + '::' + entityName
var dimStats = {};     // dimKey -> count
var activeDim = 'Symptom';
var searchTerm = '';
var currentView = 'card';
var globalTermCount = 0;
var totalDiseaseCount = 0;

/* ---- Build terminology index ---- */
function buildTermIndex(d) {
  allTerms = {};
  dimStats = {};
  var diseases = d.diseases;
  var diseaseCodes = Object.keys(diseases);
  totalDiseaseCount = diseaseCodes.length;

  DIM_KEYS.forEach(function(k) { dimStats[k] = 0; });

  diseaseCodes.forEach(function(code) {
    var dis = diseases[code];
    var disName = dis.info.name;
    DIM_KEYS.forEach(function(k) {
      var entities = dis.dimensions[k] || [];
      entities.forEach(function(e) {
        var key = k + '::' + e.name;
        if (!allTerms[key]) {
          allTerms[key] = { name: e.name, code: e.code || '', dim: k, diseases: [] };
          dimStats[k]++;
        }
        if (allTerms[key].diseases.indexOf(disName) === -1) {
          allTerms[key].diseases.push(disName);
        }
      });
    });
  });

  globalTermCount = Object.keys(allTerms).length;
}

/* ---- Render KPI ---- */
function renderKPI() {
  document.getElementById('k-total').textContent = globalTermCount.toLocaleString();
  var activeDims = DIM_KEYS.filter(function(k) { return dimStats[k] > 0; }).length;
  document.getElementById('k-dims').textContent = activeDims;
  document.getElementById('k-diseases').textContent = totalDiseaseCount;
  var density = totalDiseaseCount > 0 ? (globalTermCount / totalDiseaseCount).toFixed(1) : '0';
  document.getElementById('k-density').textContent = density;
}

/* ---- Render Bar Chart ---- */
function renderBars() {
  var maxCount = 0;
  DIM_KEYS.forEach(function(k) {
    if (dimStats[k] > maxCount) maxCount = dimStats[k];
  });

  var colors = ['#4f8cff','#22b8cf','#51cf66','#ffd43b','#ff922b','#cc5de8','#f06595','#ff6b6b','#4f8cff','#22b8cf','#51cf66','#ffd43b','#ff922b','#cc5de8','#f06595','#ff6b6b','#4f8cff'];
  var html = '';
  DIM_KEYS.forEach(function(k, i) {
    var count = dimStats[k] || 0;
    var pct = maxCount > 0 ? (count / maxCount * 100) : 0;
    var color = colors[i % colors.length];
    html += '<div class="term-bar-row">';
    html += '  <div class="term-bar-label">' + DIM_NAMES[k] + '</div>';
    html += '  <div class="term-bar-track"><div class="term-bar-fill" style="width:' + pct + '%;background:' + color + '">' + count + '</div></div>';
    html += '  <div class="term-bar-count">' + count + ' 个</div>';
    html += '</div>';
  });
  document.getElementById('term-bars').innerHTML = html;
}

/* ---- Render Tabs ---- */
function renderTabs() {
  var html = '';
  DIM_KEYS.forEach(function(k) {
    var cls = k === activeDim ? ' active' : '';
    html += '<div class="term-tab' + cls + '" onclick="switchDim(\'' + k + '\')">';
    html += (DIM_ICONS[k] || '') + ' ' + DIM_NAMES[k];
    html += '<span class="tab-count">' + (dimStats[k] || 0) + '</span>';
    html += '</div>';
  });
  document.getElementById('term-tabs').innerHTML = html;
  renderTabDesc();
}

function renderTabDesc() {
  var desc = DIM_DESC[activeDim] || '';
  document.getElementById('term-tab-desc').innerHTML = '<strong>' + DIM_NAMES[activeDim] + '</strong>：' + desc;
}

/* ---- Filter terms for current dim + search ---- */
function getFilteredTerms() {
  var result = [];
  Object.keys(allTerms).forEach(function(key) {
    var t = allTerms[key];
    if (t.dim !== activeDim) return;
    if (searchTerm) {
      var s = searchTerm.toLowerCase();
      if (t.name.toLowerCase().indexOf(s) === -1 && t.code.toLowerCase().indexOf(s) === -1) return;
    }
    result.push(t);
  });
  result.sort(function(a, b) { return b.diseases.length - a.diseases.length || a.name.localeCompare(b.name, 'zh'); });
  return result;
}

/* ---- Highlight search term in text ---- */
function hl(text) {
  if (!searchTerm) return text;
  var idx = text.toLowerCase().indexOf(searchTerm.toLowerCase());
  if (idx === -1) return text;
  return text.substring(0, idx) + '<span class="search-highlight">' + text.substring(idx, idx + searchTerm.length) + '</span>' + text.substring(idx + searchTerm.length);
}

/* ---- Render Terms (Card View) ---- */
function renderTermsCard(terms) {
  if (terms.length === 0) {
    document.getElementById('term-container').innerHTML = '<div class="term-empty"><div class="empty-icon">🔍</div><div class="empty-text">未找到匹配的术语</div><div class="empty-hint">请尝试其他关键词，或切换到其他维度</div></div>';
    return;
  }

  /* Group by disease */
  var groups = {};
  terms.forEach(function(t) {
    t.diseases.forEach(function(d) {
      if (!groups[d]) groups[d] = [];
      groups[d].push(t);
    });
  });
  var groupNames = Object.keys(groups).sort(function(a, b) { return groups[b].length - groups[a].length; });

  var html = '';
  groupNames.forEach(function(dName) {
    var termsInGroup = groups[dName];
    html += '<div class="term-disease-group">';
    html += '  <div class="term-disease-header">';
    html += '    <span class="disease-icon">🫀</span>';
    html += '    <span class="disease-name">' + dName + '</span>';
    html += '    <span class="disease-term-count">' + termsInGroup.length + ' 个术语</span>';
    html += '  </div>';
    html += '  <div class="term-grid">';
    termsInGroup.forEach(function(t) {
      html += '<div class="term-card">';
      html += '  <div class="term-header">';
      html += '    <span class="term-name">' + hl(t.name) + '</span>';
      if (t.code) html += '  <span class="term-code">' + hl(t.code) + '</span>';
      html += '  </div>';
      html += '  <div class="term-meta">';
      html += '    <span class="term-dim">' + (DIM_ICONS[t.dim] || '') + ' ' + DIM_NAMES[t.dim] + ' / ' + t.dim + '</span>';
      html += '    <span class="term-disease-count">关联 ' + t.diseases.length + ' 种疾病</span>';
      html += '  </div>';
      html += '  <div class="term-diseases">';
      t.diseases.forEach(function(d) {
        html += '<span class="disease-tag">' + d + '</span>';
      });
      html += '  </div>';
      html += '</div>';
    });
    html += '  </div>';
    html += '</div>';
  });
  document.getElementById('term-container').innerHTML = html;
}

/* ---- Render Terms (List View) ---- */
function renderTermsList(terms) {
  if (terms.length === 0) {
    document.getElementById('term-container').innerHTML = '<div class="term-empty"><div class="empty-icon">🔍</div><div class="empty-text">未找到匹配的术语</div><div class="empty-hint">请尝试其他关键词，或切换到其他维度</div></div>';
    return;
  }
  var html = '<div class="term-list">';
  terms.forEach(function(t) {
    html += '<div class="term-list-item">';
    html += '  <div class="term-list-name">' + hl(t.name) + '</div>';
    html += '  <div class="term-list-code">' + hl(t.code || '-') + '</div>';
    html += '  <div class="term-list-dim">' + DIM_NAMES[t.dim] + '</div>';
    html += '  <div class="term-list-diseases">';
    var showCount = Math.min(t.diseases.length, 5);
    for (var i = 0; i < showCount; i++) {
      html += '<span class="term-list-disease">' + t.diseases[i] + '</span>';
    }
    if (t.diseases.length > 5) html += '<span class="term-list-disease">+' + (t.diseases.length - 5) + '</span>';
    html += '  </div>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('term-container').innerHTML = html;
}

/* ---- Render Terms Wrapper ---- */
function renderTerms() {
  var terms = getFilteredTerms();

  /* Show result bar only in search mode */
  var resultBar = document.getElementById('term-result-bar');
  if (searchTerm) {
    resultBar.style.display = '';
    document.getElementById('term-result-count').innerHTML = '搜索 "<strong>' + searchTerm + '</strong>" 在 ' + DIM_NAMES[activeDim] + ' 维度中匹配到 <span>' + terms.length + '</span> 个术语';
  } else {
    resultBar.style.display = 'none';
  }

  if (currentView === 'card') {
    renderTermsCard(terms);
  } else {
    renderTermsList(terms);
  }
}

/* ---- Switch Dimension ---- */
function switchDim(dim) {
  activeDim = dim;
  renderTabs();
  renderTerms();
}

/* ---- Switch View ---- */
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.term-view-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-view') === view);
  });
  renderTerms();
}

/* ---- Search ---- */
document.getElementById('term-search').addEventListener('input', function(e) {
  searchTerm = e.target.value.trim();
  var clearBtn = document.getElementById('term-search-clear');
  var info = document.getElementById('term-search-info');
  if (searchTerm) {
    clearBtn.style.display = '';
    var total = Object.keys(allTerms).length;
    var matched = 0;
    Object.keys(allTerms).forEach(function(k) {
      var t = allTerms[k];
      var s = searchTerm.toLowerCase();
      if (t.name.toLowerCase().indexOf(s) !== -1 || t.code.toLowerCase().indexOf(s) !== -1) matched++;
    });
    info.textContent = '全部维度匹配 ' + matched + ' / ' + total;
  } else {
    clearBtn.style.display = 'none';
    info.textContent = '';
  }
  renderTerms();
});

function clearSearch() {
  searchTerm = '';
  document.getElementById('term-search').value = '';
  document.getElementById('term-search-clear').style.display = 'none';
  document.getElementById('term-search-info').textContent = '';
  renderTerms();
}

/* ---- Init ---- */
loadData(function(d) {
  buildTermIndex(d);
  renderNav('terminology');
  renderKPI();
  renderBars();
  renderTabs();
  renderTerms();
});
</script>
</body>
</html>
