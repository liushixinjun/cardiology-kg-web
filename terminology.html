<script>
/* ================================================================
   Medical Terminology Knowledge Base — Three-Column Layout
   ================================================================ */

var ALL_TERMS = {};      // key: dimKey + '::' + entityName
var DIM_STATS = {};      // dimKey -> count
var DIM_DISEASE_COV = {};// dimKey -> number of diseases with data
var CURRENT_DIM = 'Symptom';
var CURRENT_TERM_KEY = null;
var SEARCH_TERM = '';
var TOTAL_TERMS = 0;
var TOTAL_DISEASES = 0;

/* Dimension descriptions */
var DIM_DESC = {
  Symptom: '患者主观感受到的不适或异常感觉，如胸痛、呼吸困难、心悸等。症状是临床诊断的第一线索。',
  Sign: '医生通过视诊、触诊、叩诊、听诊等方法发现的客观异常表现，如心脏杂音、颈静脉怒张等。',
  Exam: '借助仪器设备进行的辅助检查项目，包括心电图、超声心动图、冠脉CTA等。',
  LabTest: '通过实验室分析血液、尿液等标本获得的生化指标和数据，如肌钙蛋白、BNP等。',
  Medication: '心血管疾病治疗的核心药物，涵盖抗血小板药、他汀类、ACEI/ARB等多类药物。',
  Procedure: '通过外科手术或介入操作进行的治疗，如PCI、CABG、起搏器植入等。',
  RiskFactor: '增加疾病发生风险的因素，如高血压、糖尿病、吸烟等。',
  Complication: '疾病发展过程中出现的其他疾病或症状，如心力衰竭、心律失常等。',
  Etiology: '导致疾病发生的根本原因，如冠状动脉粥样硬化、心肌缺血等。',
  DiagnosisCriteria: '对疾病进行诊断时需要满足的条件和规范。',
  TreatmentPlan: '针对特定疾病制定的系统治疗策略，包括药物治疗方案、手术方案等。',
  DifferentialDiagnosis: '需要与当前疾病区分的其他相似疾病，帮助缩小诊断范围。',
  RiskStratification: '根据患者特征和检查结果将其分为不同风险等级，指导个体化治疗。',
  Prognosis: '疾病的发展趋势和最终结局，包括生存率、复发率等。',
  FollowUp: '对出院患者进行定期复查和追踪管理，监测疾病进展。',
  Epidemiology: '疾病在人群中的分布规律和影响因素，包括发病率、患病率等。',
  Pathophysiology: '疾病发生发展的内在机制和过程，如心肌重构、血流动力学改变等。'
};

/* Dimension colors for progress bars */
var DIM_COLORS = [
  '#4f8cff','#22b8cf','#51cf66','#ffd43b','#ff922b',
  '#cc5de8','#f06595','#ff6b6b','#4f8cff','#22b8cf',
  '#51cf66','#ffd43b','#ff922b','#cc5de8','#f06595',
  '#ff6b6b','#4f8cff'
];

/* ============ Build terminology index ============ */
function buildTermIndex(d) {
  ALL_TERMS = {};
  DIM_STATS = {};
  DIM_DISEASE_COV = {};

  var diseaseCodes = Object.keys(d.diseases);
  TOTAL_DISEASES = diseaseCodes.length;

  DIM_KEYS.forEach(function(k) {
    DIM_STATS[k] = 0;
    DIM_DISEASE_COV[k] = 0;
  });

  diseaseCodes.forEach(function(code) {
    var dis = d.diseases[code];
    var disName = dis.info.name;
    DIM_KEYS.forEach(function(k) {
      var entities = dis.dimensions[k] || [];
      if (entities.length > 0) DIM_DISEASE_COV[k]++;
      entities.forEach(function(e) {
        var key = k + '::' + e.name;
        if (!ALL_TERMS[key]) {
          ALL_TERMS[key] = { name: e.name, code: e.code || '', dim: k, diseases: [] };
          DIM_STATS[k]++;
        }
        if (ALL_TERMS[key].diseases.indexOf(disName) === -1) {
          ALL_TERMS[key].diseases.push(disName);
        }
      });
    });
  });

  TOTAL_TERMS = Object.keys(ALL_TERMS).length;
}

/* ============ Render hero stats ============ */
function renderHeroStats() {
  document.getElementById('hs-total').textContent = TOTAL_TERMS.toLocaleString();
  var activeDims = DIM_KEYS.filter(function(k) { return DIM_STATS[k] > 0; }).length;
  document.getElementById('hs-dims').textContent = activeDims + '/17';
  document.getElementById('hs-diseases').textContent = TOTAL_DISEASES;
  document.getElementById('lf-total').textContent = TOTAL_TERMS.toLocaleString();
  document.getElementById('lf-dims').textContent = activeDims;
  document.getElementById('lf-diseases').textContent = TOTAL_DISEASES;
}

/* ============ Render left panel dimension list ============ */
function renderDimList() {
  var maxCount = 0;
  DIM_KEYS.forEach(function(k) {
    if (DIM_STATS[k] > maxCount) maxCount = DIM_STATS[k];
  });

  var html = '';
  DIM_KEYS.forEach(function(k, i) {
    var count = DIM_STATS[k] || 0;
    var cov = TOTAL_DISEASES > 0 ? Math.round(DIM_DISEASE_COV[k] / TOTAL_DISEASES * 100) : 0;
    var barPct = maxCount > 0 ? Math.round(count / maxCount * 100) : 0;
    var color = DIM_COLORS[i % DIM_COLORS.length];
    var activeCls = k === CURRENT_DIM ? ' active' : '';
    var icon = (typeof DIM_ICONS !== 'undefined' && DIM_ICONS[k]) ? DIM_ICONS[k] : '';

    html += '<div class="term-dim-item' + activeCls + '" onclick="selectDim(\'' + k + '\')" data-dim="' + k + '">';
    html += '  <div class="term-dim-top">';
    html += '    <div class="term-dim-name">';
    html += '      <span class="term-dim-icon">' + icon + '</span>';
    html += '      ' + DIM_NAMES[k];
    html += '      <span class="term-dim-en">' + k + '</span>';
    html += '    </div>';
    html += '    <span class="term-dim-count">' + count + '</span>';
    html += '  </div>';
    html += '  <div class="term-dim-bar-track">';
    html += '    <div class="term-dim-bar-fill" style="width:' + barPct + '%;background:' + color + '"></div>';
    html += '  </div>';
    html += '</div>';
  });
  document.getElementById('dim-list').innerHTML = html;
}

/* ============ Select dimension ============ */
function selectDim(dimKey) {
  CURRENT_DIM = dimKey;
  CURRENT_TERM_KEY = null;

  /* Update left panel active state */
  document.querySelectorAll('.term-dim-item').forEach(function(el) {
    el.classList.toggle('active', el.getAttribute('data-dim') === dimKey);
  });

  /* Scroll active item into view */
  var activeEl = document.querySelector('.term-dim-item.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  /* Update center header */
  var icon = (typeof DIM_ICONS !== 'undefined' && DIM_ICONS[dimKey]) ? DIM_ICONS[dimKey] : '';
  document.getElementById('center-title').innerHTML = icon + ' ' + DIM_NAMES[dimKey] + ' <span class="count-badge">' + (DIM_STATS[dimKey] || 0) + '</span>';
  document.getElementById('center-desc').textContent = DIM_DESC[dimKey] || '';

  renderCenterCards();
  renderDetailEmpty();
}

/* ============ Get filtered terms for current dimension ============ */
function getFilteredTerms() {
  var result = [];
  Object.keys(ALL_TERMS).forEach(function(key) {
    var t = ALL_TERMS[key];
    if (t.dim !== CURRENT_DIM) return;
    if (SEARCH_TERM) {
      var s = SEARCH_TERM.toLowerCase();
      if (t.name.toLowerCase().indexOf(s) === -1 && t.code.toLowerCase().indexOf(s) === -1) return;
    }
    result.push(t);
  });
  result.sort(function(a, b) {
    return b.diseases.length - a.diseases.length || a.name.localeCompare(b.name, 'zh');
  });
  return result;
}

/* ============ Highlight search term ============ */
function hl(text) {
  if (!SEARCH_TERM) return escHtml(text);
  var lower = text.toLowerCase();
  var sLower = SEARCH_TERM.toLowerCase();
  var idx = lower.indexOf(sLower);
  if (idx === -1) return escHtml(text);
  return escHtml(text.substring(0, idx)) +
    '<span class="search-highlight">' + escHtml(text.substring(idx, idx + SEARCH_TERM.length)) + '</span>' +
    escHtml(text.substring(idx + SEARCH_TERM.length));
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ============ Render center cards ============ */
function renderCenterCards() {
  var terms = getFilteredTerms();
  var container = document.getElementById('center-body');

  if (terms.length === 0) {
    container.innerHTML = '<div class="term-empty"><div class="empty-icon">🔍</div><div class="empty-text">未找到匹配的术语</div><div class="empty-hint">请尝试其他关键词，或切换到其他维度</div></div>';
    return;
  }

  var html = '<div class="term-cards-grid">';
  terms.forEach(function(t) {
    var key = t.dim + '::' + t.name;
    var selectedCls = key === CURRENT_TERM_KEY ? ' selected' : '';
    html += '<div class="term-card' + selectedCls + '" onclick="selectTerm(\'' + escAttr(key) + '\')" data-key="' + escAttr(key) + '">';
    html += '  <div class="term-card-left">';
    html += '    <div class="term-card-name">' + hl(t.name) + '</div>';
    html += '    <div class="term-card-code">' + (t.code ? hl(t.code) : '') + '</div>';
    html += '  </div>';
    html += '  <div class="term-card-right">';
    html += '    <span class="term-card-dcount">' + t.diseases.length + '种</span>';
    html += '    <span class="term-card-arrow">▸</span>';
    html += '  </div>';
    html += '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

function escAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

/* ============ Disease data cache ============ */
var KG_DISEASES = null;

function selectTerm(key) {
  CURRENT_TERM_KEY = key;

  /* Update card selected state */
  document.querySelectorAll('.term-card').forEach(function(el) {
    el.classList.toggle('selected', el.getAttribute('data-key') === key);
  });

  /* Scroll selected card into view */
  var selectedCard = document.querySelector('.term-card.selected');
  if (selectedCard) selectedCard.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  renderDetail();
}

/* ============ Find all relation types for a term ============ */
function findTermRelations(termName, dimKey) {
  if (!KG_DISEASES) return [];
  var relMap = {};  // relType -> count of diseases
  Object.keys(KG_DISEASES).forEach(function(code) {
    var d = KG_DISEASES[code];
    (d.relations_summary || []).forEach(function(r) {
      if (r.name === termName) {
        if (!relMap[r.rel]) relMap[r.rel] = { rel: r.rel, count: 0, diseases: [] };
        relMap[r.rel].count++;
        if (relMap[r.rel].diseases.length < 3) relMap[r.rel].diseases.push(d.info.name);
      }
    });
  });
  return Object.values(relMap).sort(function(a, b) { return b.count - a.count; });
}

/* ============ Check if term appears in other dimensions ============ */
function findCrossDimRefs(termName, currentDim) {
  if (!KG_DISEASES) return [];
  var refs = [];
  Object.keys(KG_DISEASES).forEach(function(code) {
    var d = KG_DISEASES[code];
    DIM_KEYS.forEach(function(k) {
      if (k === currentDim) return;
      var items = d.dimensions[k] || [];
      items.forEach(function(e) {
        if (e.name === termName) {
          refs.push({ dim: k, disease: d.info.name });
        }
      });
    });
  });
  return refs;
}

/* ============ Find related terms via diseases ============ */
function findRelatedTerms(termName, dimKey) {
  if (!KG_DISEASES) return [];
  var diseaseNames = ALL_TERMS[dimKey + '::' + termName]
    ? ALL_TERMS[dimKey + '::' + termName].diseases
    : [];
  if (diseaseNames.length === 0) return [];
  var relatedMap = {};
  Object.keys(KG_DISEASES).forEach(function(code) {
    var d = KG_DISEASES[code];
    if (diseaseNames.indexOf(d.info.name) === -1) return;
    DIM_KEYS.forEach(function(k) {
      if (k === dimKey) return;
      (d.dimensions[k] || []).forEach(function(e) {
        if (e.name === termName) return;
        var rKey = k + '::' + e.name;
        if (!relatedMap[rKey]) relatedMap[rKey] = { name: e.name, dim: k, diseases: [] };
        if (relatedMap[rKey].diseases.length < 5 && relatedMap[rKey].diseases.indexOf(d.info.name) === -1) {
          relatedMap[rKey].diseases.push(d.info.name);
        }
      });
    });
  });
  var result = Object.values(relatedMap);
  result.sort(function(a, b) { return b.diseases.length - a.diseases.length; });
  return result.slice(0, 8);
}

/* ============ Render detail panel ============ */
function renderDetail() {
  if (!CURRENT_TERM_KEY || !ALL_TERMS[CURRENT_TERM_KEY]) {
    renderDetailEmpty();
    return;
  }

  var t = ALL_TERMS[CURRENT_TERM_KEY];
  var container = document.getElementById('detail-body');
  var html = '';

  /* Term name and code */
  html += '<div class="term-detail-name">' + escHtml(t.name) + '</div>';
  if (t.code) html += '<div class="term-detail-code">' + escHtml(t.code) + '</div>';

  /* Meta info */
  var icon = (typeof DIM_ICONS !== 'undefined' && DIM_ICONS[t.dim]) ? DIM_ICONS[t.dim] : '';
  html += '<div class="term-detail-meta">';
  html += '  <div class="term-detail-row">';
  html += '    <span class="dr-label">维度</span>';
  html += '    <span class="dr-badge" style="background:rgba(79,140,255,.12);color:var(--accent)">' + icon + ' ' + DIM_NAMES[t.dim] + ' / ' + t.dim + '</span>';
  html += '  </div>';
  html += '  <div class="term-detail-row">';
  html += '    <span class="dr-label">关联疾病</span>';
  html += '    <span class="dr-value">' + t.diseases.length + ' 种</span>';
  html += '  </div>';
  html += '</div>';

  /* Disease list */
  html += '<div class="term-detail-section">';
  html += '  <div class="term-detail-section-title">关联疾病列表</div>';
  html += '  <div class="term-disease-list">';
  var showLimit = 10;
  var showCount = Math.min(t.diseases.length, showLimit);
  for (var i = 0; i < showCount; i++) {
    html += '<div class="term-disease-item"><span class="di-dot"></span>' + escHtml(t.diseases[i]) + '</div>';
  }
  if (t.diseases.length > showLimit) {
    html += '<div class="term-disease-more">+' + (t.diseases.length - showLimit) + ' more</div>';
  }
  html += '  </div>';
  html += '</div>';

  /* ============ 关联关系 (Relation types) ============ */
  var relations = findTermRelations(t.name, t.dim);
  if (relations.length > 0) {
    html += '<div class="term-detail-section">';
    html += '  <div class="term-detail-section-title">🔗 关联关系</div>';
    html += '  <div class="term-disease-list">';
    relations.forEach(function(r) {
      html += '<div class="term-disease-item">';
      html += '  <span class="di-dot" style="background:#cc5de8"></span>';
      html += '  <span style="flex:1">' + escHtml(r.rel) + '</span>';
      html += '  <span style="color:var(--muted);font-size:10px">' + r.count + '种疾病</span>';
      html += '</div>';
    });
    html += '  </div>';
    html += '</div>';
  }

  /* ============ 跨维度引用 (Cross-dimension references) ============ */
  var crossRefs = findCrossDimRefs(t.name, t.dim);
  if (crossRefs.length > 0) {
    html += '<div class="term-detail-section">';
    html += '  <div class="term-detail-section-title">🔀 跨维度引用</div>';
    html += '  <div class="term-disease-list">';
    crossRefs.slice(0, 8).forEach(function(ref) {
      html += '<div class="term-disease-item">';
      html += '  <span class="di-dot" style="background:#22b8cf"></span>';
      html += '  <span style="flex:1">' + escHtml(DIM_NAMES[ref.dim]) + ' · ' + escHtml(ref.disease) + '</span>';
      html += '</div>';
    });
    if (crossRefs.length > 8) {
      html += '<div class="term-disease-more">+' + (crossRefs.length - 8) + ' more</div>';
    }
    html += '  </div>';
    html += '</div>';
  }

  /* ============ 共现术语 (Related terms via shared diseases) ============ */
  var related = findRelatedTerms(t.name, t.dim);
  if (related.length > 0) {
    html += '<div class="term-detail-section">';
    html += '  <div class="term-detail-section-title">🧩 共现术语（在相同疾病中同时出现）</div>';
    html += '  <div class="term-disease-list">';
    related.forEach(function(r) {
      html += '<div class="term-disease-item" style="cursor:pointer" onclick="selectTerm(\'' + escAttr(r.dim + '::' + r.name) + '\')">';
      html += '  <span class="di-dot" style="background:#ffd43b"></span>';
      html += '  <span style="flex:1">' + escHtml(r.name) + '</span>';
      html += '  <span style="font-size:9px;color:var(--muted)">' + escHtml(DIM_NAMES[r.dim]) + '</span>';
      html += '  <span style="color:var(--muted);font-size:10px">' + r.diseases.length + '种</span>';
      html += '</div>';
    });
    html += '  </div>';
    html += '</div>';
  }

  /* ============ 英文别名 (English name alias from diseases) ============ */
  var enNames = [];
  t.diseases.forEach(function(dn) {
    Object.keys(KG_DISEASES || {}).forEach(function(code) {
      if (KG_DISEASES[code].info.name === dn && KG_DISEASES[code].info.name_en) {
        if (enNames.indexOf(KG_DISEASES[code].info.name_en) === -1) {
          enNames.push(KG_DISEASES[code].info.name_en);
        }
      }
    });
  });
  if (enNames.length > 0 && enNames.length <= 5) {
    html += '<div class="term-detail-section">';
    html += '  <div class="term-detail-section-title">🌐 关联疾病英文名</div>';
    html += '  <div style="display:flex;flex-wrap:wrap;gap:4px">';
    enNames.forEach(function(en) {
      html += '<span style="font-size:10px;padding:2px 7px;background:var(--bg3);border:1px solid var(--rule);border-radius:4px;color:var(--muted);font-style:italic">' + escHtml(en) + '</span>';
    });
    html += '  </div>';
    html += '</div>';
  }

  /* ============ 同维度其他术语 (Similar terms in same dimension) ============ */
  var similar = [];
  Object.keys(ALL_TERMS).forEach(function(k) {
    if (k !== CURRENT_TERM_KEY && ALL_TERMS[k].dim === t.dim) {
      similar.push(ALL_TERMS[k]);
    }
  });
  similar.sort(function(a, b) { return b.diseases.length - a.diseases.length; });
  similar = similar.slice(0, 10);

  if (similar.length > 0) {
    html += '<div class="term-detail-section">';
    html += '  <div class="term-detail-section-title">📋 同维度术语</div>';
    html += '  <div class="term-similar-list">';
    similar.forEach(function(s) {
      var skey = s.dim + '::' + s.name;
      html += '<div class="term-similar-item" onclick="selectTerm(\'' + escAttr(skey) + '\')">';
      html += '  <span class="term-similar-name">' + escHtml(s.name) + '</span>';
      html += '  <span class="term-similar-dcount">' + s.diseases.length + '种</span>';
      html += '</div>';
    });
    html += '  </div>';
    html += '</div>';
  }

  container.innerHTML = html;
}

function renderDetailEmpty() {
  document.getElementById('detail-body').innerHTML =
    '<div class="term-detail-empty">' +
    '<div class="de-icon">🧬</div>' +
    '<div class="de-text">选择一个术语查看详情<br>点击左侧维度导航浏览术语<br>点击术语卡片查看详情</div>' +
    '</div>';
}

/* ============ Search ============ */
document.getElementById('term-search').addEventListener('input', function(e) {
  SEARCH_TERM = e.target.value.trim();
  renderCenterCards();
});

/* ============ Init ============ */
loadData(function(d) {
  KG_DISEASES = d.diseases;
  buildTermIndex(d);
  renderNav('terminology');
  renderHeroStats();
  renderDimList();
  selectDim('Symptom');
});
</script>
