<script>
// Initialize page
loadData(function(d) {
  renderNav('config');
  initConfigPage();
});

var DEFAULT_CONFIG = {
  url: 'bolt://192.168.3.27:7687',
  httpUrl: 'http://192.168.3.27:7474',
  user: 'neo4j',
  password: 'zysoft@2024'
};

function initConfigPage() {
  loadConfigToForm();
  updateStatusDisplay();
}

function loadConfigToForm() {
  var config = getServerConfig();
  document.getElementById('bolt-url').value = config.url || DEFAULT_CONFIG.url;
  document.getElementById('http-url').value = config.httpUrl || DEFAULT_CONFIG.httpUrl;
  document.getElementById('username').value = config.user || DEFAULT_CONFIG.user;
  document.getElementById('password').value = config.password || DEFAULT_CONFIG.password;
}

function saveConfig() {
  var config = {
    url: document.getElementById('bolt-url').value.trim(),
    httpUrl: document.getElementById('http-url').value.trim(),
    user: document.getElementById('username').value.trim(),
    password: document.getElementById('password').value
  };
  
  // Validate
  if (!config.url || !config.httpUrl || !config.user) {
    showTestResult('请填写所有必填字段', 'error');
    return;
  }
  
  saveServerConfig(config);
  updateStatusDisplay();
  showTestResult('配置已保存到浏览器本地存储', 'success');
}

function updateStatusDisplay() {
  var config = getServerConfig();
  document.getElementById('status-bolt').textContent = config.url;
  document.getElementById('status-http').textContent = config.httpUrl;
  document.getElementById('status-user').textContent = config.user;
  document.getElementById('status-pass').textContent = config.password ? '••••••••' : '(空)';
}

function testConnection() {
  showTestResult('正在尝试连接Neo4j数据库...', 'info');
  
  // Simulate connection test
  setTimeout(function() {
    var config = getServerConfig();
    var message = '无法从浏览器直接连接Neo4j数据库。\n\n';
    message += '原因：\n';
    message += '1. 浏览器安全策略限制直接访问数据库端口\n';
    message += '2. Neo4j Bolt协议需要专用客户端\n';
    message += '3. 跨域请求可能被阻止\n\n';
    message += '当前配置：\n';
    message += '• Bolt: ' + config.url + '\n';
    message += '• HTTP: ' + config.httpUrl + '\n';
    message += '• 用户: ' + config.user + '\n\n';
    message += '请通过后端API服务连接Neo4j数据库。';
    
    showTestResult(message, 'error');
  }, 1000);
}

function resetConfig() {
  if (confirm('确定要重置为默认配置吗？当前配置将被覆盖。')) {
    saveServerConfig(DEFAULT_CONFIG);
    loadConfigToForm();
    updateStatusDisplay();
    showTestResult('已重置为默认配置', 'success');
  }
}

function showTestResult(message, type) {
  var el = document.getElementById('test-result');
  el.textContent = message;
  el.className = 'test-result show ' + type;
  
  // Auto hide after 5 seconds for success messages
  if (type === 'success') {
    setTimeout(function() {
      el.classList.remove('show');
    }, 5000);
  }
}
</script>
