<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>临床审核 - 专科知识图谱</title>
<link rel="stylesheet" href="./_shared/css/style.css">
<style>
/* ===== 页面布局 ===== */
html, body { height: 100%; overflow: hidden; margin: 0; }
.rv-layout { display: flex; flex-direction: column; height: calc(100vh - 48px); overflow: hidden; }

/* ===== 顶部区域 ===== */
.rv-header { flex-shrink: 0; padding: 20px 28px 0; }
.rv-title-row { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
.rv-title-row h1 { font-size: 22px; font-weight: 800; margin: 0; }
.rv-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 14px; }

/* KPI 指标栏 */
.rv-kpi-bar { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.rv-kpi {
  background: var(--bg2); border: 1px solid var(--rule); border-radius: 12px;
  padding: 14px 20px; flex: 1; min-width: 150px;
  display: flex; align-items: center; gap: 14px;
  transition: border-color .2s;
}
.rv-kpi:hover { border-color: var(--accent); }
.rv-kpi-icon { font-size: 28px; width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.rv-kpi-num { font-size: 28px; font-weight: 800; line-height: 1; }
.rv-kpi-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
.rv-kpi-detail { font-size: 10px; color: var(--muted); margin-top: 1px; }

/* 警告横幅 */
.rv-warning {
  background: rgba(255,210,59,.06); border: 1px solid rgba(255,210,59,.25);
  border-radius: 10px; padding: 10px 16px; font-size: 12px; color: var(--yellow);
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
}

/* ===== 标签页 ===== */
.rv-tabs {
  display: flex; background: var(--bg2); border: 1px solid var(--rule);
  border-radius: 12px; overflow: hidden; margin-bottom: 0;
}
.rv-tab {
  flex: 1; padding: 12px 16px; text-align: center; cursor: pointer;
  color: var(--muted); font-size: 13px; font-weight: 700;
  border-bottom: 2px solid transparent; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.rv-tab:hover { background: var(--bg3); color: var(--ink); }
.rv-tab.active { color: var(--accent); background: rgba(79,140,255,.06); border-bottom-color: var(--accent); }
.rv-tab-badge {
  background: rgba(79,140,255,.15); color: var(--accent);
  font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 700;
}

/* ===== 内容区域 ===== */
.rv-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px 28px 90px; }
.rv-content::-webkit-scrollbar { width: 6px; }
.rv-content::-webkit-scrollbar-track { background: transparent; }
.rv-content::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
.rv-content::-webkit-scrollbar-thumb:hover { background: var(--muted); }
.rv-panel { display: none; animation: rvFadeIn .25s ease; }
.rv-panel.active { display: block; }
@keyframes rvFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ===== 筛选栏 ===== */
.rv-filters {
  display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
}
.rv-filters select, .rv-filters input {
  padding: 8px 12px; background: var(--bg2); border: 1px solid var(--rule);
  border-radius: 8px; color: var(--ink); font-size: 12px; outline: none;
  transition: border-color .2s;
}
.rv-filters select:focus, .rv-filters input:focus { border-color: var(--accent); }
.rv-filter-count { font-size: 11px; color: var(--muted); margin-left: auto; }

/* ===== 通用卡片 ===== */
.rv-card {
  background: var(--bg2); border: 1px solid var(--rule); border-radius: 12px;
  padding: 0; margin-bottom: 12px; overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
}
.rv-card:hover { border-color: rgba(79,140,255,.3); box-shadow: 0 2px 12px rgba(0,0,0,.2); }

/* ===== 徽章 ===== */
.rv-badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; }
.rv-badge-pending { background: rgba(255,210,59,.12); color: var(--yellow); }
.rv-badge-done { background: rgba(81,207,102,.12); color: var(--green); }
.rv-badge-high { background: rgba(255,107,107,.12); color: var(--accent2); }
.rv-badge-mid { background: rgba(255,146,43,.12); color: var(--orange); }
.rv-badge-low { background: rgba(81,207,102,.12); color: var(--green); }
.rv-badge-blue { background: rgba(79,140,255,.12); color: var(--accent); }
.rv-badge-purple { background: rgba(204,93,232,.12); color: var(--purple); }
.rv-badge-cyan { background: rgba(34,184,207,.12); color: var(--cyan); }
.rv-badge-pink { background: rgba(255,107,138,.12); color: #ff6b8a; }
.rv-badge-red { background: rgba(255,107,107,.12); color: var(--accent2); }
.rv-badge-green { background: rgba(81,207,102,.12); color: var(--green); }
.rv-badge-yellow { background: rgba(255,210,59,.12); color: var(--yellow); }

/* ===== 标签 (chip) ===== */
.rv-chip {
  display: inline-block; padding: 4px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 600; margin: 2px 3px; line-height: 1.4;
}
.rv-chip-target { background: rgba(79,140,255,.1); color: var(--accent); border: 1px solid rgba(79,140,255,.2); }
.rv-chip-missing { background: rgba(255,107,107,.1); color: var(--accent2); border: 1px solid rgba(255,107,107,.2); }
.rv-chip-warning { background: rgba(255,210,59,.1); color: var(--yellow); border: 1px solid rgba(255,210,59,.2); }

/* ===== 切换按钮组 ===== */
.rv-toggle-group { display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--rule); }
.rv-toggle-btn {
  padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
  background: var(--bg3); color: var(--muted); border: none;
  border-right: 1px solid var(--rule); transition: all .15s; white-space: nowrap;
}
.rv-toggle-btn:last-child { border-right: none; }
.rv-toggle-btn:hover { background: var(--bg4); color: var(--ink); }
.rv-toggle-btn.active-green { background: rgba(81,207,102,.15); color: var(--green); }
.rv-toggle-btn.active-yellow { background: rgba(255,210,59,.15); color: var(--yellow); }
.rv-toggle-btn.active-red { background: rgba(255,107,107,.15); color: var(--accent2); }
.rv-toggle-btn.active-blue { background: rgba(79,140,255,.15); color: var(--accent); }

/* ===== 评论框 ===== */
.rv-comment {
  width: 100%; min-height: 50px; padding: 10px 12px; background: var(--bg3);
  border: 1px solid var(--rule); border-radius: 8px; color: var(--ink);
  font-size: 12px; resize: vertical; outline: none; font-family: inherit;
  transition: border-color .2s;
}
.rv-comment:focus { border-color: var(--accent); }

/* ===== 疾病摘要卡片（统一顶层卡片） ===== */
.rv-disease-group { margin-bottom: 16px; }
.rv-disease-summary {
  background: var(--bg2); border: 1px solid var(--rule); border-left: 3px solid var(--accent);
  border-radius: 12px; padding: 16px 20px; cursor: pointer;
  display: flex; align-items: center; gap: 16px;
  transition: all .2s; user-select: none;
}
.rv-disease-summary:hover {
  border-color: rgba(79,140,255,.4); box-shadow: 0 2px 12px rgba(0,0,0,.2);
}
.rv-disease-summary.expanded {
  border-color: var(--accent); border-bottom-left-radius: 0; border-bottom-right-radius: 0;
  margin-bottom: 0;
}
.rv-disease-summary-left { flex: 1; min-width: 0; }
.rv-disease-summary-name { font-size: 16px; font-weight: 800; color: var(--ink); }
.rv-disease-summary-code { font-size: 11px; color: var(--muted); font-family: monospace; margin-top: 2px; }
.rv-disease-summary-meta { display: flex; gap: 12px; align-items: center; flex-shrink: 0; }
.rv-disease-summary-count {
  background: var(--bg3); border-radius: 8px; padding: 6px 14px; text-align: center;
  min-width: 80px;
}
.rv-disease-summary-count-num { font-size: 22px; font-weight: 800; line-height: 1; }
.rv-disease-summary-count-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
.rv-disease-summary-toggle {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--rule);
  background: var(--bg3); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s; flex-shrink: 0;
}
.rv-disease-summary-toggle:hover { border-color: var(--accent); background: rgba(79,140,255,.06); }
.rv-disease-summary-toggle svg { width: 14px; height: 14px; transition: transform .25s; }
.rv-disease-summary.expanded .rv-disease-summary-toggle svg { transform: rotate(180deg); }

/* 疾病展开区域 */
.rv-disease-expand {
  display: none; border: 1px solid var(--accent); border-top: none;
  border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;
  background: var(--bg); padding: 16px 20px;
}
.rv-disease-expand.open { display: block; }

/* ===== Tab 1: 疾病级审核卡片（保留原设计） ===== */
.rv-disease-card { border-left: 3px solid var(--accent); }
.rv-disease-card-header {
  padding: 16px 20px 0; display: flex; justify-content: space-between; align-items: flex-start;
}
.rv-disease-name { font-size: 16px; font-weight: 800; color: var(--ink); }
.rv-disease-code { font-size: 11px; color: var(--muted); font-family: monospace; margin-top: 2px; }
.rv-disease-stats { display: flex; gap: 12px; margin: 12px 20px; }
.rv-disease-stat {
  background: var(--bg3); border-radius: 8px; padding: 8px 14px;
  text-align: center; flex: 1;
}
.rv-disease-stat-num { font-size: 20px; font-weight: 800; }
.rv-disease-stat-label { font-size: 10px; color: var(--muted); margin-top: 1px; }

/* ===== Tab 2/3/4: 展开项卡片 ===== */
.rv-item-card {
  background: var(--bg2); border: 1px solid var(--rule); border-radius: 10px;
  padding: 0; margin-bottom: 10px; overflow: hidden;
  transition: border-color .2s;
}
.rv-item-card:last-child { margin-bottom: 0; }
.rv-item-card:hover { border-color: rgba(79,140,255,.25); }

/* 项目卡片顶部 */
.rv-item-header {
  padding: 14px 16px 0; display: flex; justify-content: space-between; align-items: flex-start;
}
.rv-item-title { font-size: 14px; font-weight: 700; color: var(--ink); }
.rv-item-subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; }
.rv-item-badges { display: flex; gap: 6px; flex-wrap: wrap; }

/* 视觉关系链 */
.rv-flow {
  margin: 12px 16px; padding: 12px 14px; background: var(--bg3); border-radius: 10px;
  display: flex; align-items: center; gap: 0; flex-wrap: wrap;
}
.rv-flow-node {
  padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700;
  white-space: nowrap; text-align: center; line-height: 1.3;
}
.rv-flow-disease { background: rgba(79,140,255,.12); color: var(--accent); border: 1px solid rgba(79,140,255,.25); }
.rv-flow-arrow {
  margin: 0 8px; color: var(--muted); font-size: 18px; flex-shrink: 0;
  display: flex; align-items: center;
}
.rv-flow-arrow svg { width: 28px; height: 14px; }
.rv-flow-relation { background: rgba(204,93,232,.12); color: var(--purple); border: 1px solid rgba(204,93,232,.25); }
.rv-flow-target { background: rgba(34,184,207,.12); color: var(--cyan); border: 1px solid rgba(34,184,207,.25); }

/* 样本目标 chips */
.rv-targets { margin: 8px 16px; }
.rv-targets-title { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }

/* 缺失字段提示 */
.rv-missing-bar {
  margin: 8px 16px; padding: 10px 14px; background: rgba(255,107,107,.05);
  border: 1px solid rgba(255,107,107,.15); border-radius: 8px;
}
.rv-missing-title { font-size: 11px; font-weight: 700; color: var(--accent2); margin-bottom: 6px; }

/* 审核重点 */
.rv-focus-box {
  margin: 8px 16px; padding: 10px 14px; background: rgba(255,210,59,.05);
  border: 1px solid rgba(255,210,59,.15); border-radius: 8px;
  font-size: 12px; color: var(--yellow); font-weight: 600;
}

/* 项目决策区 */
.rv-item-decision {
  padding: 12px 16px 14px; border-top: 1px solid var(--rule);
  display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap;
}
.rv-item-decision .rv-toggle-group { flex-shrink: 0; }
.rv-item-decision .rv-comment { flex: 1; min-width: 180px; }

/* ===== Tab 3: 药师上下文 ===== */
.rv-pharm-context {
  margin: 8px 16px; padding: 8px 12px; background: var(--bg3); border-radius: 8px;
  font-size: 12px; color: var(--muted);
}
.rv-pharm-context b { color: var(--ink); }

/* ===== Tab 4: 证据信息 ===== */
.rv-evidence-block {
  margin: 8px 16px; padding: 10px 14px; background: var(--bg3);
  border: 1px solid var(--rule); border-radius: 8px;
}
.rv-evidence-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
.rv-evidence-text {
  font-size: 11px; color: var(--ink); line-height: 1.6; max-height: 80px;
  overflow: hidden; transition: max-height .3s;
}
.rv-evidence-text.expanded { max-height: none; }
.rv-evidence-toggle {
  font-size: 11px; color: var(--accent); cursor: pointer; font-weight: 600;
  margin-top: 4px; display: inline-block;
}
.rv-evidence-toggle:hover { text-decoration: underline; }
.rv-evidence-chains { margin-top: 6px; }
.rv-evidence-chain-item {
  font-size: 10px; color: var(--accent); padding: 2px 0;
  font-family: monospace;
}

/* ===== 导出按钮 ===== */
.rv-export-btn {
  position: fixed; bottom: 24px; right: 24px; z-index: 100;
  padding: 12px 28px; background: var(--accent); color: #fff; border: none;
  border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 20px rgba(79,140,255,.35); transition: all .2s;
  display: flex; align-items: center; gap: 8px;
}
.rv-export-btn:hover { opacity: .9; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(79,140,255,.45); }
.rv-export-count {
  background: rgba(255,255,255,.2); padding: 2px 8px; border-radius: 999px;
  font-size: 11px;
}

/* ===== 空状态 ===== */
.rv-empty { padding: 60px 20px; text-align: center; color: var(--muted); }
.rv-empty-icon { font-size: 48px; margin-bottom: 12px; }
.rv-empty-text { font-size: 14px; }

/* ===== 响应式 ===== */
@media(max-width: 1100px) {
  .rv-flow { flex-wrap: wrap; gap: 6px; }
  .rv-disease-summary-meta { flex-wrap: wrap; }
}
@media(max-width: 900px) {
  .rv-kpi-bar { flex-direction: column; }
  .rv-filters { flex-direction: column; }
  .rv-item-decision { flex-direction: column; }
}
</style>
</head>
<body>
<div class="nav"></div>
<div class="rv-layout">
  <!-- 顶部区域 -->
  <div class="rv-header">
    <div class="rv-title-row">
      <h1>临床审核工作台</h1>
      <span class="rv-badge rv-badge-blue">专家审核模式</span>
    </div>
    <p class="rv-subtitle">专家按疾病/场景/药师专项审核，Codex 回写验收的闭环流程</p>
    <div class="rv-kpi-bar" id="rv-kpi"></div>
    <div class="rv-warning">
      <span>&#9888;</span>
      <span>当前允许状态：测试库工作版本，不得正式 CDSS 上线。所有审核决策仅用于图谱质量改进，不直接标记为 clinical_approved。</span>
    </div>
    <div class="rv-tabs" id="rv-tabs">
      <div class="rv-tab active" data-tab="disease" onclick="switchTab('disease')">
        疾病级审核 <span class="rv-tab-badge" id="tab-badge-disease">0</span>
      </div>
      <div class="rv-tab" data-tab="scenario" onclick="switchTab('scenario')">
        场景级推荐审核 <span class="rv-tab-badge" id="tab-badge-scenario">0</span>
      </div>
      <div class="rv-tab" data-tab="pharmacist" onclick="switchTab('pharmacist')">
        药师专项审核 <span class="rv-tab-badge" id="tab-badge-pharmacist">0</span>
      </div>
      <div class="rv-tab" data-tab="detail" onclick="switchTab('detail')">
        边级证据追溯 <span class="rv-tab-badge" id="tab-badge-detail">0</span>
      </div>
    </div>
  </div>
  <!-- 内容区域 -->
  <div class="rv-content">
    <div class="rv-panel active" id="panel-disease"></div>
    <div class="rv-panel" id="panel-scenario"></div>
    <div class="rv-panel" id="panel-pharmacist"></div>
    <div class="rv-panel" id="panel-detail"></div>
  </div>
</div>
<button class="rv-export-btn" onclick="exportDecisions()">
  <span>&#128229;</span> 导出审核结果 <span class="rv-export-count" id="export-count">0</span>
</button>

<!-- 加载共享导航 -->
<script src="./_shared/js/app.js"></script>
<script>
/* ================================================================
   临床审核工作台 - 可视化交互界面
   所有渲染逻辑在此文件中，数据从 JSON 驱动
   Tab 1: 疾病卡片 → 点击跳转 disease-review.html
   Tab 2-4: 疾病摘要卡片 → 点击展开内联详情
   ================================================================ */

var REVIEW_DATA = null;
var CURRENT_TAB = 'disease';
var REVIEW_DECISIONS = {};

/* ===== 中文标签映射 ===== */
var MISSING_FIELD_LABELS = {
  applicable_population: '适用人群',
  clinical_review_status: '临床确认',
  clinical_rule_or_clinical_pathway: '临床规则/路径',
  exclusion_or_contraindication: '排除/禁忌',
  recommendation_class_and_evidence_level: '推荐等级/证据等级',
  medication_contraindication: '药物禁忌',
  medication_dosage: '药物剂量',
  medication_interaction: '药物相互作用',
  medication_aliases: '药物别名',
  evidence_source_chain: '证据链',
  clinical_rule: '临床规则',
  exclusion: '排除禁忌',
  recommendation_class: '推荐等级',
  evidence_level: '证据等级'
};

var RELATION_LABELS = {
  treated_by_medication: '药物治疗',
  includes_procedure: '包含手术',
  treated_by_procedure: '手术治疗',
  has_symptom: '症状表现',
  has_sign: '体征表现',
  has_exam: '检查项目',
  has_lab_test: '检验项目',
  has_risk_factor: '危险因素',
  has_complication: '并发症',
  has_differential: '鉴别诊断',
  has_follow_up: '随访方案',
  has_prognosis: '预后',
  has_treatment_plan: '治疗方案',
  has_diagnostic_criteria: '诊断标准',
  has_risk_stratification: '风险分层',
  has_pathophysiology: '病理生理',
  has_epidemiology: '流行病学',
  has_etiology: '病因'
};

var TARGET_TYPE_LABELS = {
  Medication: '药物',
  Procedure: '手术/操作',
  Symptom: '症状',
  Sign: '体征',
  Exam: '检查',
  LabTest: '检验',
  RiskFactor: '危险因素',
  Complication: '并发症',
  DifferentialDiagnosis: '鉴别诊断',
  FollowUp: '随访方案',
  Prognosis: '预后',
  TreatmentPlan: '治疗方案',
  DiagnosisCriteria: '诊断标准',
  RiskStratification: '风险分层',
  Pathophysiology: '病理生理',
  Epidemiology: '流行病学',
  Etiology: '病因'
};

/* 颜色映射 */
var SCENE_TYPE_COLORS = {
  '手术/操作治疗': 'cyan', '药物治疗': 'purple', '症状表现': 'pink',
  '体征表现': 'pink', '检查项目': 'blue', '检验项目': 'blue',
  '危险因素': 'yellow', '并发症': 'red', '鉴别诊断': 'yellow',
  '随访方案': 'green', '预后': 'green', '治疗方案': 'blue',
  '诊断标准': 'blue', '风险分层': 'yellow', '流行病学': 'muted',
  '病因': 'muted', '病理生理': 'muted'
};

function badgeColor(type) { return SCENE_TYPE_COLORS[type] || 'blue'; }

/* SVG 箭头模板 */
var ARROW_SVG = '<svg viewBox="0 0 28 14"><line x1="0" y1="7" x2="22" y2="7" stroke="currentColor" stroke-width="2"/><polygon points="22,3 28,7 22,11" fill="currentColor"/></svg>';

/* ===== 数据加载 ===== */
function loadReviewData() {
  fetch('./assets/clinical_review_frontend_data.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      REVIEW_DATA = data;
      renderKPI(data.summary);
      renderDiseasePanel(data.disease_reviews);
      renderScenarioPanel(data.scenario_cards);
      renderPharmacistPanel(data.pharmacist_items);
      renderDetailPanel(data.detail_items || []);

function filterDiseases() {

/* =====================================================================
   疾病分组工具函数（Tab 2/3/4 共用）
   ===================================================================== */
function groupByDisease(items, codeField, nameField) {
  var groups = {};
  var order = [];
  items.forEach(function(item) {
    var key = item[codeField] + '|' + item.batch_id;
    if (!groups[key]) {
      groups[key] = {
        disease_code: item[codeField],
        disease_name: item[nameField],
        batch_id: item.batch_id,
        items: []
      };
      order.push(key);
    }
    groups[key].items.push(item);
  });
  return { groups: groups, order: order };
}

/* 生成疾病摘要卡片 HTML（顶层卡片） */
function renderDiseaseSummaryCard(key, group, icon, countLabel, borderColor) {
  var batchShort = group.batch_id.split('-').slice(2, 4).join('-');
  var count = group.items.length;
  var safeKey = key.replace(/[|]/g, '-');

  var h = '<div class="rv-disease-group" data-group-key="' + safeKey + '">';
  h += '<div class="rv-disease-summary" id="dsum-' + safeKey + '" onclick="toggleDiseaseExpand(\'' + safeKey + '\')">';
  h += '<div class="rv-disease-summary-left">';
  h += '<div class="rv-disease-summary-name">' + group.disease_name + '</div>';
  h += '<div class="rv-disease-summary-code">' + group.disease_code + '</div>';
  h += '</div>';
  h += '<div class="rv-disease-summary-meta">';
  h += '<span class="rv-badge rv-badge-blue" style="font-size:10px">' + batchShort + '</span>';
  h += '<div class="rv-disease-summary-count">';
  h += '<div class="rv-disease-summary-count-num" style="color:' + borderColor + '">' + count + '</div>';
  h += '<div class="rv-disease-summary-count-label">' + countLabel + '</div>';
  h += '</div>';
  h += '<div class="rv-disease-summary-toggle">';
  h += '<svg viewBox="0 0 14 14"><polyline points="3,5 7,9 11,5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  h += '</div>';
  h += '</div>';
  h += '</div>';

  h += '</div>';
  return h;
}

/* 展开/收起疾病详情 */
function toggleDiseaseExpand(safeKey) {
  var summary = document.getElementById('dsum-' + safeKey);
  var expand = document.getElementById('dexp-' + safeKey);
  if (!summary || !expand) return;

  if (expand.classList.contains('open')) {
    expand.classList.remove('open');
    summary.classList.remove('expanded');
    return;
  }

  /* 如果内容为空，根据当前 Tab 渲染 */
  if (!expand.innerHTML.trim()) {
    var tab = CURRENT_TAB;
    if (tab === 'scenario') {
      expand.innerHTML = renderScenarioItemsForDisease(safeKey);
    } else if (tab === 'pharmacist') {
      expand.innerHTML = renderPharmacistItemsForDisease(safeKey);
    } else if (tab === 'detail') {
      expand.innerHTML = renderDetailItemsForDisease(safeKey);
    }
  }

  expand.classList.add('open');
  summary.classList.add('expanded');
}

/* 为某疾病渲染边级证据项内容 */
function renderDetailItemsForDisease(safeKey) {
  if (!REVIEW_DATA || !REVIEW_DATA.detail_items) return '';
  var items = [];
  REVIEW_DATA.detail_items.forEach(function(i) {
    var k = i.source_code + '|' + i.batch_id;
    if (k.replace(/[|]/g, '-') === safeKey) items.push(i);
  });
  if (!items.length) return '<div style="padding:12px 0;font-size:12px;color:var(--muted)">该疾病暂无边级证据数据</div>';

  var h = '';
  items.forEach(function(item) {
    var rid = item.review_id;
    var fields = (item.missing_fields || '').split(';').filter(function(f) { return f.trim(); });
    var evidence = (item.evidence_source_chain || '');
    var evidenceSample = item.evidence_text_sample || '';
    var d = REVIEW_DECISIONS[rid] || {};

    h += '<div class="rv-item-card" data-review-id="' + rid + '">';

    /* 头部 */
    h += '<div class="rv-item-header">';
    h += '<div>';
    h += '<div class="rv-item-title">' + item.target_name + '</div>';
    h += '<div class="rv-item-subtitle">' + (item.target_code || '-') + ' &middot; ' + (TARGET_TYPE_LABELS[item.target_type] || item.target_type) + '</div>';
    h += '</div>';
    h += '<div class="rv-item-badges">';
    h += '<span class="rv-badge rv-badge-' + (badgeColor(TARGET_TYPE_LABELS[item.target_type] || '') || 'blue') + '">' + (TARGET_TYPE_LABELS[item.target_type] || item.target_type) + '</span>';
    h += '</div>';
    h += '</div>';

    /* 关系链 */
    var relLabel = RELATION_LABELS[item.relation_type] || item.relation_type;
    h += '<div class="rv-flow">';
    h += '<div class="rv-flow-node rv-flow-disease">' + (item.source_name || item.disease_name) + '</div>';
    h += '<div class="rv-flow-arrow">' + ARROW_SVG + '</div>';
    h += '<div class="rv-flow-node rv-flow-relation">' + relLabel + '</div>';
    h += '<div class="rv-flow-arrow">' + ARROW_SVG + '</div>';
    h += '<div class="rv-flow-node rv-flow-target">' + item.target_name + '</div>';
    h += '</div>';

    /* 缺失字段 */
    if (fields.length) {
      h += '<div class="rv-missing-bar">';
      h += '<div class="rv-missing-title">&#9888; 缺失字段 (' + fields.length + ')</div>';
      fields.forEach(function(f) {
        var label = MISSING_FIELD_LABELS[f.trim()] || f.trim();
        h += '<span class="rv-chip rv-chip-missing">' + label + '</span>';
      });
      h += '</div>';
    }

    /* 证据摘要 */
    if (evidence || evidenceSample) {
      h += '<div class="rv-evidence-block">';
      if (evidence) {
        h += '<div class="rv-evidence-label">证据来源链</div>';
        h += '<div class="rv-evidence-chains">';
        var chains = evidence.split('|').filter(function(c) { return c.trim(); });
        chains.forEach(function(c) { h += '<div class="rv-evidence-chain-item">' + c.trim() + '</div>'; });
        h += '</div>';
      }
      if (evidenceSample) {
        h += '<div class="rv-evidence-label" style="margin-top:8px">证据原文摘录</div>';
        h += '<div class="rv-evidence-text" id="etxt-' + rid + '">' + evidenceSample + '</div>';
        h += '<div class="rv-evidence-toggle" onclick="toggleEvidenceText(\'' + rid + '\')">展开全文</div>';
      }
      if (item.required_action) {
        h += '<div style="margin-top:8px;font-size:11px"><b style="color:var(--muted)">所需操作:</b> <span style="color:var(--yellow)">' + item.required_action + '</span></div>';
      }
      h += '</div>';
    }

    /* 审核重点 */
    if (item.review_focus) {
      h += '<div class="rv-focus-box">&#127919; ' + item.review_focus + '</div>';
    }

    /* 决策区 */
    h += '<div class="rv-item-decision">';
    h += '<div class="rv-toggle-group">';
    var ddLabels = ['通过','需修改','拒绝'];
    var ddColors = { '通过': 'active-green', '需修改': 'active-yellow', '拒绝': 'active-red' };
    ddLabels.forEach(function(dec) {
      var key = dec === '通过' ? 'approve' : dec === '需修改' ? 'revise' : 'reject';
      var current = d.detail_decision;
      var cls = current === key ? ddColors[dec] : '';
      h += '<button class="rv-toggle-btn ' + cls + '" onclick="setDetailDecision(\'' + rid + '\',\'' + key + '\',\'' + dec + '\',this)">' + dec + '</button>';
    });
    h += '</div>';
    h += '<textarea class="rv-comment" style="flex:1;min-width:180px" placeholder="专家意见（需修改/拒绝时必填）" onchange="setDecision(\'' + rid + '\',\'detail_comment\',this.value)">' + (d.detail_comment || '') + '</textarea>';
    h += '</div>';

    h += '</div>'; /* item-card end */
  });
  return h;
}

function setDetailDecision(rid, key, label, el) {
  setDecision(rid, 'detail_decision', key);
  var btns = el.parentElement.querySelectorAll('.rv-toggle-btn');
  var ddColors = { '通过': 'active-green', '需修改': 'active-yellow', '拒绝': 'active-red' };
  btns.forEach(function(b) {
    b.className = 'rv-toggle-btn';
    if (b.textContent === label) b.className = 'rv-toggle-btn ' + ddColors[label];
  });
  updateExportCount();
}

function toggleEvidenceText(rid) {
  var el = document.getElementById('etxt-' + rid);
  if (!el) return;
  var toggle = el.nextElementSibling;
  if (el.classList.contains('expanded')) {
    el.classList.remove('expanded');
    if (toggle) toggle.textContent = '展开全文';
  } else {
    el.classList.add('expanded');
    if (toggle) toggle.textContent = '收起';
  }
}

function filterDetailGroups() {
  var d = document.getElementById('dt-disease').value;
  var q = document.getElementById('dt-search').value.toLowerCase();
  var groups = document.querySelectorAll('#dt-groups .rv-disease-group');
  var shown = 0;
  groups.forEach(function(g) {
    var nameEl = g.querySelector('.rv-disease-summary-name');
    var codeEl = g.querySelector('.rv-disease-summary-code');
    var name = nameEl ? nameEl.textContent : '';
    var code = codeEl ? codeEl.textContent : '';
    var show = (!d || name === d) && (!q || name.toLowerCase().indexOf(q) !== -1 || code.toLowerCase().indexOf(q) !== -1);
    g.style.display = show ? '' : 'none';
    if (show) shown++;
  });
  updateDtCount(shown);
}

function updateDtCount(n) {
  var el = document.getElementById('dt-count');
  if (el) el.textContent = '显示 ' + (n !== undefined ? n : document.querySelectorAll('#dt-groups .rv-disease-group').length) + ' 个疾病 / ' + (REVIEW_DATA ? (REVIEW_DATA.detail_items || []).length : 0) + ' 项边级';
}

/* =====================================================================
   标签页切换
   ===================================================================== */
function switchTab(tab) {
  CURRENT_TAB = tab;
  document.querySelectorAll('.rv-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === tab); });
  document.querySelectorAll('.rv-panel').forEach(function(p) { p.classList.toggle('active', p.id === 'panel-' + tab); });
}

/* =====================================================================
   决策状态管理
   ===================================================================== */
function setDecision(reviewId, field, value) {
  if (!REVIEW_DECISIONS[reviewId]) REVIEW_DECISIONS[reviewId] = {};
  REVIEW_DECISIONS[reviewId][field] = value;
  REVIEW_DECISIONS[reviewId]._review_id = reviewId;
  updateExportCount();
}

function updateExportCount() {
  var count = Object.keys(REVIEW_DECISIONS).length;
  var el = document.getElementById('export-count');
  if (el) el.textContent = count;
}

/* =====================================================================
   强制备注校验
   ===================================================================== */
function validateDecisions() {
  var errors = [];
  Object.keys(REVIEW_DECISIONS).forEach(function(rid) {
    var d = REVIEW_DECISIONS[rid];
    /* Tab 1: 疾病级 */
    if (d.clinical_use_decision === '需修改' || d.clinical_use_decision === '禁用') {
      if (!d.expert_comment || !d.expert_comment.trim()) errors.push('疾病 ' + rid + ': 选择"' + d.clinical_use_decision + '"时专家意见必填');
    }
    /* Tab 2: 场景级 */
    if (d.clinical_use_decision === '需修改' || d.clinical_use_decision === '禁用') {
      if (!d.expert_comment || !d.expert_comment.trim()) errors.push('场景 ' + rid + ': 选择"' + d.clinical_use_decision + '"时专家意见必填');
    }
    /* Tab 3: 药师级 */
    if (d.pharmacist_decision === '需修改' || d.pharmacist_decision === '禁用') {
      if (!d.pharmacist_comment || !d.pharmacist_comment.trim()) errors.push('药师 ' + rid + ': 选择"' + d.pharmacist_decision + '"时药师意见必填');
    }
    /* Tab 4: 边级 */
    if (d.detail_decision === 'revise' || d.detail_decision === 'reject') {
      if (!d.detail_comment || !d.detail_comment.trim()) errors.push('边级 ' + rid + ': 选择"' + d.detail_decision + '"时专家意见必填');
    }
  });
  return errors;
}

/* =====================================================================
   导出审核结果
   ===================================================================== */
function exportDecisions() {
  if (!REVIEW_DATA) { alert('数据未加载'); return; }
  var errors = validateDecisions();
  if (errors.length) {
    alert('导出校验失败:\n' + errors.join('\n'));
    return;
  }
  var now = new Date();
  var ts = now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate()) + '_' + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());

  var rows = [];

  /* 疾病级 */
  REVIEW_DATA.disease_reviews.forEach(function(r) {
    var d = REVIEW_DECISIONS[r.review_id] || {};
    if (d.clinical_use_decision) {
      rows.push({
        review_level: 'disease', review_id: r.review_id, batch_id: r.batch_id,
        disease_code: r.disease_code, disease_name: r.disease_name,
        scenario_type: '', relation_type: '', target_type: '', relation_id: '', target_code: '', target_name: '',
        review_decision: d.clinical_use_decision || '', overall_risk_level: d.overall_risk_level || '',
        reviewer_name: d.reviewer_name || '', reviewer_role: d.reviewer_role || '',
        reviewed_at: d.reviewed_at || '', expert_comment: d.expert_comment || ''
      });
    }
  });

  /* 场景级 */
  REVIEW_DATA.scenario_cards.forEach(function(c) {
    var d = REVIEW_DECISIONS[c.review_id] || {};
    if (d.clinical_use_decision) {
      rows.push({
        review_level: 'scenario', review_id: c.review_id, batch_id: c.batch_id,
        disease_code: c.disease_code, disease_name: c.disease_name,
        scenario_type: c.scenario_type, relation_type: c.relation_type, target_type: c.target_type,
        relation_id: '', target_code: '', target_name: '',
        review_decision: d.clinical_use_decision || '', overall_risk_level: '',
        reviewer_name: '', reviewer_role: '', reviewed_at: '', expert_comment: d.expert_comment || ''
      });
    }
  });

  /* 药师级 */
  REVIEW_DATA.pharmacist_items.forEach(function(p) {
    var d = REVIEW_DECISIONS[p.review_id] || {};
    if (d.pharmacist_decision) {
      rows.push({
        review_level: 'pharmacist', review_id: p.review_id, batch_id: p.batch_id,
        disease_code: p.disease_code, disease_name: p.disease_name,
        scenario_type: '', relation_type: p.relation_type, target_type: 'Medication',
        relation_id: p.relation_id || '', target_code: p.target_code, target_name: p.target_name,
        review_decision: d.pharmacist_decision || '', overall_risk_level: '',
        reviewer_name: '', reviewer_role: '', reviewed_at: '', expert_comment: d.pharmacist_comment || ''
      });
    }
  });

  /* 边级 */
  (REVIEW_DATA.detail_items || []).forEach(function(i) {
    var d = REVIEW_DECISIONS[i.review_id] || {};
    if (d.detail_decision) {
      rows.push({
        review_level: 'detail', review_id: i.review_id, batch_id: i.batch_id,
        disease_code: i.source_code || i.disease_code, disease_name: i.source_name || i.disease_name,
        scenario_type: '', relation_type: i.relation_type, target_type: i.target_type,
        relation_id: i.relation_id || '', target_code: i.target_code, target_name: i.target_name,
        review_decision: d.detail_decision || '', overall_risk_level: '',
        reviewer_name: '', reviewer_role: '', reviewed_at: '', expert_comment: d.detail_comment || ''
      });
    }
  });

  if (!rows.length) { alert('暂无已填写的审核决策，请先完成审核再导出'); return; }

  /* 导出 JSON */
  var jsonExport = {
    schema_version: 'clinical-review-decision-export-v1',
    exported_at: now.toLocaleString('zh-CN'),
    exported_by: 'Trae前端审核',
    total_items: rows.length,
    items: rows
  };
  downloadFile(JSON.stringify(jsonExport, null, 2), 'clinical_review_decisions_export_' + ts + '.json', 'application/json');

  /* 导出 CSV */
  var csvHeaders = ['review_level','review_id','batch_id','disease_code','disease_name','scenario_type','relation_type','target_type','relation_id','target_code','target_name','review_decision','overall_risk_level','reviewer_name','reviewer_role','reviewed_at','expert_comment'];
  var csvLines = [csvHeaders.join(',')];
  rows.forEach(function(r) {
    csvLines.push(csvHeaders.map(function(h) { return '"' + (r[h] || '').replace(/"/g, '""') + '"'; }).join(','));
  });
  downloadFile('\uFEFF' + csvLines.join('\n'), 'clinical_review_decisions_export_' + ts + '.csv', 'text/csv;charset=utf-8');

  alert('已导出 ' + rows.length + ' 条审核决策\nJSON + CSV 文件已下载');
}

function downloadFile(content, filename, type) {
  var blob = new Blob([content], { type: type });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
function pad(n) { return n < 10 ? '0' + n : '' + n; }

/* =====================================================================
   初始化
   ===================================================================== */
document.addEventListener('DOMContentLoaded', function() {
  renderNav('review');
  loadReviewData();
});
</script>
