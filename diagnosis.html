/* 预处理：将所有术语扁平化，建立 (术语 → 维度) 的映射，同时保留按维度分组 */
var ALL_TERMS_FLAT = {};  // term -> [dimKey, ...]
var DIM_TERM_LIST = {};   // dimKey -> [term, ...]

(function buildTermIndex() {
  var dimKeys = Object.keys(MED_TERMS);
  dimKeys.forEach(function(dimKey) {
    var terms = MED_TERMS[dimKey];
    DIM_TERM_LIST[dimKey] = terms.slice(); // copy
    terms.forEach(function(t) {
      if (!ALL_TERMS_FLAT[t]) ALL_TERMS_FLAT[t] = [];
      if (ALL_TERMS_FLAT[t].indexOf(dimKey) === -1) ALL_TERMS_FLAT[t].push(dimKey);
    });
  });
})();

/* ---- 4. 主匹配函数 ---- */
function runDiagnosis() {
  var text = document.getElementById('patient-input').value.trim();
  if (!text) { alert('请输入患者临床信息'); return; }

  // 提取关键词
  var keywords = extractKeywords(text);
  displayKeywords(keywords);

  if (keywords.length === 0) {
    document.getElementById('diagnosis-results').innerHTML =
      '<div class="no-results"><div class="no-results-icon">&#128269;</div><div>未提取到有效医学关键词，请使用更具体的医学术语</div></div>';
    document.getElementById('stats-bar').style.display = 'none';
    return;
  }

  // 对每个疾病做加权匹配
  var matches = [];
  var allHitDims = {}; // 全局统计命中维度

  Object.keys(KG_DATA.diseases).forEach(function(code) {
    var disease = KG_DATA.diseases[code];
    var dims = disease.dimensions;
    var hitDimensions = {}; // dimKey -> [entityName, ...]
    var dimHitCount = {};   // dimKey -> count
    var totalScore = 0;
    var totalHits = 0;

    // 遍历全部17维度（DifferentialDiagnosis权重为0，但仍可显示）
    DIM_KEYS.forEach(function(dimKey) {
      var items = dims[dimKey] || [];
      if (items.length === 0) return;
      var weight = DIM_WEIGHTS[dimKey] || 0;
      var dimHits = [];

      items.forEach(function(entity) {
        var entityName = entity.name;
        // 检查实体名是否包含任一关键词，或关键词是否包含实体名
        for (var k = 0; k < keywords.length; k++) {
          var kw = keywords[k];
          if (entityName.indexOf(kw) !== -1 || kw.indexOf(entityName) !== -1) {
            if (dimHits.indexOf(entityName) === -1) {
              dimHits.push(entityName);
            }
            break;
          }
        }
      });

      if (dimHits.length > 0) {
        hitDimensions[dimKey] = dimHits;
        dimHitCount[dimKey] = dimHits.length;
        totalScore += dimHits.length * weight;
        totalHits += dimHits.length;
        if (!allHitDims[dimKey]) allHitDims[dimKey] = 0;
        allHitDims[dimKey] += dimHits.length;
      }
    });

    if (totalHits > 0) {
      matches.push({
        code: code,
        name: disease.info.name,
        nameEn: disease.info.name_en || '',
        hitDimensions: hitDimensions,
        dimHitCount: dimHitCount,
        totalScore: totalScore,
        totalHits: totalHits,
        coverage: getCoverage(code),
        dimCoverage: Object.keys(hitDimensions).length
      });
    }
  });

  // 按得分降序排序
  matches.sort(function(a, b) { return b.totalScore - a.totalScore; });

  // 计算最大得分（用于进度条百分比）
  var maxScore = matches.length > 0 ? matches[0].totalScore : 1;

  // 统计信息
  var matchedDims = 0;
  Object.keys(allHitDims).forEach(function() { matchedDims++; });
  document.getElementById('stat-matched').textContent = matches.length;
  document.getElementById('stat-max').textContent = matches.length > 0 ? matches[0].totalScore : 0;
  document.getElementById('stat-kw').textContent = keywords.length;
  document.getElementById('stat-dims').textContent = matchedDims;
  document.getElementById('stats-bar').style.display = 'flex';

  displayResults(matches, maxScore);
}

/* ---- 5. 关键词提取 ---- */
function extractKeywords(text) {
  var keywords = [];
  var dimKeys = Object.keys(MED_TERMS);

  // 按维度匹配（优先匹配长术语，避免短词误匹配）
  dimKeys.forEach(function(dimKey) {
    var terms = MED_TERMS[dimKey];
    terms.forEach(function(term) {
      if (text.indexOf(term) !== -1 && keywords.indexOf(term) === -1) {
        keywords.push(term);
      }
    });
  });

  // 补充提取：中文短语（2-8字符），但排除已匹配的术语
  var phrases = text.match(/[\u4e00-\u9fa5]{2,8}/g) || [];
  phrases.forEach(function(phrase) {
    // 只添加与已知医学术语部分重叠但不完全相同的短语
    if (keywords.indexOf(phrase) === -1) {
      // 检查是否包含在某个已匹配术语中
      var isSub = false;
      for (var i = 0; i < keywords.length; i++) {
        if (keywords[i].indexOf(phrase) !== -1) { isSub = true; break; }
      }
      if (!isSub) {
        // 检查是否是某个已知术语的子串
        var allTerms = Object.keys(ALL_TERMS_FLAT);
        for (var j = 0; j < allTerms.length; j++) {
          if (allTerms[j].indexOf(phrase) !== -1 && allTerms[j] !== phrase) {
            // 该短语是某个医学术语的一部分，跳过
            isSub = true;
            break;
          }
        }
      }
    }
  });

  return keywords;
}

/* ---- 6. 显示关键词 ---- */
function displayKeywords(keywords) {
  var section = document.getElementById('keywords-section');
  var list = document.getElementById('keywords-list');
  if (keywords.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  var h = '';
  keywords.forEach(function(kw) {
    // 找到该术语所属的维度
    var dimLabel = '';
    var dims = ALL_TERMS_FLAT[kw];
    if (dims && dims.length > 0) {
      dimLabel = DIM_NAMES[dims[0]];
    }
    h += '<span class="keyword-tag" title="' + (dimLabel || '未知') + '">' + kw + '</span>';
  });
  list.innerHTML = h;
}

/* ---- 7. 显示匹配结果 ---- */
function displayResults(matches, maxScore) {
  var container = document.getElementById('diagnosis-results');
  if (matches.length === 0) {
    container.innerHTML = '<div class="no-results"><div class="no-results-icon">&#128269;</div><div>未找到匹配的疾病，请尝试使用更具体的医学术语</div></div>';
    return;
  }

  var h = '';
  var displayCount = Math.min(matches.length, 30);

  for (var idx = 0; idx < displayCount; idx++) {
    var m = matches[idx];
    var isTop3 = idx < 3;
    var pct = maxScore > 0 ? Math.round((m.totalScore / maxScore) * 100) : 0;
    var cardClass = 'match-card' + (isTop3 ? ' top3' : '');
    var nameClass = isTop3 ? 'card-name card-top3' : 'card-name';

    h += '<div class="' + cardClass + '">';
    h += '<div class="card-bar"></div>';
    h += '<div class="card-body">';

    // Header: rank + name + score
    h += '<div class="card-top">';
    h += '<div class="' + nameClass + '">';
    h += '<span class="rank">' + (idx + 1) + '</span>';
    h += m.name;
    if (m.nameEn) h += '<span class="card-name-en">' + m.nameEn + '</span>';
    h += '</div>';
    h += '<div class="card-score-badge">';
    h += '<div><div class="card-score-num">' + m.totalScore + '</div><div class="card-score-label">匹配得分</div></div>';
    h += '</div>';
    h += '</div>';

    // Score bar
    h += '<div class="score-bar-wrap">';
    h += '<div class="score-bar-track"><div class="score-bar-fill" style="width:' + pct + '%"></div></div>';
    h += '</div>';

    // Dimension tags
    h += '<div class="dim-tags-wrap">';
    DIM_KEYS.forEach(function(dimKey) {
      if (m.hitDimensions[dimKey]) {
        var count = m.hitDimensions[dimKey].length;
        var dimLabel = DIM_NAMES[dimKey];
        h += '<span class="dim-tag dim-' + dimKey + '">' + dimLabel + '<span class="dim-count">x' + count + '</span></span>';
      }
    });
    h += '</div>';

    // Radar chart (canvas) + legend
    h += '<div class="radar-wrap">';
    h += '<div class="radar-chart"><canvas id="radar-' + idx + '" width="176" height="176"></canvas></div>';
    h += '<div class="radar-legend">';
    // Show dimension coverage
    var coveredDims = [];
    DIM_KEYS.forEach(function(dimKey) {
      if (m.hitDimensions[dimKey]) {
        var w = DIM_WEIGHTS[dimKey];
        var name = DIM_NAMES[dimKey];
        var dotColor = getDimColor(dimKey);
        coveredDims.push({ key: dimKey, name: name, count: m.hitDimensions[dimKey].length, weight: w, color: dotColor });
      }
    });
    coveredDims.forEach(function(d) {
      h += '<div class="radar-legend-row"><span class="radar-legend-dot" style="background:' + d.color + '"></span>' + d.name + ': ' + d.count + '项 (权重' + d.weight + ')</div>';
    });
    h += '</div>';
    h += '</div>';

    // Hit entity details (expandable)
    h += '<div class="hit-entities">';
    h += '<div class="hit-entities-title">命中实体明细</div>';
    h += '<div class="hit-entity-list">';
    DIM_KEYS.forEach(function(dimKey) {
      if (m.hitDimensions[dimKey]) {
        m.hitDimensions[dimKey].forEach(function(name) {
          h += '<span class="hit-entity" title="' + DIM_NAMES[dimKey] + '">' + name + '</span>';
        });
      }
    });
    h += '</div></div>';

    h += '</div>'; // card-body
    h += '</div>'; // match-card
  }

  container.innerHTML = h;

  // 绘制雷达图
  for (var i = 0; i < displayCount; i++) {
    drawRadar('radar-' + i, matches[i]);
  }
}

/* ---- 8. 维度颜色映射 ---- */
function getDimColor(dimKey) {
  var colors = {
    Symptom: '#4f8cff',
    Sign: '#cc5de8',
    Exam: '#22b8cf',
    LabTest: '#51cf66',
    Medication: '#ff922b',
    Procedure: '#f06595',
    RiskFactor: '#ff6b6b',
    Complication: '#ffd43b',
    DifferentialDiagnosis: '#8b90a0',
    RiskStratification: '#8b90a0',
    Prognosis: '#8b90a0',
    FollowUp: '#8b90a0',
    TreatmentPlan: '#6edfa0',
    DiagnosisCriteria: '#ffe066',
    Etiology: '#d78fe8',
    Epidemiology: '#8b90a0',
    Pathophysiology: '#5ecdd8'
  };
  return colors[dimKey] || '#8b90a0';
}

/* ---- 9. Canvas 雷达图绘制 ---- */
function drawRadar(canvasId, match) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var cx = W / 2, cy = H / 2;
  var R = Math.min(W, H) / 2 - 16;

  ctx.clearRect(0, 0, W, H);

  // 绘制17个轴（排除DifferentialDiagnosis的特殊显示，但保留结构）
  // 为避免过于拥挤，只显示有数据的维度 + 4个核心维度作为骨架
  var displayDims = DIM_KEYS.slice(0, 17);
  var n = displayDims.length;
  var angleStep = (2 * Math.PI) / n;
  var startAngle = -Math.PI / 2; // 从顶部开始

  // 背景网格（3层）
  for (var ring = 1; ring <= 3; ring++) {
    var r = (R * ring) / 3;
    ctx.beginPath();
    for (var i = 0; i <= n; i++) {
      var angle = startAngle + (i % n) * angleStep;
      var x = cx + r * Math.cos(angle);
      var y = cy + r * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(46,51,72,0.8)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 轴线
  for (var i = 0; i < n; i++) {
    var angle = startAngle + i * angleStep;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
    ctx.strokeStyle = 'rgba(46,51,72,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 数据区域
  ctx.beginPath();
  var hasData = false;
  for (var i = 0; i <= n; i++) {
    var idx = i % n;
    var dimKey = displayDims[idx];
    var weight = DIM_WEIGHTS[dimKey] || 0;
    var hitCount = (match.hitDimensions[dimKey] ? match.dimHitCount[dimKey] : 0) || 0;
    // 归一化：命中数 × 权重 / 最大可能得分
    var maxDimScore = weight * 5; // 假设最多命中5个
    var val = maxDimScore > 0 ? Math.min(hitCount * weight / maxDimScore, 1) : 0;
    var r = val * R;
    var angle = startAngle + idx * angleStep;
    var x = cx + r * Math.cos(angle);
    var y = cy + r * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    if (val > 0) hasData = true;
  }
  ctx.closePath();
  if (hasData) {
    ctx.fillStyle = 'rgba(79,140,255,0.15)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(79,140,255,0.7)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // 数据点
  for (var i = 0; i < n; i++) {
    var dimKey = displayDims[i];
    var weight = DIM_WEIGHTS[dimKey] || 0;
    var hitCount = (match.hitDimensions[dimKey] ? match.dimHitCount[dimKey] : 0) || 0;
    var maxDimScore = weight * 5;
    var val = maxDimScore > 0 ? Math.min(hitCount * weight / maxDimScore, 1) : 0;
    var r = val * R;
    var angle = startAngle + i * angleStep;
    var x = cx + r * Math.cos(angle);
    var y = cy + r * Math.sin(angle);

    if (val > 0) {
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, 2 * Math.PI);
      ctx.fillStyle = '#4f8cff';
      ctx.fill();
    }
  }
}

/* ---- 10. 清空 ---- */
function clearInput() {
  document.getElementById('patient-input').value = '';
  document.getElementById('keywords-section').style.display = 'none';
  document.getElementById('stats-bar').style.display = 'none';
  document.getElementById('diagnosis-results').innerHTML =
    '<div class="no-results"><div class="no-results-icon">&#128269;</div><div>请输入患者临床信息后点击"匹配诊断"</div></div>';
}
