<script>
/* ================================================================
   网络探索 - 知识图谱交互分析
   ================================================================ */

/* ---------- Constants ---------- */
var DIM_COLORS = {
  Symptom: '#51cf66', Sign: '#cc5de8', Exam: '#22b8cf', LabTest: '#748ffc',
  Medication: '#ff922b', Procedure: '#f06595', RiskFactor: '#ff6b6b',
  Complication: '#ffd43b', DiagnosisCriteria: '#94d82d', TreatmentPlan: '#66d9e8',
  Etiology: '#fcc419', DifferentialDiagnosis: '#ea7ccc',
  RiskStratification: '#a9e34b', Prognosis: '#63e6be', FollowUp: '#fcc419',
  Epidemiology: '#da77f2', Pathophysiology: '#748ffc'
};
var DIM_LABELS = {
  Symptom: '症状', Sign: '体征', Exam: '检查', LabTest: '检验',
  Medication: '药物', Procedure: '手术', RiskFactor: '危险因素',
  Complication: '并发症', DiagnosisCriteria: '诊断标准', TreatmentPlan: '治疗方案',
  Etiology: '病因', DifferentialDiagnosis: '鉴别诊断',
  RiskStratification: '风险分层', Prognosis: '预后', FollowUp: '随访',
  Epidemiology: '流行病学', Pathophysiology: '病理生理'
};
var DISEASE_COLOR = '#4f8cff';

/* ---------- State ---------- */
var GRAPH_CHART = null;
var CURRENT_DISEASE_CODE = null;
var DIM_FILTERS = {};           // dimKey -> bool
var MAX_LEVEL = 2;
var EXPLORE_PATH = [];
var PATH_MODE = false;
var PATH_SELECT_COUNT = 0;
var PATH_START = null;
var ALL_GRAPH_NODES = {};       // name -> nodeData
var ALL_GRAPH_EDGES = [];       // all edges for BFS
var NODE_EXPANDED = {};         // entityName -> bool (level 1 expanded)
var SEARCH_RESULTS = null;      // search filtered node names

/* ---------- Init ---------- */
loadData(function(d) {
  renderNav('network');
  populateDiseaseSelect(d);
  initDimFilters();
  renderLegend();
  bindLevelRadio();
  // default: select first disease
  var keys = Object.keys(d.diseases);
  if (keys.length > 0) {
    document.getElementById('nw-disease-select').value = keys[0];
    onDiseaseSelect();
  }
});

/* ================================================================
   Disease Select
   ================================================================ */
function populateDiseaseSelect(d) {
  var sel = document.getElementById('nw-disease-select');
  var groups = {};
  Object.keys(d.diseases).forEach(function(code) {
    var info = d.diseases[code].info;
    var g = parseParentCode(info.parent).group;
    if (!groups[g]) groups[g] = [];
    groups[g].push({ code: code, name: info.name });
  });
  var html = '<option value="">请选择疾病</option>';
  Object.keys(groups).sort().forEach(function(g) {
    html += '<optgroup label="' + g + '">';
    groups[g].sort(function(a, b) { return a.name.localeCompare(b.name); });
    groups[g].forEach(function(d) {
      html += '<option value="' + d.code + '">' + d.name + '</option>';
    });
    html += '</optgroup>';
  });
  sel.innerHTML = html;
}

function onDiseaseSelect() {
  var code = document.getElementById('nw-disease-select').value;
  if (!code) return;
  setCenter(code);
}

/* ================================================================
   Center Node
   ================================================================ */
function setCenter(code) {
  CURRENT_DISEASE_CODE = code;
  EXPLORE_PATH = [];
  NODE_EXPANDED = {};
  PATH_SELECT_COUNT = 0;
  PATH_START = null;
  PATH_MODE = false;
  document.getElementById('btn-path-mode').classList.remove('active');
  updateCenterCard(code);
  updatePathList();
  renderGraph();
}

function updateCenterCard(code) {
  var d = KG_DATA.diseases[code];
  if (!d) return;
  document.getElementById('cc-name').textContent = d.info.name;
  document.getElementById('cc-code').textContent = d.info.code;
  document.getElementById('cc-type').textContent = '疾病 / Disease';
  document.getElementById('nw-center-name').textContent = d.info.name;
}

/* ================================================================
   Dimension Filters
   ================================================================ */
function initDimFilters() {
  DIM_KEYS.forEach(function(k) { DIM_FILTERS[k] = true; });
  renderDimFilters();
}

function renderDimFilters() {
  var html = '';
  DIM_KEYS.forEach(function(k) {
    var count = getDimCount(k);
    var color = DIM_COLORS[k] || '#888';
    html += '<label class="nw-dim-item">';
    html += '<input type="checkbox" ' + (DIM_FILTERS[k] ? 'checked' : '') +
            ' onchange="onDimToggle(\'' + k + '\', this.checked)">';
    html += '<span class="dim-dot" style="background:' + color + '"></span>';
    html += '<span class="dim-label">' + DIM_LABELS[k] + ' ' + k + '</span>';
    html += '<span class="dim-count">' + count + '</span>';
    html += '</label>';
  });
  document.getElementById('nw-dim-filters').innerHTML = html;
}

function getDimCount(dimKey) {
  if (!KG_DATA || !CURRENT_DISEASE_CODE) return 0;
  var d = KG_DATA.diseases[CURRENT_DISEASE_CODE];
  if (!d) return 0;
  return (d.dimensions[dimKey] || []).length;
}

function onDimToggle(dimKey, checked) {
  DIM_FILTERS[dimKey] = checked;
  renderGraph();
}

/* ================================================================
   Legend
   ================================================================ */
function renderLegend() {
  var items = [
    { name: '疾病', color: DISEASE_COLOR }
  ];
  DIM_KEYS.forEach(function(k) {
    items.push({ name: DIM_LABELS[k], color: DIM_COLORS[k] || '#888' });
  });
  var html = '';
  items.forEach(function(it) {
    html += '<div class="nw-legend-item">';
    html += '<span class="nw-legend-dot" style="background:' + it.color + '"></span>';
    html += '<span>' + it.name + '</span>';
    html += '</div>';
  });
  document.getElementById('nw-legend').innerHTML = html;
}

/* ================================================================
   Level Radio
   ================================================================ */
function bindLevelRadio() {
  var radios = document.querySelectorAll('input[name="nw-level"]');
  radios.forEach(function(r) {
    r.addEventListener('change', function() {
      MAX_LEVEL = parseInt(this.value);
      renderGraph();
    });
  });
}

/* ================================================================
   Build Graph Data
   ================================================================ */
function buildGraphData() {
  var nodes = [], links = [];
  var disease = KG_DATA.diseases[CURRENT_DISEASE_CODE];
  if (!disease) return { nodes: [], links: [] };

  ALL_GRAPH_NODES = {};
  ALL_GRAPH_EDGES = [];

  /* Center node */
  var centerNode = {
    name: disease.info.name,
    code: disease.info.code,
    nodeType: 'disease',
    type: 'Disease',
    category: 0,
    level: 0,
    symbolSize: 64,
    itemStyle: {
      color: DISEASE_COLOR,
      shadowBlur: 24,
      shadowColor: 'rgba(79,140,255,0.6)'
    },
    label: { show: true, fontSize: 14, fontWeight: 'bold', color: '#fff' }
  };
  nodes.push(centerNode);
  ALL_GRAPH_NODES[disease.info.name] = centerNode;

  /* Level 1: Dimension entities */
  DIM_KEYS.forEach(function(k, idx) {
    if (!DIM_FILTERS[k]) return;
    var items = disease.dimensions[k] || [];
    var color = DIM_COLORS[k] || '#888';
    items.forEach(function(e) {
      var n = {
        name: e.name,
        code: e.code || '',
        nodeType: 'entity',
        type: k,
        category: idx + 1,
        dimKey: k,
        level: 1,
        symbolSize: 36,
        itemStyle: { color: color },
        label: { show: true, fontSize: 10, color: '#e8eaf0' }
      };
      nodes.push(n);
      ALL_GRAPH_NODES[e.name] = n;
      var lk = {
        source: disease.info.name,
        target: e.name,
        value: k,
        lineStyle: { color: color, width: 2, type: 'dashed', opacity: 0.6 }
      };
      links.push(lk);
      ALL_GRAPH_EDGES.push({ a: disease.info.name, b: e.name });
    });
  });

  /* Level 2+: Entity-associated other diseases via shared entities */
  if (MAX_LEVEL >= 2) {
    var seenL2 = {};
    Object.keys(KG_DATA.diseases).forEach(function(dc) {
      if (dc === CURRENT_DISEASE_CODE) return;
      var dd = KG_DATA.diseases[dc];
      DIM_KEYS.forEach(function(k) {
        if (!DIM_FILTERS[k]) return;
        (dd.dimensions[k] || []).forEach(function(e) {
          if (ALL_GRAPH_NODES[e.name] && !seenL2[e.name]) {
            seenL2[e.name] = true;
            /* This entity already exists at level 1, add a link from the other disease */
            var otherDiseaseNode = {
              name: dd.info.name,
              code: dd.info.code,
              nodeType: 'disease-other',
              type: 'Disease',
              category: 0,
              level: 2,
              symbolSize: 22,
              itemStyle: { color: '#4f8cff', opacity: 0.5 },
              label: { show: true, fontSize: 9, color: '#8b90a0' }
            };
            if (!ALL_GRAPH_NODES[dd.info.name]) {
              nodes.push(otherDiseaseNode);
              ALL_GRAPH_NODES[dd.info.name] = otherDiseaseNode;
            }
            links.push({
              source: dd.info.name,
              target: e.name,
              value: k,
              lineStyle: { color: DIM_COLORS[k] || '#888', width: 1, opacity: 0.35 }
            });
            ALL_GRAPH_EDGES.push({ a: dd.info.name, b: e.name });
          }
        });
      });
    });

    /* Also find shared entities between center disease and other diseases */
    if (MAX_LEVEL >= 2) {
      var centerEntities = {};
      DIM_KEYS.forEach(function(k) {
        (disease.dimensions[k] || []).forEach(function(e) {
          centerEntities[e.name] = k;
        });
      });
      Object.keys(KG_DATA.diseases).forEach(function(dc) {
        if (dc === CURRENT_DISEASE_CODE) return;
        var dd = KG_DATA.diseases[dc];
        DIM_KEYS.forEach(function(k) {
          (dd.dimensions[k] || []).forEach(function(e) {
            if (centerEntities[e.name]) {
              /* This entity connects to both center disease and other disease */
              if (!ALL_GRAPH_NODES[dd.info.name]) {
                var nd = {
                  name: dd.info.name,
                  code: dd.info.code,
                  nodeType: 'disease-other',
                  type: 'Disease',
                  category: 0,
                  level: 2,
                  symbolSize: 22,
                  itemStyle: { color: '#4f8cff', opacity: 0.5 },
                  label: { show: true, fontSize: 9, color: '#8b90a0' }
                };
                nodes.push(nd);
                ALL_GRAPH_NODES[dd.info.name] = nd;
              }
              /* Add link if not already present */
              var exists = links.some(function(l) {
                return (l.source === dd.info.name && l.target === e.name) ||
                       (l.source === e.name && l.target === dd.info.name);
              });
              if (!exists) {
                links.push({
                  source: dd.info.name,
                  target: e.name,
                  value: k,
                  lineStyle: { color: DIM_COLORS[k] || '#888', width: 1, opacity: 0.35 }
                });
                ALL_GRAPH_EDGES.push({ a: dd.info.name, b: e.name });
              }
            }
          });
        });
      });
    }
  }

  /* Level 3: Entities of other diseases that share same entity */
  if (MAX_LEVEL >= 3) {
    var level2Diseases = {};
    nodes.forEach(function(n) {
      if (n.level === 2 && n.nodeType === 'disease-other') {
        level2Diseases[n.name] = true;
      }
    });
    Object.keys(level2Diseases).forEach(function(dName) {
      var dc = findDiseaseCodeByName(dName);
      if (!dc) return;
      var dd = KG_DATA.diseases[dc];
      DIM_KEYS.forEach(function(k) {
        if (!DIM_FILTERS[k]) return;
        (dd.dimensions[k] || []).slice(0, 6).forEach(function(e) {
          if (!ALL_GRAPH_NODES[e.name]) {
            var n = {
              name: e.name,
              code: e.code || '',
              nodeType: 'entity-l3',
              type: k,
              category: DIM_KEYS.indexOf(k) + 1,
              dimKey: k,
              level: 3,
              symbolSize: 14,
              itemStyle: { color: DIM_COLORS[k] || '#888', opacity: 0.4 },
              label: { show: false }
            };
            nodes.push(n);
            ALL_GRAPH_NODES[e.name] = n;
            links.push({
              source: dName,
              target: e.name,
              value: k,
              lineStyle: { color: DIM_COLORS[k] || '#888', width: 0.8, opacity: 0.25 }
            });
            ALL_GRAPH_EDGES.push({ a: dName, b: e.name });
          }
        });
      });
    });
  }

  return { nodes: nodes, links: links };
}

function findDiseaseCodeByName(name) {
  var result = null;
  Object.keys(KG_DATA.diseases).forEach(function(code) {
    if (KG_DATA.diseases[code].info.name === name) result = code;
  });
  return result;
}

/* ================================================================
   Render Graph
   ================================================================ */
function renderGraph() {
  var container = document.getElementById('nw-graph');
  if (!container) return;
  if (GRAPH_CHART) { GRAPH_CHART.dispose(); }

  GRAPH_CHART = echarts.init(container, null, { renderer: 'canvas' });
  var gd = buildGraphData();

  /* Apply search filter */
  if (SEARCH_RESULTS !== null) {
    gd.nodes.forEach(function(n) {
      if (n.nodeType !== 'disease' && n.nodeType !== 'disease-other') {
        if (SEARCH_RESULTS.indexOf(n.name) === -1 && n.name !== KG_DATA.diseases[CURRENT_DISEASE_CODE].info.name) {
          n.itemStyle = n.itemStyle || {};
          n.itemStyle.opacity = 0.1;
          n.label = n.label || {};
          n.label.show = false;
        }
      }
    });
  }

  GRAPH_CHART.setOption({
    tooltip: {
      trigger: 'item',
      backgroundColor: '#1a1d27',
      borderColor: '#2e3348',
      textStyle: { color: '#e8eaf0', fontSize: 12 },
      formatter: function(p) {
        if (p.dataType === 'edge') {
          return p.data.source + ' → ' + p.data.target;
        }
        var info = ALL_GRAPH_NODES[p.name];
        var t = (info && DIM_LABELS[info.type]) ? DIM_LABELS[info.type] : (info ? info.type : '');
        return '<b>' + p.name + '</b>' + (t ? '<br><span style="color:#8b90a0">' + t + '</span>' : '');
      }
    },
    animationDuration: 600,
    animationEasingUpdate: 'quinticInOut',
    series: [{
      type: 'graph',
      layout: 'force',
      data: gd.nodes,
      links: gd.links,
      roam: true,
      draggable: true,
      label: {
        show: true,
        position: 'right',
        fontSize: 10,
        color: '#e8eaf0'
      },
      lineStyle: {
        curveness: 0.12,
        opacity: 0.6
      },
      emphasis: {
        focus: 'adjacency',
        lineStyle: { width: 4 }
      },
      force: {
        repulsion: 180,
        gravity: 0.05,
        edgeLength: [60, 200],
        friction: 0.6,
        layoutAnimation: true
      }
    }]
  });

  /* Events */
  GRAPH_CHART.off('click');
  GRAPH_CHART.off('dblclick');
  GRAPH_CHART.off('mouseover');

  GRAPH_CHART.on('click', function(params) {
    if (params.dataType !== 'node') return;
    var nd = ALL_GRAPH_NODES[params.name];
    if (!nd) return;

    if (PATH_MODE) {
      onPathNodeClick(params.name, nd);
      return;
    }

    /* Single click: toggle expand or show detail */
    showNodeDetail(params.name, nd);

    /* Track exploration path */
    addPathNode(params.name);
  });

  GRAPH_CHART.on('dblclick', function(params) {
    if (params.dataType !== 'node') return;
    var nd = ALL_GRAPH_NODES[params.name];
    if (!nd) return;
    /* Double click: set as new center if it's a disease node */
    if (nd.nodeType === 'disease' || nd.nodeType === 'disease-other') {
      var dc = findDiseaseCodeByName(params.name);
      if (dc) {
        document.getElementById('nw-disease-select').value = dc;
        setCenter(dc);
      }
    } else {
      /* Entity: expand its associated diseases */
      toggleEntityExpand(params.name, nd);
    }
  });

  GRAPH_CHART.on('mouseover', function(params) {
    if (params.dataType !== 'node') return;
    var nd = ALL_GRAPH_NODES[params.name];
    if (nd) showNodeDetail(params.name, nd);
  });

  /* Right-click to deselect */
  container.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    GRAPH_CHART.dispatchAction({ type: 'downplay' });
    showEmptyDetail();
  });

  /* Resize */
  window.addEventListener('resize', function() {
    if (GRAPH_CHART) GRAPH_CHART.resize();
  });
}

/* ================================================================
   Reset Graph
   ================================================================ */
function resetGraph() {
  if (GRAPH_CHART) {
    GRAPH_CHART.dispatchAction({ type: 'restore' });
  }
}

/* ================================================================
   Entity Search
   ================================================================ */
function onEntitySearch() {
  var q = (document.getElementById('nw-entity-search').value || '').toLowerCase().trim();
  if (!q) {
    SEARCH_RESULTS = null;
    renderGraph();
    return;
  }
  SEARCH_RESULTS = [];
  Object.keys(ALL_GRAPH_NODES).forEach(function(name) {
    if (name.toLowerCase().indexOf(q) !== -1) {
      SEARCH_RESULTS.push(name);
    }
  });
  renderGraph();
}

/* ================================================================
   Detail Panel
   ================================================================ */
function showEmptyDetail() {
  document.getElementById('nw-detail-empty').style.display = 'block';
  document.getElementById('nw-detail-content').style.display = 'none';
}

function showNodeDetail(name, nd) {
  document.getElementById('nw-detail-empty').style.display = 'none';
  var el = document.getElementById('nw-detail-content');
  el.style.display = 'block';

  if (nd.nodeType === 'disease' || nd.nodeType === 'disease-other') {
    showDiseaseDetail(name, nd);
  } else {
    showEntityDetailPanel(name, nd);
  }
}

function showDiseaseDetail(name, nd) {
  var dc = findDiseaseCodeByName(name);
  if (!dc) { showEmptyDetail(); return; }
  var d = KG_DATA.diseases[dc];
  var info = d.info;
  var cov = getCoverage(dc);
  var h = '';
  h += '<div class="nw-detail-name">' + info.name + '</div>';
  h += '<div class="nw-detail-code">' + info.code + (info.name_en ? ' / ' + info.name_en : '') + '</div>';
  h += '<span class="nw-dim-tag" style="background:' + DISEASE_COLOR + '">疾病 Disease</span>';
  h += '<div class="nw-detail-rows">';
  h += detailRow('关联疾病', (d.relations_summary ? d.relations_summary.length : 0) + ' 条');
  h += detailRow('完整率', Math.round(cov) + '%');
  h += detailRow('证据数', (d.evidence_count || 0) + ' 条');
  h += '</div>';

  /* Dimension tag bars */
  h += '<div class="nw-detail-section"><h4>实体分布</h4>';
  h += '<div class="nw-dim-bar-list">';
  DIM_KEYS.forEach(function(k) {
    var items = d.dimensions[k] || [];
    if (items.length === 0) return;
    h += '<div class="nw-dim-bar">';
    h += '<span class="bar-label">' + DIM_LABELS[k] + '</span>';
    h += '<span class="bar-dots">';
    var showCount = Math.min(items.length, 12);
    for (var i = 0; i < showCount; i++) {
      h += '<span class="bar-dot" style="background:' + (DIM_COLORS[k] || '#888') + '"></span>';
    }
    h += '</span>';
    h += '<span class="bar-count">[' + items.length + ']</span>';
    h += '</div>';
  });
  h += '</div></div>';

  /* Related diseases list */
  if (d.relations_summary && d.relations_summary.length > 0) {
    var diseaseNames = {};
    Object.keys(KG_DATA.diseases).forEach(function(c2) {
      diseaseNames[KG_DATA.diseases[c2].info.name] = c2;
    });
    var relatedDiseases = [];
    d.relations_summary.forEach(function(r) {
      if (diseaseNames[r.name] && r.name !== info.name) {
        relatedDiseases.push(r.name);
      }
    });
    if (relatedDiseases.length > 0) {
      h += '<div class="nw-detail-section"><h4>关联疾病</h4>';
      h += '<div class="nw-related-list">';
      var showCount2 = Math.min(relatedDiseases.length, 10);
      for (var i = 0; i < showCount2; i++) {
        h += '<div class="nw-related-item" onclick="jumpToDisease(\'' + diseaseNames[relatedDiseases[i]] + '\')">';
        h += '<span class="ri-dot" style="background:' + DISEASE_COLOR + '"></span>';
        h += '<span>' + relatedDiseases[i] + '</span>';
        h += '</div>';
      }
      if (relatedDiseases.length > 10) {
        h += '<div class="nw-related-more">+' + (relatedDiseases.length - 10) + ' more</div>';
      }
      h += '</div></div>';
    }
  }

  h += '<button class="nw-expand-btn" onclick="jumpToDisease(\'' + dc + '\')">以该疾病为中心展开图谱</button>';
  document.getElementById('nw-detail-content').innerHTML = h;
}

function showEntityDetailPanel(name, nd) {
  var h = '';
  h += '<div class="nw-detail-name">' + name + '</div>';
  h += '<div class="nw-detail-code">' + (nd.code || '-') + '</div>';

  var color = DIM_COLORS[nd.type] || '#888';
  var dimLabel = DIM_LABELS[nd.type] || nd.type;
  h += '<span class="nw-dim-tag" style="background:' + color + '">' + dimLabel + ' ' + nd.type + '</span>';

  /* Count associated diseases */
  var assocDiseases = findAssociatedDiseases(name);
  h += '<div class="nw-detail-rows">';
  h += detailRow('关联疾病', assocDiseases.length + ' 种');
  h += detailRow('所属维度', dimLabel);
  h += '</div>';

  /* Associated disease dimension breakdown */
  if (assocDiseases.length > 0) {
    h += '<div class="nw-detail-section"><h4>关联实体标签</h4>';
    h += '<div class="nw-dim-bar-list">';
    DIM_KEYS.forEach(function(k) {
      var count = 0;
      assocDiseases.forEach(function(dc) {
        var items = KG_DATA.diseases[dc].dimensions[k] || [];
        items.forEach(function(e) { if (e.name === name) count++; });
      });
      /* Also count how many dimensions the shared diseases have */
      var dimCount = 0;
      assocDiseases.forEach(function(dc) {
        var items = KG_DATA.diseases[dc].dimensions[k] || [];
        if (items.length > 0) dimCount++;
      });
      if (dimCount > 0) {
        h += '<div class="nw-dim-bar">';
        h += '<span class="bar-label">' + DIM_LABELS[k] + '</span>';
        h += '<span class="bar-dots">';
        var sc = Math.min(dimCount, 12);
        for (var i = 0; i < sc; i++) {
          h += '<span class="bar-dot" style="background:' + (DIM_COLORS[k] || '#888') + '"></span>';
        }
        h += '</span>';
        h += '<span class="bar-count">[' + dimCount + ']</span>';
        h += '</div>';
      }
    });
    h += '</div></div>';

    /* Associated diseases list */
    h += '<div class="nw-detail-section"><h4>关联疾病列表</h4>';
    h += '<div class="nw-related-list">';
    var showCount3 = Math.min(assocDiseases.length, 8);
    for (var i = 0; i < showCount3; i++) {
      var dc = assocDiseases[i];
      var dd = KG_DATA.diseases[dc];
      h += '<div class="nw-related-item" onclick="jumpToDisease(\'' + dc + '\')">';
      h += '<span class="ri-dot" style="background:' + DISEASE_COLOR + '"></span>';
      h += '<span>' + dd.info.name + '</span>';
      h += '</div>';
    }
    if (assocDiseases.length > 8) {
      h += '<div class="nw-related-more">+' + (assocDiseases.length - 8) + ' more</div>';
    }
    h += '</div></div>';

    /* Cross-dimension associations */
    h += '<div class="nw-detail-section"><h4>跨维度关联</h4>';
    h += '<div class="nw-cross-dim">';
    DIM_KEYS.forEach(function(k) {
      var related = [];
      assocDiseases.forEach(function(dc) {
        (KG_DATA.diseases[dc].dimensions[k] || []).forEach(function(e) {
          if (e.name !== name && related.indexOf(e.name) === -1) {
            related.push(e.name);
          }
        });
      });
      if (related.length > 0) {
        h += '<div class="nw-cross-row"><b>' + DIM_LABELS[k] + ':</b> ' +
             related.slice(0, 4).join('、') +
             (related.length > 4 ? '等' + related.length + '种' : '') + '</div>';
      }
    });
    h += '</div></div>';
  }

  h += '<button class="nw-expand-btn" onclick="expandFromEntity(\'' + name + '\')">以该实体为中心展开图谱</button>';
  document.getElementById('nw-detail-content').innerHTML = h;
}

function detailRow(label, value) {
  return '<div class="nw-detail-row"><div class="dr-label">' + label + '</div><div class="dr-value">' + value + '</div></div>';
}

function findAssociatedDiseases(entityName) {
  var result = [];
  Object.keys(KG_DATA.diseases).forEach(function(dc) {
    var d = KG_DATA.diseases[dc];
    DIM_KEYS.forEach(function(k) {
      (d.dimensions[k] || []).forEach(function(e) {
        if (e.name === entityName && result.indexOf(dc) === -1) {
          result.push(dc);
        }
      });
    });
  });
  return result;
}

function jumpToDisease(dc) {
  document.getElementById('nw-disease-select').value = dc;
  setCenter(dc);
}

function expandFromEntity(entityName) {
  /* Find the most common disease for this entity and set it as center */
  var diseases = findAssociatedDiseases(entityName);
  if (diseases.length > 0) {
    jumpToDisease(diseases[0]);
  }
}

/* ================================================================
   Entity Expand (Double-click on entity node)
   ================================================================ */
function toggleEntityExpand(entityName, nd) {
  if (NODE_EXPANDED[entityName]) {
    NODE_EXPANDED[entityName] = false;
    /* Re-render to remove expanded nodes */
    renderGraph();
    return;
  }
  NODE_EXPANDED[entityName] = true;
  /* Find all diseases that have this entity and add them as neighbors */
  var assocDiseases = findAssociatedDiseases(entityName);
  var newNodes = [];
  var newLinks = [];
  assocDiseases.forEach(function(dc) {
    if (dc === CURRENT_DISEASE_CODE) return;
    var dd = KG_DATA.diseases[dc];
    if (!ALL_GRAPH_NODES[dd.info.name]) {
      var n = {
        name: dd.info.name,
        code: dd.info.code,
        nodeType: 'disease-other',
        type: 'Disease',
        category: 0,
        level: 2,
        symbolSize: 22,
        itemStyle: { color: '#4f8cff', opacity: 0.5 },
        label: { show: true, fontSize: 9, color: '#8b90a0' }
      };
      newNodes.push(n);
      ALL_GRAPH_NODES[dd.info.name] = n;
    }
    newLinks.push({
      source: dd.info.name,
      target: entityName,
      value: nd.dimKey || '',
      lineStyle: { color: DIM_COLORS[nd.type] || '#888', width: 1, opacity: 0.35 }
    });
  });

  if (newNodes.length > 0 || newLinks.length > 0) {
    /* Add to existing chart */
    GRAPH_CHART.setOption({
      series: [{
        data: GRAPH_CHART.getOption().series[0].data.concat(newNodes),
        links: GRAPH_CHART.getOption().series[0].links.concat(newLinks)
      }]
    });
  }
}

/* ================================================================
   Exploration Path
   ================================================================ */
function addPathNode(name) {
  if (EXPLORE_PATH.length > 0 && EXPLORE_PATH[EXPLORE_PATH.length - 1] === name) return;
  if (EXPLORE_PATH.length > 50) EXPLORE_PATH.shift();
  EXPLORE_PATH.push(name);
  updatePathList();
}

function updatePathList() {
  var el = document.getElementById('nw-path-list');
  if (EXPLORE_PATH.length === 0) {
    el.innerHTML = '<div style="color:var(--muted);font-size:11px;">点击节点开始探索</div>';
    return;
  }
  var html = '';
  EXPLORE_PATH.forEach(function(name, idx) {
    var nd = ALL_GRAPH_NODES[name];
    var color = nd ? (DIM_COLORS[nd.type] || DISEASE_COLOR) : DISEASE_COLOR;
    html += '<div class="nw-path-node" style="padding-left:' + (16 + idx * 4) + 'px">';
    html += '<span style="color:' + color + '">' + name + '</span>';
    html += '</div>';
  });
  html += '<button class="nw-path-clear" onclick="clearPath()">清空路径</button>';
  el.innerHTML = html;
}

function clearPath() {
  EXPLORE_PATH = [];
  updatePathList();
}

/* ================================================================
   Path Mode (BFS)
   ================================================================ */
function togglePathMode() {
  PATH_MODE = !PATH_MODE;
  var btn = document.getElementById('btn-path-mode');
  btn.classList.toggle('active', PATH_MODE);
  PATH_SELECT_COUNT = 0;
  PATH_START = null;

  var overlay = document.getElementById('nw-path-overlay');
  if (PATH_MODE) {
    overlay.className = 'nw-path-overlay show';
    overlay.innerHTML = '路径模式已激活，请点击第一个疾病节点作为起点';
    /* Restore normal graph appearance */
    renderGraph();
  } else {
    overlay.className = 'nw-path-overlay';
    renderGraph();
  }
}

function onPathNodeClick(name, nd) {
  if (nd.nodeType !== 'disease' && nd.nodeType !== 'disease-other') {
    var overlay = document.getElementById('nw-path-overlay');
    overlay.innerHTML = '请选择疾病节点（蓝色大节点）';
    return;
  }

  PATH_SELECT_COUNT++;
  if (PATH_SELECT_COUNT === 1) {
    PATH_START = name;
    var overlay = document.getElementById('nw-path-overlay');
    overlay.innerHTML = '起点: <b>' + name + '</b> — 请点击第二个疾病节点作为终点';
    /* Highlight start node */
    highlightNodes([name], []);
  } else if (PATH_SELECT_COUNT === 2) {
    var PATH_END = name;
    /* BFS shortest path */
    var path = findShortestPath(PATH_START, PATH_END);
    var overlay = document.getElementById('nw-path-overlay');
    if (path) {
      overlay.innerHTML = '路径 (' + path.length + ' 步): <b>' + path.join(' → ') + '</b>';
      highlightPath(path);
    } else {
      overlay.innerHTML = '未找到 <b>' + PATH_START + '</b> 到 <b>' + PATH_END + '</b> 的路径';
    }
    PATH_SELECT_COUNT = 0;
    PATH_START = null;
  }
}

function highlightNodes(nodeNames, edgeIndices) {
  var option = GRAPH_CHART.getOption();
  var nodes = option.series[0].data;
  var nodeMap = {};
  nodes.forEach(function(n, i) {
    nodeMap[n.name] = i;
    n.itemStyle = n.itemStyle || {};
    n.originalOpacity = n.originalOpacity !== undefined ? n.originalOpacity : (n.itemStyle.opacity || 1);
  });

  nodes.forEach(function(n, i) {
    if (nodeNames.indexOf(n.name) !== -1) {
      n.itemStyle.opacity = 1;
      n.itemStyle.borderColor = '#ffd43b';
      n.itemStyle.borderWidth = 3;
    } else {
      n.itemStyle.opacity = 0.15;
      n.itemStyle.borderWidth = 0;
    }
  });

  GRAPH_CHART.setOption({ series: [{ data: nodes }] });
}

function highlightPath(path) {
  var pathSet = {};
  path.forEach(function(n) { pathSet[n] = true; });

  var option = GRAPH_CHART.getOption();
  var nodes = option.series[0].data;
  var links = option.series[0].links;

  nodes.forEach(function(n) {
    n.itemStyle = n.itemStyle || {};
    if (pathSet[n.name]) {
      n.itemStyle.opacity = 1;
      n.itemStyle.borderColor = '#ffd43b';
      n.itemStyle.borderWidth = 3;
    } else {
      n.itemStyle.opacity = 0.12;
      n.itemStyle.borderWidth = 0;
    }
  });

  links.forEach(function(l) {
    l.lineStyle = l.lineStyle || {};
    if (pathSet[l.source] && pathSet[l.target]) {
      l.lineStyle.color = '#ffd43b';
      l.lineStyle.width = 3;
      l.lineStyle.opacity = 1;
    } else {
      l.lineStyle.opacity = 0.08;
    }
  });

  GRAPH_CHART.setOption({ series: [{ data: nodes, links: links }] });
}

/* ================================================================
   BFS Shortest Path
   ================================================================ */
function findShortestPath(startName, endName) {
  if (startName === endName) return [startName];

  /* Build adjacency list from ALL_GRAPH_EDGES */
  var adj = {};
  ALL_GRAPH_EDGES.forEach(function(e) {
    if (!adj[e.a]) adj[e.a] = [];
    if (!adj[e.b]) adj[e.b] = [];
    if (adj[e.a].indexOf(e.b) === -1) adj[e.a].push(e.b);
    if (adj[e.b].indexOf(e.a) === -1) adj[e.b].push(e.a);
  });

  /* BFS */
  var queue = [[startName]];
  var visited = {};
  visited[startName] = true;

  while (queue.length > 0) {
    var path = queue.shift();
    var current = path[path.length - 1];

    if (current === endName) return path;

    var neighbors = adj[current] || [];
    for (var i = 0; i < neighbors.length; i++) {
      var next = neighbors[i];
      if (!visited[next]) {
        visited[next] = true;
        queue.push(path.concat([next]));
        /* Limit BFS depth for performance */
        if (path.length > 8) return null;
      }
    }
  }
  return null;
}

/* ================================================================
   Fullscreen
   ================================================================ */
function enterFullscreen() {
  var el = document.documentElement;
  if (el.requestFullscreen) {
    el.requestFullscreen();
  } else if (el.webkitRequestFullscreen) {
    el.webkitRequestFullscreen();
  } else if (el.msRequestFullscreen) {
    el.msRequestFullscreen();
  }
}

function exitFullscreen() {
  if (document.exitFullscreen) {
    document.exitFullscreen();
  } else if (document.webkitExitFullscreen) {
    document.webkitExitFullscreen();
  } else if (document.msExitFullscreen) {
    document.msExitFullscreen();
  }
}

document.addEventListener('fullscreenchange', onFullscreenChange);
document.addEventListener('webkitfullscreenchange', onFullscreenChange);

function onFullscreenChange() {
  var isFull = !!(document.fullscreenElement || document.webkitFullscreenElement);
  document.body.classList.toggle('nw-fullscreen', isFull);
  document.getElementById('btn-fullscreen').style.display = isFull ? 'none' : '';
  document.getElementById('btn-exit-fullscreen').style.display = isFull ? '' : 'none';
  /* Re-render nav for fullscreen */
  if (isFull) {
    var nav = document.querySelector('.nav');
    if (nav) nav.style.display = 'none';
  } else {
    var nav = document.querySelector('.nav');
    if (nav) nav.style.display = '';
  }
  /* Resize chart */
  setTimeout(function() {
    if (GRAPH_CHART) GRAPH_CHART.resize();
  }, 350);
}
