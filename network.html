<style>

.nw-toolbar {
  display: flex; align-items: center; gap: 14px;
  background: var(--bg2); border-bottom: 1px solid var(--rule);
  padding: 0 20px; height: 48px; position: sticky; top: 0; z-index: 100;
}
.nw-toolbar-title {
  font-size: 15px; font-weight: 700; color: var(--accent); white-space: nowrap;
}
.nw-toolbar-disease { display: flex; align-items: center; gap: 8px; flex: 1; }
.nw-toolbar-disease select {
  background: var(--bg3); border: 1px solid var(--rule); border-radius: 6px;
  padding: 6px 12px; color: var(--ink); font-size: 12px; outline: none;
  max-width: 260px;
}
.nw-toolbar-disease select:focus { border-color: var(--accent); }
.nw-toolbar-center {
  font-size: 12px; color: var(--muted); white-space: nowrap;
}
.nw-toolbar-center b { color: var(--accent); }
.nw-toolbar-actions { display: flex; gap: 8px; }
.nw-toolbar-actions button {
  padding: 5px 12px; border: 1px solid var(--rule); border-radius: 6px;
  background: var(--bg3); color: var(--muted); font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.nw-toolbar-actions button:hover { border-color: var(--accent); color: var(--accent); }
.nw-toolbar-actions button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ==================== Main Layout ==================== */
.nw-layout {
  display: grid; grid-template-columns: 280px 1fr 340px;
  height: calc(100vh - 96px - 28px); overflow: hidden;
}
@media (max-width: 1100px) {
  .nw-layout { grid-template-columns: 240px 1fr 280px; }
}
@media (max-width: 900px) {
  .nw-layout { grid-template-columns: 1fr; grid-template-rows: 1fr; }
  .nw-left, .nw-right { display: none; }
  .nw-graph-wrap { min-height: 500px; }

}

/* ==================== Left Panel ==================== */
.nw-left {

}

}

/* Search */

.nw-search input {

}
.nw-search input:focus { border-color: var(--accent); }

/* Center card */
.nw-center-card {
  margin: 10px; padding: 12px; background: var(--bg3); border: 1px solid var(--rule);
  border-radius: 8px;
}
.nw-center-card .dot {
  display: inline-block; width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent); margin-right: 6px; vertical-align: middle;
}
.nw-center-card .c-name {
  font-size: 14px; font-weight: 700; color: var(--ink); vertical-align: middle;
}
.nw-center-card .c-code {
  font-size: 10px; color: var(--muted); margin-top: 4px;

}
.nw-center-card .c-type { font-size: 11px; color: var(--muted); margin-top: 2px; }
.nw-center-card .c-hint {

}

/* Section */
.nw-section { padding: 10px; border-bottom: 1px solid var(--rule); }
.nw-section-title {
  font-size: 11px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px;
}

/* Dimension checkboxes */
.nw-dim-list { display: flex; flex-direction: column; gap: 3px; }
.nw-dim-item {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 6px; border-radius: 4px; cursor: pointer;
  font-size: 12px; color: var(--ink);
  transition: background .1s;
}
.nw-dim-item:hover { background: var(--bg3); }
.nw-dim-item input[type="checkbox"] {
  accent-color: var(--accent); cursor: pointer;
}
.nw-dim-item .dim-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.nw-dim-item .dim-label { flex: 1; }
.nw-dim-item .dim-count {
  font-size: 10px; color: var(--muted); background: var(--bg);
  padding: 1px 6px; border-radius: 999px; min-width: 20px; text-align: center;
}

/* Legend */

/* Path */
.nw-path-list { font-size: 12px; }
.nw-path-node {
  color: var(--ink); padding: 3px 0; position: relative;
  padding-left: 16px;
}
.nw-path-node::before {
  content: ''; position: absolute; left: 4px; top: 0; bottom: 0;
  width: 1px; background: var(--rule);
}
.nw-path-node::after {
  content: '→'; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  font-size: 10px; color: var(--muted);
}
.nw-path-node:last-child::before { display: none; }
.nw-path-clear {
  margin-top: 6px; font-size: 10px; color: var(--accent); cursor: pointer;
  background: none; border: none; padding: 0;
}
.nw-path-clear:hover { text-decoration: underline; }

/* Expansion level */
.nw-level-radio { display: flex; gap: 12px; font-size: 12px; }
.nw-level-radio label {
  display: flex; align-items: center; gap: 4px; color: var(--muted);
  cursor: pointer;
}
.nw-level-radio input[type="radio"] { accent-color: var(--accent); cursor: pointer; }

/* ==================== Center Graph ==================== */
.nw-graph-wrap {
  position: relative; overflow: hidden; background: var(--bg);
}
#nw-graph { width: 100%; height: 100%; }

/* ==================== Right Panel ==================== */
.nw-right {
  background: var(--bg2); border-left: 1px solid var(--rule);
  overflow-y: auto; overflow-x: hidden;
  transition: width .3s ease;
}
.nw-right::-webkit-scrollbar { width: 4px; }
.nw-right::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

.nw-detail-header {
  padding: 14px 16px; border-bottom: 1px solid var(--rule);
}
.nw-detail-header h3 {
  font-size: 13px; font-weight: 800; color: var(--ink);
}

  height: 100%; min-height: 300px; text-align: center;
  color: var(--muted); font-size: 13px; line-height: 1.8; padding: 20px;
}
.nw-detail-body { padding: 14px 16px; }

.nw-detail-name {
  font-size: 20px; font-weight: 800; color: var(--ink); margin-bottom: 4px;
}
.nw-detail-code {
  font-size: 10px; color: var(--muted);
  font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace; margin-bottom: 10px;
}
.nw-dim-tag {
  display: inline-block; font-size: 11px; font-weight: 700;
  padding: 4px 10px; border-radius: 6px; color: #fff; margin-bottom: 12px;
}
.nw-detail-rows { margin-bottom: 14px; }
.nw-detail-row {
  display: grid; grid-template-columns: 80px 1fr; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid var(--rule);
  font-size: 12px;
}
.nw-detail-row:last-child { border-bottom: none; }
.nw-detail-row .dr-label { color: var(--muted); font-weight: 700; font-size: 10px; }
.nw-detail-row .dr-value { color: var(--ink); }

.nw-detail-section {
  border-top: 1px solid var(--rule); padding-top: 12px; margin-top: 12px;
}
.nw-detail-section h4 {
  font-size: 12px; font-weight: 800; color: var(--ink); margin-bottom: 8px;
}

.nw-dim-bar-list { display: flex; flex-direction: column; gap: 4px; }
.nw-dim-bar {
  display: flex; align-items: center; gap: 6px; font-size: 11px;
}
.nw-dim-bar .bar-label { width: 56px; color: var(--muted); text-align: right; flex-shrink: 0; }
.nw-dim-bar .bar-dots { flex: 1; display: flex; gap: 2px; flex-wrap: wrap; }
.nw-dim-bar .bar-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: .7;
}
.nw-dim-bar .bar-count { font-size: 10px; color: var(--muted); width: 24px; }

.nw-related-list { display: flex; flex-direction: column; gap: 2px; }
.nw-related-item {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 0; font-size: 12px; color: var(--ink);
  border-bottom: 1px solid var(--rule); cursor: pointer;
}
.nw-related-item:last-child { border-bottom: none; }

  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}

  font-size: 11px; color: var(--muted); padding: 4px 0; cursor: pointer;
}
.nw-related-more:hover { color: var(--accent); }

.nw-cross-dim { display: flex; flex-direction: column; gap: 4px; font-size: 12px; }
.nw-cross-row { color: var(--ink); }

.nw-expand-btn {
  display: block; width: 100%; margin-top: 14px; padding: 10px;
  background: var(--bg3); border: 1px solid var(--rule); border-radius: 8px;
  color: var(--accent); font-size: 12px; font-weight: 700;
  cursor: pointer; text-align: center; transition: all .15s;
}
.nw-expand-btn:hover { border-color: var(--accent); background: rgba(79,140,255,.08); }

/* ==================== Fullscreen Mode ==================== */
body.nw-fullscreen .nw-toolbar { position: fixed; top: 0; left: 0; right: 0; z-index: 200; }
body.nw-fullscreen .nw-layout { height: 100vh; padding-top: 48px; }

  width: 48px; min-width: 48px; overflow: hidden;
  transition: width .3s ease;
}

  width: 280px; min-width: 280px; overflow: visible;
  box-shadow: 4px 0 20px rgba(0,0,0,.4);

body.nw-fullscreen .nw-left .nw-section,
body.nw-fullscreen .nw-left .nw-search,

  display: flex; align-items: center; justify-content: center;

/* 非全屏模式下隐藏折叠条图标 */
.nw-right-icon { display: none; }
.nw-left-icon { display: none; }

/* ==================== Path mode highlight ==================== */
.nw-path-overlay {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);

  padding: 10px 18px; font-size: 12px; color: var(--ink);
  box-shadow: 0 4px 20px rgba(0,0,0,.5); z-index: 10;
  display: none; max-width: 85vw; text-align: center;
  line-height: 1.8;
}
.nw-path-overlay.show { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center; }

.nw-path-overlay .po-num {
  width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; flex-shrink: 0;
}
.nw-path-overlay .po-num.pending { background: var(--rule); color: var(--muted); }
.nw-path-overlay .po-num.active { background: var(--accent); color: #fff; }
.nw-path-overlay .po-num.done { background: #51cf66; color: #fff; }
.nw-path-overlay .po-label { font-size: 12px; color: var(--muted); }
.nw-path-overlay .po-name { font-weight: 800; color: var(--accent); font-size: 13px; }
.nw-path-overlay .po-arrow { color: #ff922b; font-size: 12px; font-weight: 700; padding: 0 2px; }
.nw-path-overlay .po-result { font-size: 13px; color: var(--ink); font-weight: 600; width: 100%; line-height: 2; }

/* ==================== First-screen guidance ==================== */
.nw-graph-guide {
  position: absolute; top: 12px; left: 12px; z-index: 9;
  width: 30px; min-width: 30px;
  background: linear-gradient(135deg, rgba(26,29,39,.94), rgba(17,20,30,.88));
  border: 1px solid rgba(79,140,255,.45); border-radius: 12px;

}
.nw-graph-guide:hover { border-color: var(--accent); }

  pointer-events: auto; cursor: default;
}
.nw-graph-guide .guide-toggle {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 36px; font-size: 16px; color: var(--accent);
}
.nw-graph-guide .guide-body { display: none; }
.nw-graph-guide.expanded .guide-toggle { display: none; }
.nw-graph-guide.expanded .guide-body { display: block; }
.nw-graph-guide .guide-title { font-size: 14px; font-weight: 900; color: var(--ink); margin-bottom: 8px; }
.nw-graph-guide .guide-text { font-size: 12px; line-height: 1.7; color: var(--muted); }

.nw-guide-btn {

  background: var(--bg3); border: 1px solid var(--rule); border-radius: 9px;
  padding: 10px;
}
.nw-overview-card .num { font-size: 20px; font-weight: 900; color: var(--accent); }

  border: 1px solid var(--rule); border-radius: 8px; background: var(--bg3);

}
.nw-path-hint b { color: var(--ink); }
.nw-path-hint .path-line { color: var(--accent); margin-top: 5px; font-weight: 800; }

.nw-datasource {

<div class="nav"></div>

<!-- Top Toolbar -->
<div class="nw-toolbar" id="nw-toolbar">
  <div class="nw-toolbar-title">🕸️ 网络探索</div>
  <div class="nw-toolbar-disease">
    <select id="nw-disease-select" onchange="onDiseaseSelect()">
      <option value="">请选择疾病</option>
    </select>
    <div class="nw-toolbar-center">当前中心: <b id="nw-center-name">-</b></div>
  </div>
  <div class="nw-toolbar-actions">
    <button onclick="resetGraph()" title="重置视图">重置</button>
    <button id="btn-path-mode" onclick="togglePathMode()" title="路径模式: 点击两个实体节点，查找它们之间的关联路径">🔗 路径</button>
    <button onclick="enterFullscreen()" id="btn-fullscreen">全屏</button>
    <button onclick="exitFullscreen()" id="btn-exit-fullscreen" style="display:none">退出全屏</button>
  </div>
</div>

<!-- Main Layout -->
<div class="nw-layout">
  <!-- Left Panel -->
  <aside class="nw-left">
    <div class="nw-search">
      <input id="nw-entity-search" placeholder="搜索实体名称..." oninput="onEntitySearch()">
    </div>
    <div class="nw-left-scroll">
      <!-- Center node card -->
      <div class="nw-center-card" id="nw-center-card">
        <div><span class="dot"></span><span class="c-name" id="cc-name">-</span></div>
        <div class="c-code" id="cc-code">-</div>
        <div class="c-type" id="cc-type">-</div>
        <div class="c-hint">点击其他节点可切换中心</div>
      </div>

      <!-- Dimension filters -->
      <div class="nw-section">
        <div class="nw-section-title">维度筛选</div>
        <div class="nw-dim-list" id="nw-dim-filters"></div>
      </div>

      <!-- Exploration path -->
      <div class="nw-section">
        <div class="nw-section-title">探索路径</div>
        <div class="nw-path-list" id="nw-path-list">
          <div style="color:var(--muted);font-size:11px;">点击节点开始探索</div>
        </div>
      </div>

      <!-- Expansion level -->
      <div class="nw-section">
        <div class="nw-section-title">展开层级</div>
        <div class="nw-level-radio" id="nw-level-radio">
          <label><input type="radio" name="nw-level" value="1"> 一级</label>
          <label><input type="radio" name="nw-level" value="2" checked> 二级</label>
          <label><input type="radio" name="nw-level" value="3"> 三级</label>
        </div>
      </div>
    </div>
    <div class="nw-left-icon">🔬<span class="nli-hint">筛选</span></div>
  </aside>

  <!-- Center Graph -->
  <div class="nw-graph-wrap" id="nw-graph-wrap">
    <div id="nw-graph"></div>
    <div class="nw-graph-guide" id="nw-graph-guide" onclick="toggleGuide(event)">
      <div class="guide-toggle" title="展开指引">💡</div>
      <div class="guide-body">
        <div class="guide-title">默认展示：专病关联网络 <span style="float:right;font-size:11px;color:var(--muted);font-weight:400;cursor:pointer" onclick="collapseGuide(event)">收起</span></div>
        <div class="guide-text">
          已为你自动选择<b>高价值示例疾病</b>，展示疾病、症状、检查、检验、药物、手术及相邻疾病之间的关系。<br>
          单击节点看详情，双击疾病切换中心，双击实体继续扩展。
        </div>
        <div class="guide-actions" id="nw-guide-actions"></div>
      </div>
    </div>
    <div class="nw-path-overlay" id="nw-path-overlay"></div>
  </div>

  <!-- Right Panel -->
  <aside class="nw-right">
    <div class="nw-right-icon" id="nw-right-icon">
      <div class="nw-right-summary" id="nw-right-summary">
        <div class="nrs-label">图谱概览</div>
        <div class="nrs-val" id="nrs-nodes">-</div>
        <div class="nrs-label">节点</div>
        <div class="nrs-val" id="nrs-links">-</div>
        <div class="nrs-label">关系</div>
      </div>
    </div>
    <div class="nw-detail-header">
      <h3>实体详情</h3>
    </div>
    <div class="nw-detail-body" id="nw-detail-body">
      <div class="nw-detail-empty" id="nw-detail-empty">
        点击图谱中的节点查看详情<br><br>
        支持操作：<br>
        - 悬浮节点查看摘要<br>
        - 单击节点展开子节点<br>
        - 双击节点切换为中心
      </div>
      <div id="nw-detail-content" style="display:none;"></div>
    </div>
  </aside>
</div>

<!-- Data Source Bar -->
<div class="nw-datasource" id="nw-datasource"></div>

<script src="./_shared/js/echarts.min.js"></script>
<script src="./_shared/js/app.js"></script>
<script>
/* ================================================================
   网络探索 - 知识图谱交互分析
   ================================================================ */

/* ---------- Constants ---------- */
/* DIM_COLORS and DIM_NAMES are now global from app.js */
var DISEASE_COLOR = '#4f8cff';

/* ---------- State ---------- */
var GRAPH_CHART = null;
var CURRENT_DISEASE_CODE = null;
var DIM_FILTERS = {};           // dimKey -> bool
var MAX_LEVEL = 2;
var EXPLORE_PATH = [];
var PATH_MODE = false;
var PATH_SELECT_COUNT = 0;
var PATH_START = null;
var ALL_GRAPH_NODES = {};       // name -> nodeData
var ALL_GRAPH_EDGES = [];       // all edges for BFS
var LAST_GRAPH_DATA = { nodes: [], links: [] };
var NODE_EXPANDED = {};         // entityName -> bool (level 1 expanded)
var SEARCH_RESULTS = null;      // search filtered node names
/* 从数据中动态选取覆盖维度最多的前5个疾病 */
var DEFAULT_DISEASE_NAMES = [];
function buildDefaultDiseases(diseases) {
  var scored = Object.keys(diseases).map(function(code) {
    var d = diseases[code];
    var dimCount = DIM_KEYS.filter(function(k) {
      var items = d.dimensions ? (d.dimensions[k] || []) : [];
      return items.length > 0;
    }).length;
    return { name: d.info.name, code: code, dimCount: dimCount };
  });
  scored.sort(function(a, b) { return b.dimCount - a.dimCount; });
  DEFAULT_DISEASE_NAMES = scored.slice(0, 5).map(function(s) { return s.name; });
}
var DEFAULT_VISIBLE_DIMS = ['Symptom', 'Exam', 'LabTest', 'Medication', 'Procedure', 'RiskFactor', 'Complication', 'DiagnosisCriteria', 'TreatmentPlan'];
var MAX_OTHER_DISEASES = 24;

/* ---------- Init ---------- */
loadData(function(d) {
  renderNav('network');
  populateDiseaseSelect(d);
  initDimFilters();
  bindLevelRadio();
  var defaultCode = chooseDefaultDisease(d);
  if (defaultCode) {
    document.getElementById('nw-disease-select').value = defaultCode;
    loadDiseaseData(defaultCode, function(dd) {
      if (dd) onDiseaseSelect();
    });
  }
  renderDataSourceBar(d);
});

/* ================================================================
   Disease Select
   ================================================================ */
function chooseDefaultDisease(d) {
  buildDefaultDiseases(d.diseases);
  for (var i = 0; i < DEFAULT_DISEASE_NAMES.length; i++) {
    var target = DEFAULT_DISEASE_NAMES[i];
    var found = null;
    Object.keys(d.diseases).forEach(function(code) {
      if (!found && d.diseases[code].info.name === target) found = code;
    });
    if (found) return found;
  }

  var bestCode = null;
  var bestScore = -1;
  Object.keys(d.diseases).forEach(function(code) {
    var item = d.diseases[code];
    var score = 0;
    DIM_KEYS.forEach(function(k) { score += (item.dimensions[k] || []).length; });
    if (score > bestScore) {
      bestScore = score;
      bestCode = code;
    }
  });
  return bestCode;
}

function populateDiseaseSelect(d) {
  var sel = document.getElementById('nw-disease-select');
  var groups = {};
  Object.keys(d.diseases).forEach(function(code) {
    var info = d.diseases[code].info;
    var g = parseParentCode(info.parent).group;
    if (!groups[g]) groups[g] = [];
    groups[g].push({ code: code, name: info.name });
  });
  var html = '<option value="">请选择疾病</option>';
  Object.keys(groups).sort().forEach(function(g) {
    html += '<optgroup label="' + g + '">';
    groups[g].sort(function(a, b) { return a.name.localeCompare(b.name); });
    groups[g].forEach(function(d) {
      html += '<option value="' + d.code + '">' + d.name + '</option>';
    });
    html += '</optgroup>';
  });
  sel.innerHTML = html;
}

function onDiseaseSelect() {
  var code = document.getElementById('nw-disease-select').value;
  if (!code) return;
  // 先确保完整数据已加载
  loadDiseaseData(code, function(d) {
    if (d) setCenter(code);
  });
}

/* ================================================================
   Center Node
   ================================================================ */
function setCenter(code) {
  CURRENT_DISEASE_CODE = code;
  EXPLORE_PATH = [];
  NODE_EXPANDED = {};
  PATH_SELECT_COUNT = 0;
  PATH_START = null;
  PATH_MODE = false;
  SEARCH_RESULTS = null;
  document.getElementById('nw-entity-search').value = '';
  document.getElementById('btn-path-mode').classList.remove('active');
  updateCenterCard(code);
  renderDimFilters();
  updatePathList();
  renderGraph();
}

function updateCenterCard(code) {
  var d = KG_DATA.diseases[code];
  if (!d) return;
  document.getElementById('cc-name').textContent = d.info.name;
  document.getElementById('cc-code').textContent = d.info.code;
  document.getElementById('cc-type').textContent = '疾病';
  document.getElementById('nw-center-name').textContent = d.info.name;
}

/* ================================================================
   Dimension Filters
   ================================================================ */
function initDimFilters() {
  DIM_KEYS.forEach(function(k) { DIM_FILTERS[k] = DEFAULT_VISIBLE_DIMS.indexOf(k) !== -1; });
  renderDimFilters();
}

function renderDimFilters() {
  var html = '';
  DIM_KEYS.forEach(function(k) {
    var count = getDimCount(k);
    var color = DIM_COLORS[k] || '#888';
    html += '<label class="nw-dim-item">';
    html += '<input type="checkbox" ' + (DIM_FILTERS[k] ? 'checked' : '') +
            ' onchange="onDimToggle(\'' + k + '\', this.checked)">';
    html += '<span class="dim-dot" style="background:' + color + '"></span>';
    html += '<span class="dim-label">' + DIM_NAMES[k] + '</span>';
    html += '<span class="dim-count">' + count + '</span>';
    html += '</label>';
  });
  document.getElementById('nw-dim-filters').innerHTML = html;
}

function getDimCount(dimKey) {
  if (!KG_DATA || !CURRENT_DISEASE_CODE) return 0;
  var d = KG_DATA.diseases[CURRENT_DISEASE_CODE];
  if (!d) return 0;
  return (d.dimensions[dimKey] || []).length;
}

function onDimToggle(dimKey, checked) {
  DIM_FILTERS[dimKey] = checked;
  renderGraph();
}

/* ================================================================
   Level Radio
   ================================================================ */
function bindLevelRadio() {
  var radios = document.querySelectorAll('input[name="nw-level"]');
  radios.forEach(function(r) {
    r.addEventListener('change', function() {
      MAX_LEVEL = parseInt(this.value);
      renderGraph();
    });
  });
}

/* ================================================================
   Build Graph Data
   ================================================================ */
function pushUniqueNode(nodes, node) {
  if (!node || !node.name) return;
  if (ALL_GRAPH_NODES[node.name]) {
    var existing = ALL_GRAPH_NODES[node.name];
    if (node.nodeType === 'disease' || node.nodeType === 'disease-other') {
      existing.nodeType = node.nodeType;
      existing.type = node.type;
      existing.category = node.category;
      existing.level = Math.min(existing.level || node.level || 1, node.level || 1);
      existing.symbolSize = Math.max(existing.symbolSize || 0, node.symbolSize || 0);
      existing.itemStyle = node.itemStyle || existing.itemStyle;
      existing.label = node.label || existing.label;
      existing.code = node.code || existing.code;
    }
    return;
  }
  nodes.push(node);
  ALL_GRAPH_NODES[node.name] = node;
}

function pushUniqueLink(links, link) {
  if (!link || !link.source || !link.target || link.source === link.target) return;
  if (!ALL_GRAPH_NODES[link.source] || !ALL_GRAPH_NODES[link.target]) return;
  var keyA = link.source + '→' + link.target + '→' + (link.value || '');
  var keyB = link.target + '→' + link.source + '→' + (link.value || '');
  if (!pushUniqueLink._seen) pushUniqueLink._seen = {};
  if (pushUniqueLink._seen[keyA] || pushUniqueLink._seen[keyB]) return;
  pushUniqueLink._seen[keyA] = true;
  links.push(link);
  ALL_GRAPH_EDGES.push({ a: link.source, b: link.target });
}

function buildGraphData() {
  var nodes = [], links = [];
  var disease = KG_DATA.diseases[CURRENT_DISEASE_CODE];
  if (!disease) return { nodes: [], links: [] };

  ALL_GRAPH_NODES = {};
  ALL_GRAPH_EDGES = [];
  pushUniqueLink._seen = {};

  /* Center node */
  var centerNode = {
    name: disease.info.name,
    code: disease.info.code,
    nodeType: 'disease',
    type: 'Disease',
    category: 0,
    level: 0,
    symbolSize: 64,
    itemStyle: {
      color: DISEASE_COLOR,
      shadowBlur: 24,
      shadowColor: 'rgba(79,140,255,0.6)'
    },
    label: { show: true, fontSize: 14, fontWeight: 'bold', color: '#fff' }
  };
  pushUniqueNode(nodes, centerNode);

  /* Level 1: Dimension entities */
  DIM_KEYS.forEach(function(k, idx) {
    if (!DIM_FILTERS[k]) return;
    var items = disease.dimensions[k] || [];
    var color = DIM_COLORS[k] || '#888';
    items.forEach(function(e) {
      var n = {
        name: e.name,
        code: e.code || '',
        nodeType: 'entity',
        type: k,
        category: idx + 1,
        dimKey: k,
        level: 1,
        symbolSize: 36,
        itemStyle: { color: color },
        label: { show: true, fontSize: 10, color: '#e8eaf0' }
      };
      pushUniqueNode(nodes, n);
      pushUniqueLink(links, {
        source: disease.info.name,
        target: e.name,
        value: k,
        lineStyle: { color: color, width: 2, type: 'dashed', opacity: 0.6 }
      });

      /* 1.5-hop: TreatmentPlan → sub_medication / sub_procedure */
      if (k === 'TreatmentPlan' && (e.sub_medication || e.sub_procedure)) {
        var subColor = '#ff922b';
        (e.sub_medication || []).forEach(function(sm) {
          pushUniqueNode(nodes, {
            name: sm.name, code: sm.code || '', nodeType: 'entity-sub', type: 'Medication',
            category: DIM_KEYS.indexOf('Medication') + 1, dimKey: 'Medication', level: 1.5,
            symbolSize: 26, itemStyle: { color: subColor },
            label: { show: true, fontSize: 9, color: '#e8eaf0' }
          });
          pushUniqueLink(links, {
            source: e.name, target: sm.name, value: 'includes_medication',
            lineStyle: { color: subColor, width: 1.5, type: 'dotted', opacity: 0.7 }
          });
        });
        (e.sub_procedure || []).forEach(function(sp) {
          pushUniqueNode(nodes, {
            name: sp.name, code: sp.code || '', nodeType: 'entity-sub', type: 'Procedure',
            category: DIM_KEYS.indexOf('Procedure') + 1, dimKey: 'Procedure', level: 1.5,
            symbolSize: 26, itemStyle: { color: '#f06595' },
            label: { show: true, fontSize: 9, color: '#e8eaf0' }
          });
          pushUniqueLink(links, {
            source: e.name, target: sp.name, value: 'includes_procedure',
            lineStyle: { color: '#f06595', width: 1.5, type: 'dotted', opacity: 0.7 }
          });
        });
      }

      /* 1.5-hop: Medication类别 → sub_medication (具体药物) */
      if (k === 'Medication' && e.sub_medication) {
        var medSubColor = '#ff922b';
        (e.sub_medication || []).forEach(function(sm) {
          pushUniqueNode(nodes, {
            name: sm.name, code: sm.code || '', nodeType: 'entity-sub', type: 'Medication',
            category: DIM_KEYS.indexOf('Medication') + 1, dimKey: 'Medication', level: 1.5,
            symbolSize: 22, itemStyle: { color: medSubColor, opacity: 0.75 },
            label: { show: true, fontSize: 8, color: '#b0b8c8' }
          });
          pushUniqueLink(links, {
            source: e.name, target: sm.name, value: 'has_specific_medication',
            lineStyle: { color: medSubColor, width: 1, type: 'dotted', opacity: 0.5 }
          });
        });
      }
    });
  });

  /* Level 2+: Entity-associated other diseases via shared entities */
  if (MAX_LEVEL >= 2) {
    var sharedDiseaseScore = {};
    var sharedDiseaseLinks = {};
    Object.keys(KG_DATA.diseases).forEach(function(dc) {
      if (dc === CURRENT_DISEASE_CODE) return;
      var dd = KG_DATA.diseases[dc];
      DIM_KEYS.forEach(function(k) {
        if (!DIM_FILTERS[k]) return;
        (dd.dimensions[k] || []).forEach(function(e) {
          if (ALL_GRAPH_NODES[e.name]) {
            if (!sharedDiseaseScore[dc]) sharedDiseaseScore[dc] = 0;
            if (!sharedDiseaseLinks[dc]) sharedDiseaseLinks[dc] = [];
            sharedDiseaseScore[dc]++;
            sharedDiseaseLinks[dc].push({ entity: e.name, dim: k });
          }
        });
      });
    });

    Object.keys(sharedDiseaseScore)
      .sort(function(a, b) { return sharedDiseaseScore[b] - sharedDiseaseScore[a]; })
      .slice(0, MAX_OTHER_DISEASES)
      .forEach(function(dc) {
        var dd = KG_DATA.diseases[dc];
        var otherDiseaseNode = {
          name: dd.info.name,
          code: dd.info.code,
          nodeType: 'disease-other',
          type: 'Disease',
          category: 0,
          level: 2,
          symbolSize: Math.min(34, 18 + sharedDiseaseScore[dc]),
          itemStyle: { color: '#4f8cff', opacity: 0.62 },
          label: { show: true, fontSize: 9, color: '#8b90a0' }
        };
        pushUniqueNode(nodes, otherDiseaseNode);
        sharedDiseaseLinks[dc].slice(0, 8).forEach(function(x) {
          pushUniqueLink(links, {
            source: dd.info.name,
            target: x.entity,
            value: x.dim,
            lineStyle: { color: DIM_COLORS[x.dim] || '#888', width: 1, opacity: 0.35 }
          });
        });
      });
  }

  /* Level 3: Entities of other diseases that share same entity */
  if (MAX_LEVEL >= 3) {
    var level2Diseases = {};
    nodes.forEach(function(n) {
      if (n.level === 2 && n.nodeType === 'disease-other') {
        level2Diseases[n.name] = true;
      }
    });
    Object.keys(level2Diseases).forEach(function(dName) {
      var dc = findDiseaseCodeByName(dName);
      if (!dc) return;
      var dd = KG_DATA.diseases[dc];
      DIM_KEYS.forEach(function(k) {
        if (!DIM_FILTERS[k]) return;
        (dd.dimensions[k] || []).slice(0, 6).forEach(function(e) {
          if (!ALL_GRAPH_NODES[e.name]) {
            var n = {
              name: e.name,
              code: e.code || '',
              nodeType: 'entity-l3',
              type: k,
              category: DIM_KEYS.indexOf(k) + 1,
              dimKey: k,
              level: 3,
              symbolSize: 14,
              itemStyle: { color: DIM_COLORS[k] || '#888', opacity: 0.4 },
              label: { show: false }
            };
            pushUniqueNode(nodes, n);
            pushUniqueLink(links, {
              source: dName,
              target: e.name,
              value: k,
              lineStyle: { color: DIM_COLORS[k] || '#888', width: 0.8, opacity: 0.25 }
            });
          }
        });
      });
    });
  }

  return { nodes: nodes, links: links };
}

function findDiseaseCodeByName(name) {
  var result = null;
  Object.keys(KG_DATA.diseases).forEach(function(code) {
    if (KG_DATA.diseases[code].info.name === name) result = code;
  });
  return result;
}

/* ================================================================
   Render Graph
   ================================================================ */
function renderGraph() {
  var container = document.getElementById('nw-graph');
  if (!container) return;
  if (GRAPH_CHART) { GRAPH_CHART.dispose(); }

  var gd = buildGraphData();
  LAST_GRAPH_DATA = gd;
  renderGraphGuide(gd);
  showGraphOverview(gd);

  GRAPH_CHART = echarts.init(container, null, { renderer: 'canvas' });

  /* Apply search filter */
  if (SEARCH_RESULTS !== null) {
    gd.nodes.forEach(function(n) {
      if (n.nodeType !== 'disease' && n.nodeType !== 'disease-other') {
        if (SEARCH_RESULTS.indexOf(n.name) === -1 && n.name !== KG_DATA.diseases[CURRENT_DISEASE_CODE].info.name) {
          n.itemStyle = n.itemStyle || {};
          n.itemStyle.opacity = 0.1;
          n.label = n.label || {};
          n.label.show = false;
        }
      }
    });
  }

  GRAPH_CHART.setOption({
    tooltip: {
      trigger: 'item',
      backgroundColor: '#1a1d27',
      borderColor: '#2e3348',
      textStyle: { color: '#e8eaf0', fontSize: 12 },
      formatter: function(p) {
        if (p.dataType === 'edge') {
          return p.data.source + ' → ' + p.data.target;
        }
        var info = ALL_GRAPH_NODES[p.name];
        var t = '';
        if (info) {
          t = info.type === 'Disease' ? '疾病' : (DIM_NAMES[info.type] || info.type || '');
        }
        return '<b>' + p.name + '</b>' + (t ? '<br><span style="color:#8b90a0">' + t + '</span>' : '');
      }
    },
    animationDuration: 600,
    animationEasingUpdate: 'quinticInOut',
    series: [{
      type: 'graph',
      layout: 'force',
      data: gd.nodes,
      links: gd.links,
      roam: true,
      draggable: true,
      label: {
        show: true,
        position: 'right',
        fontSize: 10,
        color: '#e8eaf0'
      },
      lineStyle: {
        curveness: 0.12,
        opacity: 0.6
      },
      emphasis: {
        focus: 'adjacency',
        lineStyle: { width: 4 }
      },
      force: {
        repulsion: 360,
        gravity: 0.04,
        edgeLength: [90, 260],
        friction: 0.6,
        layoutAnimation: true
      }
    }]
  });

  /* Events */
  GRAPH_CHART.off('click');
  GRAPH_CHART.off('dblclick');
  GRAPH_CHART.off('mouseover');

  GRAPH_CHART.on('click', function(params) {
    if (params.dataType !== 'node') return;
    var nd = ALL_GRAPH_NODES[params.name];
    if (!nd) return;

    if (PATH_MODE) {
      onPathNodeClick(params.name, nd);
      return;
    }

    /* Single click: toggle expand or show detail */
    showNodeDetail(params.name, nd);

    /* Track exploration path */
    addPathNode(params.name);
  });

  GRAPH_CHART.on('dblclick', function(params) {
    if (params.dataType !== 'node') return;
    var nd = ALL_GRAPH_NODES[params.name];
    if (!nd) return;
    /* Double click: set as new center if it's a disease node */
    if (nd.nodeType === 'disease' || nd.nodeType === 'disease-other') {
      var dc = findDiseaseCodeByName(params.name);
      if (dc) {
        document.getElementById('nw-disease-select').value = dc;
        loadDiseaseData(dc, function(d) { if (d) setCenter(dc); });
      }
    } else {
      /* Entity: expand its associated diseases */
      toggleEntityExpand(params.name, nd);
    }
  });

  GRAPH_CHART.on('mouseover', function(params) {
    if (params.dataType !== 'node') return;
    var nd = ALL_GRAPH_NODES[params.name];
    if (nd) showNodeDetail(params.name, nd);
  });

  /* Right-click to deselect */
  container.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    GRAPH_CHART.dispatchAction({ type: 'downplay' });
    showEmptyDetail();
  });

  /* Resize */
  window.addEventListener('resize', function() {
    if (GRAPH_CHART) GRAPH_CHART.resize();
  });

  setTimeout(function() {
    if (GRAPH_CHART) {
      GRAPH_CHART.resize();
      GRAPH_CHART.dispatchAction({ type: 'restore' });
    }
  }, 120);
  setTimeout(function() {
    if (GRAPH_CHART) GRAPH_CHART.dispatchAction({ type: 'restore' });
  }, 700);
}

/* ================================================================
   First-screen Overview
   ================================================================ */
function renderGraphGuide(gd) {
  var el = document.getElementById('nw-guide-actions');
  if (!el || !CURRENT_DISEASE_CODE) return;
  var d = KG_DATA.diseases[CURRENT_DISEASE_CODE];
  var starters = getStarterEntities(d, 4);
  var html = '';
  starters.forEach(function(s) {
    html += '<button class="nw-guide-btn" onclick="event.stopPropagation(); focusEntity(\'' + safeJs(s.name) + '\')">' + s.name + '</button>';
  });
  html += '<button class="nw-guide-btn" onclick="event.stopPropagation(); enterFullscreen()">全屏查看</button>';
  el.innerHTML = html;
}

function showGraphOverview(gd) {
  var empty = document.getElementById('nw-detail-empty');
  var content = document.getElementById('nw-detail-content');
  if (!empty || !content || !CURRENT_DISEASE_CODE) return;
  var d = KG_DATA.diseases[CURRENT_DISEASE_CODE];
  if (!d) return;
  empty.style.display = 'none';
  content.style.display = 'block';

  // Update collapsed bar summary
  var nrsNodes = document.getElementById('nrs-nodes');
  var nrsLinks = document.getElementById('nrs-links');
  if (nrsNodes) nrsNodes.textContent = gd.nodes.length;
  if (nrsLinks) nrsLinks.textContent = gd.links.length;

  var dimCount = 0;
  var entityCount = 0;
  DIM_KEYS.forEach(function(k) {
    var len = (d.dimensions[k] || []).length;
    if (len > 0) dimCount++;
    entityCount += len;
  });
  var starters = getStarterEntities(d, 5);
  var h = '';
  h += '<div class="nw-detail-name">' + d.info.name + '</div>';
  h += '<div class="nw-detail-code">默认中心疾病 · ' + d.info.code + '</div>';
  h += '<span class="nw-dim-tag" style="background:' + DISEASE_COLOR + '">疾病</span>';
  h += '<div class="nw-overview-grid">';
  h += overviewCard(gd.nodes.length, '当前可见节点');
  h += overviewCard(gd.links.length, '当前可见关系');
  h += overviewCard(dimCount, '覆盖知识维度');
  h += overviewCard(entityCount, '中心实体总量');
  h += '</div>';
  h += '<div class="nw-detail-section"><h4>先看什么</h4>';
  h += '<div class="nw-starter-list">';
  starters.forEach(function(s) {
    h += '<div class="nw-starter-item" onclick="focusEntity(\'' + safeJs(s.name) + '\')">';
    h += '<div class="name"><span style="color:' + s.color + '">●</span> ' + s.name + '</div>';
    h += '<div class="desc">' + s.dim + '实体 · 点击后右侧展示关联疾病、跨维度共现与扩展入口</div>';
    h += '</div>';
  });
  h += '</div></div>';
  h += '<div class="nw-detail-section"><h4>推荐操作</h4>';
  h += '<div class="nw-path-hint"><b>默认已经不是空白页：</b>中间是自动展开的疾病关联网络。<div class="path-line">建议路径：先点“胸痛/心电图/肌钙蛋白”等核心节点，再看关联疾病与跨维度实体。</div></div>';
  h += '</div>';
  h += '<button class="nw-expand-btn" onclick="enterFullscreen()">进入全屏探索</button>';
  content.innerHTML = h;
}

function overviewCard(num, label) {
  return '<div class="nw-overview-card"><div class="num">' + num + '</div><div class="txt">' + label + '</div></div>';
}

function getStarterEntities(d, limit) {
  var preferredDims = ['Symptom', 'Exam', 'LabTest', 'Medication', 'Procedure', 'RiskFactor', 'Complication'];
  var result = [];
  preferredDims.forEach(function(k) {
    if (result.length >= limit) return;
    var items = d.dimensions[k] || [];
    items.slice(0, 2).forEach(function(e) {
      if (result.length < limit) {
        result.push({ name: e.name, dim: DIM_NAMES[k] || k, type: k, color: DIM_COLORS[k] || '#888' });
      }
    });
  });
  if (result.length < limit) {
    DIM_KEYS.forEach(function(k) {
      if (result.length >= limit) return;
      (d.dimensions[k] || []).forEach(function(e) {
        if (result.length < limit && !result.some(function(x) { return x.name === e.name; })) {
          result.push({ name: e.name, dim: DIM_NAMES[k] || k, type: k, color: DIM_COLORS[k] || '#888' });
        }
      });
    });
  }
  return result;
}

function detailRow(label, value) {

}

function findAssociatedDiseases(entityName) {
  var result = [];
  Object.keys(KG_DATA.diseases).forEach(function(dc) {
    var d = KG_DATA.diseases[dc];
    DIM_KEYS.forEach(function(k) {
      (d.dimensions[k] || []).forEach(function(e) {
        if (e.name === entityName && result.indexOf(dc) === -1) {
          result.push(dc);
        }
      });
    });
  });
  return result;
}

    if (d) setCenter(dc);

}

function expandFromEntity(entityName) {
  /* Find the most common disease for this entity and set it as center */
  var diseases = findAssociatedDiseases(entityName);
  if (diseases.length > 0) {
    jumpToDisease(diseases[0]);
  }
}

/* ================================================================
   Entity Expand (Double-click on entity node)
   ================================================================ */
function toggleEntityExpand(entityName, nd) {
  if (NODE_EXPANDED[entityName]) {
    NODE_EXPANDED[entityName] = false;
    renderGraph();
    return;
  }
  NODE_EXPANDED[entityName] = true;
  var assocDiseases = findAssociatedDiseases(entityName);
  var option = GRAPH_CHART.getOption();
  var chartNodes = (option.series[0].data || []).slice();
  var chartLinks = (option.series[0].links || []).slice();
  var nodeNames = {};
  chartNodes.forEach(function(n) { nodeNames[n.name] = true; });
  var linkKeys = {};
  chartLinks.forEach(function(l) { linkKeys[l.source + '→' + l.target + '→' + (l.value || '')] = true; });

  assocDiseases.forEach(function(dc) {
    if (dc === CURRENT_DISEASE_CODE) return;
    var dd = KG_DATA.diseases[dc];
    if (!nodeNames[dd.info.name]) {
      var n = {
        name: dd.info.name,
        code: dd.info.code,
        nodeType: 'disease-other',
        type: 'Disease',
        category: 0,
        level: 2,
        symbolSize: 22,
        itemStyle: { color: '#4f8cff', opacity: 0.5 },
        label: { show: true, fontSize: 9, color: '#8b90a0' }
      };
      chartNodes.push(n);
      ALL_GRAPH_NODES[dd.info.name] = n;
      nodeNames[dd.info.name] = true;
    }
    var key = dd.info.name + '→' + entityName + '→' + (nd.dimKey || nd.type || '');
    if (!linkKeys[key]) {
      chartLinks.push({
        source: dd.info.name,
        target: entityName,
        value: nd.dimKey || nd.type || '',
        lineStyle: { color: DIM_COLORS[nd.type] || '#888', width: 1, opacity: 0.35 }
      });
      ALL_GRAPH_EDGES.push({ a: dd.info.name, b: entityName });
      linkKeys[key] = true;
    }
  });

  GRAPH_CHART.setOption({
    series: [{ data: chartNodes, links: chartLinks }]
  });
}

/* ================================================================
   Exploration Path
   ================================================================ */
function addPathNode(name) {
  if (EXPLORE_PATH.length > 0 && EXPLORE_PATH[EXPLORE_PATH.length - 1] === name) return;
  if (EXPLORE_PATH.length > 50) EXPLORE_PATH.shift();
  EXPLORE_PATH.push(name);
  updatePathList();
}

function getDefaultPathHint() {
  if (!CURRENT_DISEASE_CODE || !KG_DATA || !KG_DATA.diseases[CURRENT_DISEASE_CODE]) {
    return '选择疾病 → 查看核心实体 → 继续扩展关联疾病';
  }
  var d = KG_DATA.diseases[CURRENT_DISEASE_CODE];
  var starters = getStarterEntities(d, 2);
  if (starters.length >= 2) return d.info.name + ' → ' + starters[0].name + ' → ' + starters[1].name;
  if (starters.length === 1) return d.info.name + ' → ' + starters[0].name + ' → 关联疾病';
  return d.info.name + ' → 核心实体 → 关联疾病';
}

function updatePathList() {
  var el = document.getElementById('nw-path-list');
  if (EXPLORE_PATH.length === 0) {
    el.innerHTML = '<div class="nw-path-hint"><b>推荐探索：</b><div class="path-line">' + getDefaultPathHint() + '</div><div style="margin-top:5px;">点击图谱节点后，这里会记录你的探索轨迹。</div></div>';
    return;
  }
  var html = '';
  EXPLORE_PATH.forEach(function(name, idx) {
    var nd = ALL_GRAPH_NODES[name];
    var color = nd ? (DIM_COLORS[nd.type] || DISEASE_COLOR) : DISEASE_COLOR;
    html += '<div class="nw-path-node" style="padding-left:' + (16 + idx * 4) + 'px">';
    html += '<span style="color:' + color + '">' + name + '</span>';
    html += '</div>';
  });
  html += '<button class="nw-path-clear" onclick="clearPath()">清空路径</button>';
  el.innerHTML = html;
}

function clearPath() {
  EXPLORE_PATH = [];
  updatePathList();
}

function onPathNodeClick(name, nd) {
  PATH_SELECT_COUNT++;
  if (PATH_SELECT_COUNT === 1) {
    PATH_START = name;
    var overlay = document.getElementById('nw-path-overlay');
    overlay.innerHTML = '<div class="po-step"><span class="po-num done">①</span><span class="po-name">' + name + '</span></div><div class="po-step"><span class="po-arrow">→</span></div><div class="po-step"><span class="po-num active">②</span><span class="po-label">点击终点节点</span></div><div class="po-step"><button class="nw-guide-btn" onclick="cancelPathStart()">取消</button></div>';
    highlightNodes([name], []);
  } else if (PATH_SELECT_COUNT === 2) {
    var PATH_END = name;
    var path = findShortestPath(PATH_START, PATH_END);
    var overlay = document.getElementById('nw-path-overlay');
    if (path && path.nodes.length > 1) {
      /* 构建临床可读路径: "实体A --[关系]--> 实体B" */
      var parts = [];
      parts.push('<span class="po-name">' + path.nodes[0] + '</span>');
      for (var i = 0; i < path.edges.length; i++) {
        var edgeLabel = DIM_NAMES[path.edges[i].label] || path.edges[i].label || '';
        parts.push('<span class="po-arrow">—[' + edgeLabel + ']→</span>');
        parts.push('<span class="po-name">' + path.nodes[i + 1] + '</span>');
      }
      var resultHtml = '<div class="po-result">' + parts.join(' ') + '</div>';
      resultHtml += '<div class="po-step"><button class="nw-guide-btn" onclick="clearPathMode()">新路径</button></div>';
      overlay.innerHTML = resultHtml;
      highlightPath(path.nodes);
    } else {
      overlay.innerHTML = '<div class="po-result"><span style="color:#ff6b6b">未找到路径</span>：' + PATH_START + ' ↔ ' + PATH_END + ' 不在当前图谱中相连</div><div class="po-step"><button class="nw-guide-btn" onclick="clearPathMode()">重试</button></div>';
    }
    PATH_SELECT_COUNT = 0;
    PATH_START = null;
  }
}

function cancelPathStart() {
  PATH_SELECT_COUNT = 0;
  PATH_START = null;
  var overlay = document.getElementById('nw-path-overlay');
  overlay.innerHTML = '<div class="po-step"><span class="po-num active">1</span><span class="po-label">点击任意节点作为起点</span></div><div class="po-step"><span class="po-arrow">→</span></div><div class="po-step"><span class="po-num pending">2</span><span class="po-label">再点击一个节点作为终点</span></div>';

}

function clearPathMode() {
  PATH_SELECT_COUNT = 0;

  togglePathMode();
}
function highlightNodes(nodeNames, edgeIndices) {
  var option = GRAPH_CHART.getOption();
  var nodes = option.series[0].data;
  var nodeMap = {};
  nodes.forEach(function(n, i) {
    nodeMap[n.name] = i;
    n.itemStyle = n.itemStyle || {};
    n.originalOpacity = n.originalOpacity !== undefined ? n.originalOpacity : (n.itemStyle.opacity || 1);
  });

  nodes.forEach(function(n, i) {
    if (nodeNames.indexOf(n.name) !== -1) {
      n.itemStyle.opacity = 1;
      n.itemStyle.borderColor = '#ffd43b';
      n.itemStyle.borderWidth = 3;
    } else {
      n.itemStyle.opacity = 0.15;
      n.itemStyle.borderWidth = 0;
    }
  });

  GRAPH_CHART.setOption({ series: [{ data: nodes }] });
}

function highlightPath(path) {
  var pathSet = {};
  path.forEach(function(n) { pathSet[n] = true; });

  var option = GRAPH_CHART.getOption();
  var nodes = option.series[0].data;
  var links = option.series[0].links;

  nodes.forEach(function(n) {
    n.itemStyle = n.itemStyle || {};
    if (pathSet[n.name]) {
      n.itemStyle.opacity = 1;
      n.itemStyle.borderColor = '#ffd43b';
      n.itemStyle.borderWidth = 3;
    } else {
      n.itemStyle.opacity = 0.12;
      n.itemStyle.borderWidth = 0;
    }
  });

  links.forEach(function(l) {
    l.lineStyle = l.lineStyle || {};
    if (pathSet[l.source] && pathSet[l.target]) {
      l.lineStyle.color = '#ffd43b';
      l.lineStyle.width = 3;
      l.lineStyle.opacity = 1;
    } else {
      l.lineStyle.opacity = 0.08;
    }
  });

  GRAPH_CHART.setOption({ series: [{ data: nodes, links: links }] });
}

/* ================================================================
   BFS Shortest Path (with relationship labels)
   ================================================================ */
function findShortestPath(startName, endName) {
  if (startName === endName) return { nodes: [startName], edges: [] };

  /* Build adjacency list WITH edge labels from GRAPH_CHART data */
  var option = GRAPH_CHART.getOption();
  var links = option.series[0].links || [];
  var adj = {};
  links.forEach(function(l) {
    if (!adj[l.source]) adj[l.source] = [];
    if (!adj[l.target]) adj[l.target] = [];
    adj[l.source].push({ node: l.target, label: l.value || '' });
    adj[l.target].push({ node: l.source, label: l.value || '' });
  });

  /* BFS — returns { nodes: [...], edges: [{label}] } */
  var queue = [{ nodes: [startName], edges: [] }];
  var visited = {};
  visited[startName] = true;

  while (queue.length > 0) {
    var curr = queue.shift();
    var current = curr.nodes[curr.nodes.length - 1];
    if (current === endName) return curr;

    var neighbors = adj[current] || [];
    for (var i = 0; i < neighbors.length; i++) {
      var nb = neighbors[i];
      if (!visited[nb.node]) {
        visited[nb.node] = true;
        queue.push({
          nodes: curr.nodes.concat([nb.node]),
          edges: curr.edges.concat([{ label: nb.label }])
        });
        if (curr.nodes.length > 6) return null;
      }
    }
  }
  return null;
}

/* ================================================================
   Fullscreen
   ================================================================ */
function enterFullscreen() {
  // Try native fullscreen first
  var el = document.documentElement;
  if (el.requestFullscreen) {
    el.requestFullscreen();
  } else if (el.webkitRequestFullscreen) {
    el.webkitRequestFullscreen();
  } else if (el.msRequestFullscreen) {
    el.msRequestFullscreen();
  }
  // Always toggle CSS class (works even if native fullscreen fails)
  document.body.classList.add('nw-fullscreen');
  document.getElementById('btn-fullscreen').style.display = 'none';
  document.getElementById('btn-exit-fullscreen').style.display = '';
  renderNav('network');
  setTimeout(function() { if (GRAPH_CHART) GRAPH_CHART.resize(); }, 100);
}

function exitFullscreen() {
  if (document.exitFullscreen) {
    document.exitFullscreen();
  } else if (document.webkitExitFullscreen) {
    document.webkitExitFullscreen();
  } else if (document.msExitFullscreen) {
    document.msExitFullscreen();
  }
  // Always toggle CSS class
  document.body.classList.remove('nw-fullscreen');
  document.getElementById('btn-fullscreen').style.display = '';
  document.getElementById('btn-exit-fullscreen').style.display = 'none';
  renderNav('network');
  setTimeout(function() { if (GRAPH_CHART) GRAPH_CHART.resize(); }, 100);
}

document.addEventListener('fullscreenchange', onFullscreenChange);
document.addEventListener('webkitfullscreenchange', onFullscreenChange);

function onFullscreenChange() {
  var isFull = !!(document.fullscreenElement || document.webkitFullscreenElement);
  document.body.classList.toggle('nw-fullscreen', isFull);
  document.getElementById('btn-fullscreen').style.display = isFull ? 'none' : '';
  document.getElementById('btn-exit-fullscreen').style.display = isFull ? '' : 'none';
  /* Re-render nav for fullscreen */
  if (isFull) {
    var nav = document.querySelector('.nav');
    if (nav) nav.style.display = 'none';
  } else {
    var nav = document.querySelector('.nav');
    if (nav) nav.style.display = '';
  }
  /* Resize chart */
  setTimeout(function() {
    if (GRAPH_CHART) GRAPH_CHART.resize();
  }, 350);
}
</script>
